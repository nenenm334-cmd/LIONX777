<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F5C34">
<title>Reset Password — Minbar</title>
<link rel="stylesheet" href="css/common.css">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<style>
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(circle at 20% 50%, rgba(13,148,136,.06) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(16,185,129,.05) 0%, transparent 40%);
  pointer-events: none;
}
body.dark::before {
  background: radial-gradient(circle at 20% 50%, rgba(52,211,153,.04) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(52,211,153,.03) 0%, transparent 40%);
}
.auth-wrap { width: 100%; max-width: 420px; position: relative; z-index: 1; }

.auth-brand { text-align: center; margin-bottom: 32px; }
.auth-brand .brand-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--teal), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 800; color: #fff;
  margin: 0 auto 14px;
  box-shadow: 0 4px 20px rgba(13,148,136,.3);
}
.auth-brand h1 { font-size: 22px; font-weight: 700; color: var(--ink); }
.auth-brand p { font-size: 14px; color: var(--ink-soft); margin-top: 4px; }

.auth-card {
  background: var(--card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  padding: 32px;
  box-shadow: var(--shadow-md);
}

.auth-field { margin-bottom: 18px; }
.auth-field label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--ink-soft); margin-bottom: 6px;
}
.auth-field input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg); color: var(--ink);
  font-family: inherit; font-size: 14px;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.auth-field input:focus {
  outline: none; border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(13,148,136,.1);
}
.auth-field input::placeholder { color: var(--ink-muted); }

.btn-primary {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--teal), var(--teal-dark));
  color: #fff; border: none;
  border-radius: var(--radius-sm);
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(13,148,136,.3); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--ink-soft); }
.auth-footer a { color: var(--teal); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }

.success-msg {
  text-align: center; padding: 20px;
  background: rgba(16,185,129,.08);
  border: 1px solid rgba(16,185,129,.2);
  border-radius: var(--radius-sm);
  color: var(--teal); font-size: 14px; font-weight: 500;
  line-height: 1.5;
}
.error-msg {
  text-align: center; padding: 12px;
  background: rgba(239,68,68,.08);
  border: 1px solid rgba(239,68,68,.2);
  border-radius: var(--radius-sm);
  color: #ef4444; font-size: 13px; font-weight: 500;
  margin-bottom: 16px;
}

.password-wrap { position: relative; }
.password-wrap input { padding-right: 44px; }
.password-toggle {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 32px; height: 32px;
  border: none; background: none;
  color: var(--ink-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-xs);
}
.password-toggle:hover { color: var(--ink-soft); }

.step-indicator {
  display: flex; gap: 8px; margin-bottom: 24px; justify-content: center;
}
.step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); transition: all .3s;
}
.step-dot.active { background: var(--teal); width: 24px; border-radius: 4px; }
.step-dot.done { background: var(--teal); }
</style>
</head>
<body>
<script>if(localStorage.getItem('minbar_dark')==='true') document.body.classList.add('dark');</script>

<div class="auth-wrap">
  <div class="auth-brand">
    <div class="brand-icon">M</div>
    <h1>Reset Password</h1>
    <p>We'll send you a link to reset your password</p>
  </div>

  <div class="auth-card">
    <!-- Step 1: Enter Email -->
    <div id="step1">
      <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
      </div>

      <div id="errorMsg1" class="error-msg" style="display:none;"></div>

      <div class="auth-field">
        <label>Email Address</label>
        <input type="email" id="resetEmail" placeholder="you@example.com" autocomplete="email">
      </div>

      <button class="btn-primary" id="sendResetBtn" onclick="requestReset()">Send Reset Link</button>
    </div>

    <!-- Step 2: New Password -->
    <div id="step2" style="display:none;">
      <div class="step-indicator">
        <div class="step-dot done"></div>
        <div class="step-dot active"></div>
      </div>

      <div id="errorMsg2" class="error-msg" style="display:none;"></div>
      <div id="successMsg" class="success-msg" style="display:none;"></div>

      <div class="auth-field">
        <label>New Password</label>
        <div class="password-wrap">
          <input type="password" id="newPassword" placeholder="Min. 6 characters" autocomplete="new-password">
          <button class="password-toggle" onclick="togglePass('newPassword', this)" type="button">👁</button>
        </div>
      </div>

      <div class="auth-field">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password">
          <button class="password-toggle" onclick="togglePass('confirmPassword', this)" type="button">👁</button>
        </div>
      </div>

      <button class="btn-primary" id="resetBtn" onclick="resetPassword()">Reset Password</button>
    </div>
  </div>

  <div class="auth-footer">
    <a href="index.html">← Back to Login</a>
  </div>
</div>

<script>
var API = '/api/password-reset';
var resetToken = '';
var resetEmail = '';

function togglePass(id, btn) {
  var inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🔒'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function showError(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}

async function requestReset() {
  var email = document.getElementById('resetEmail').value.trim();
  if (!email) { showError('errorMsg1', 'Please enter your email'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('errorMsg1', 'Invalid email address'); return; }

  var btn = document.getElementById('sendResetBtn');
  btn.disabled = true; btn.textContent = 'Sending...';

  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'request_reset', email: email, role: 'student' })
    });
    var data = await r.json();

    if (data.ok) {
      resetEmail = email;
      if (data.resetUrl) {
        resetToken = data.resetUrl.split('token=')[1].split('&')[0];
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
      } else {
        document.getElementById('successMsg').innerHTML = '✅ Reset link sent to <strong>' + email + '</strong>. Check your inbox.';
        document.getElementById('successMsg').style.display = 'block';
        document.getElementById('errorMsg1').style.display = 'none';
      }
    } else {
      showError('errorMsg1', data.error || 'Something went wrong');
    }
  } catch (e) {
    showError('errorMsg1', 'Network error. Please try again.');
  }

  btn.disabled = false; btn.textContent = 'Send Reset Link';
}

async function resetPassword() {
  var pw = document.getElementById('newPassword').value;
  var confirm = document.getElementById('confirmPassword').value;
  var errorMsg = document.getElementById('errorMsg2');
  var successMsg = document.getElementById('successMsg');

  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  if (!pw) { showError('errorMsg2', 'Please enter a new password'); return; }
  if (pw.length < 6) { showError('errorMsg2', 'Password must be at least 6 characters'); return; }
  if (pw !== confirm) { showError('errorMsg2', 'Passwords do not match'); return; }

  var params = new URLSearchParams(window.location.search);
  var urlToken = params.get('token');
  var urlEmail = params.get('email');

  var useToken = urlToken || resetToken;
  var useEmail = urlEmail || resetEmail;

  if (!useToken || !useEmail) {
    showError('errorMsg2', 'Invalid or expired reset link');
    return;
  }

  var btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Resetting...';

  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'reset_password', token: useToken, email: useEmail, newPassword: pw, role: 'student' })
    });
    var data = await r.json();

    if (data.ok) {
      successMsg.innerHTML = '✅ Password reset successful! Redirecting to login...';
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
      setTimeout(function() {
        window.location.href = 'index.html';
      }, 2000);
    } else {
      showError('errorMsg2', data.error || 'Failed to reset password');
    }
  } catch (e) {
    showError('errorMsg2', 'Network error. Please try again.');
  }

  btn.disabled = false; btn.textContent = 'Reset Password';
}

window.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('token')) {
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    resetToken = params.get('token');
    resetEmail = params.get('email') || '';
  }
});
</script>
</body>
</html>
