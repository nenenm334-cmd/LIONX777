<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upgrade — Minbar</title>
<link rel="stylesheet" href="css/common.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdf4,#f8fafc,#ecfdf5);padding:16px;}
body.dark{background:linear-gradient(135deg,#08080e,#0a0a12,#080c0a);color:#e2e8f0;}
.card{width:100%;max-width:460px;background:rgba(255,255,255,.85);backdrop-filter:blur(32px);border-radius:24px;padding:40px 36px;box-shadow:0 24px 80px rgba(0,0,0,.06);}
body.dark .card{background:rgba(16,16,24,.85);box-shadow:0 24px 80px rgba(0,0,0,.3);}
.badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#0d9488;margin-bottom:4px;}
body.dark .badge{color:#34d399;}
h1{font-size:26px;margin-bottom:4px;}
p{color:#64748b;font-size:14px;line-height:1.5;margin-bottom:24px;}
body.dark p{color:#94a3b8;}
.price{font-size:44px;font-weight:800;letter-spacing:-.04em;margin-bottom:4px;}
.price span{font-size:16px;font-weight:500;color:#6b7280;}
.field{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:5px;}
body.dark label{color:#94a3b8;}
input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:15px;outline:none;background:#fff;color:#0f172a;}
body.dark input{border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#e2e8f0;}
input:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.12);}
.btn{width:100%;padding:14px 24px;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;margin:8px 0;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,148,136,.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-card{background:linear-gradient(135deg,#0d9488,#059669);}
.btn-gpay{background:#000;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-gpay:hover{background:#1a1a1a;}
.sec{font-size:12px;color:#94a3b8;text-align:center;margin-top:16px;}
body.dark .sec{color:#64748b;}
.err{display:none;padding:12px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;color:#dc2626;font-size:13px;margin-bottom:12px;}
body.dark .err{background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.2);color:#fca5a5;}
.features{list-style:none;margin-bottom:24px;}
.features li{padding:6px 0;font-size:13px;color:#475569;display:flex;align-items:center;gap:8px;}
body.dark .features li{color:#cbd5e1;}
.features .c{width:18px;height:18px;border-radius:50%;background:#d1fae5;color:#059669;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
body.dark .features .c{background:rgba(5,150,101,.2);color:#34d399;}
.loading{position:relative;pointer-events:none;}
.loading::after{content:'';position:absolute;inset:0;border-radius:12px;background:inherit;opacity:.7;}
.loading::before{content:'';position:absolute;top:50%;left:50%;width:20px;height:20px;margin:-10px 0 0 -10px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;z-index:1;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:480px){.card{padding:28px 20px;}.price{font-size:34px;}h1{font-size:22px;}}
</style>
</head><body>
<div class="card">
  <div class="badge" id="planBadge" aria-live="polite">Pro Plan</div>
  <h1 id="planName">Minbar Pro</h1>
  <div class="price" id="planPrice">$29<span>/mo</span></div>
  <ul class="features" id="planFeatures" aria-label="Plan features"></ul>

  <div class="field">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email" aria-required="true">
  </div>
  <div class="field">
    <label for="name">Name <span style="font-weight:400;color:#94a3b8;">(optional)</span></label>
    <input id="name" type="text" placeholder="Your name" autocomplete="name">
  </div>

  <div class="err" id="error" role="alert" aria-live="assertive"></div>

  <button class="btn btn-gpay" id="gpayBtn" aria-label="Pay with Google Pay">
    <svg width="20" height="13" viewBox="0 0 20 13" aria-hidden="true"><rect width="20" height="13" rx="2" fill="#fff"/><text x="3" y="10" font-size="7" font-weight="700" fill="#4285F4">G</text><text x="8" y="10" font-size="7" font-weight="700" fill="#4285F4">Pay</text></svg>
    Google Pay
  </button>
  <button class="btn btn-card" id="cardBtn" aria-label="Pay with credit or debit card">Pay with Card</button>

  <div class="sec">&#x1f512; Secure via Stripe &middot; Google Pay & Apple Pay accepted &middot; Cancel anytime</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const plan = params.get('plan') || 'pro';
const saved = JSON.parse(localStorage.getItem('minbar_session') || 'null');
const plans = {pro:{name:'Minbar Pro',price:'$29/mo',badge:'Pro Plan',features:['Unlimited flashcards & SRS','Live classes with teachers','Advanced exams & quizzes','Progress tracking & analytics','Priority support']},premium:{name:'Minbar Premium',price:'$59/mo',badge:'Premium Plan',features:['Everything in Pro','1-on-1 tutoring sessions','Custom learning path','Priority support','Certificate of completion']}};
const p = plans[plan] || plans.pro;
document.getElementById('planBadge').textContent = p.badge;
document.getElementById('planName').textContent = p.name;
document.getElementById('planPrice').innerHTML = p.price.replace('/mo','<span>/mo</span>');
document.getElementById('planFeatures').innerHTML = p.features.map(function(f){ return '<li><span class="c" aria-hidden="true">&#x2713;</span> '+f+'</li>'; }).join('');
if(saved && saved.email) document.getElementById('email').value = saved.email;
if(saved && saved.name) document.getElementById('name').value = saved.name;

var loading = false;
function getEmail() { return document.getElementById('email').value.trim(); }
function getName() { return document.getElementById('name').value.trim(); }
function validate() {
  var email = getEmail();
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ document.getElementById('error').textContent = 'Please enter a valid email'; document.getElementById('error').style.display = 'block'; return false; }
  document.getElementById('error').style.display = 'none'; return true;
}

function pay(method) {
  if(loading) return;
  if(!validate()) return;
  loading = true;
  var email = getEmail(), name = getName();
  var url = '/api/stripe-checkout';
  document.getElementById('error').style.display = 'none';
  var btns = document.querySelectorAll('.btn');
  btns.forEach(function(b){ b.disabled = true; b.classList.add('loading'); });
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan:plan,email:email,name:name,successUrl:location.origin+'/payment-success.html?session_id={CHECKOUT_SESSION_ID}',cancelUrl:location.origin+'/payment-cancel.html'})})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.url) { window.location.href = d.url; }
      else { document.getElementById('error').textContent = d.error || 'Error'; document.getElementById('error').style.display = 'block'; resetBtns(); }
    })
    .catch(function(e){ document.getElementById('error').textContent = 'Network error'; document.getElementById('error').style.display = 'block'; resetBtns(); });
}
function resetBtns() {
  loading = false;
  document.querySelectorAll('.btn').forEach(function(b){ b.disabled = false; b.classList.remove('loading'); });
}

document.getElementById('gpayBtn').onclick = function(){ pay('gpay'); };
document.getElementById('cardBtn').onclick = function(){ pay('card'); };
</script>
</body></html>
