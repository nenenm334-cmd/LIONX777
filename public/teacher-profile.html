<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="description" content="Book a lesson with expert Arabic teachers on Minbar">
<title>Minbar - Teacher Profile</title>
<link rel="stylesheet" href="css/common.css">
<style>
  :root{--radius-lg:16px;--radius-md:12px;--radius-sm:8px;}
  .profile-hero{position:relative;background:linear-gradient(135deg,var(--teal),#0ea5e9);border-radius:var(--radius-lg);padding:48px 24px 36px;text-align:center;color:#fff;overflow:hidden;margin-bottom:28px;}
  .profile-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,0.15) 0%,transparent 60%);pointer-events:none;}
  .profile-avatar{width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:700;margin:0 auto 16px;border:3px solid rgba(255,255,255,0.4);overflow:hidden;position:relative;z-index:1;}
  .profile-avatar img{width:100%;height:100%;object-fit:cover;}
  .profile-hero h1{margin:0;font-size:26px;position:relative;z-index:1;}
  .profile-hero .sub{font-size:15px;opacity:0.9;margin-top:4px;position:relative;z-index:1;}
  .profile-hero .hero-meta{display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap;position:relative;z-index:1;}
  .hero-meta-item{display:flex;align-items:center;gap:4px;font-size:13px;background:rgba(255,255,255,0.15);padding:4px 12px;border-radius:20px;}
  .profile-content{max-width:860px;margin:0 auto;padding:0 4px;}
  .section-title{font-size:17px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:-.02em;}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
  @media(max-width:640px){.info-grid{grid-template-columns:1fr;}}
  .info-card{background:var(--card,#fff);border:1px solid var(--border-subtle,#e5e7eb);border-radius:var(--radius-md);padding:20px;}
  .info-card h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--ink,#111827);display:flex;align-items:center;gap:6px;}
  .info-card p{font-size:13px;color:var(--ink-soft,#6b7280);line-height:1.6;margin:0;}
  .spec-tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;background:var(--teal-soft,#e6f7ef);color:var(--teal,#0d9488);margin:2px 3px;}
  .review-card{background:var(--card,#fff);border:1px solid var(--border-subtle,#e5e7eb);border-radius:var(--radius-md);padding:16px 20px;margin-bottom:10px;}
  .review-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .review-stars{color:#f59e0b;font-size:14px;}
  .review-text{font-size:13px;color:var(--ink-soft,#6b7280);line-height:1.6;}
  .review-date{font-size:11px;color:var(--ink-muted,#9ca3af);margin-left:auto;}
  .rating-big{font-size:36px;font-weight:800;color:var(--teal,#0d9488);}
  .rating-label{font-size:12px;color:var(--ink-soft,#6b7280);}
  .day-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .day-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card,#fff);color:var(--ink);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;text-align:center;min-width:60px;font-family:inherit;}
  .day-btn:hover{border-color:var(--teal);}
  .day-btn:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
  .day-btn.active{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:0 2px 8px rgba(13,148,136,.25);}
  .day-btn.disabled{opacity:.3;cursor:not-allowed;pointer-events:none;}
  .slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;}
  .slot{padding:10px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);text-align:center;cursor:pointer;transition:all .2s;font-size:13px;font-family:inherit;background:var(--card,#fff);color:var(--ink);}
  .slot:hover{border-color:var(--teal);background:var(--teal-soft,#e6f7ef);}
  .slot:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
  .slot.selected{border-color:var(--teal);background:var(--teal);color:#fff;box-shadow:0 2px 8px rgba(13,148,136,.3);}
  .slot.unavailable{opacity:.35;cursor:not-allowed;text-decoration:line-through;pointer-events:none;}
  .booking-hint{font-size:12px;color:var(--ink-soft);margin-top:12px;padding:8px 12px;background:var(--teal-soft,#e6f7ef);border-radius:var(--radius-sm);text-align:center;}
  .btn-wrap{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
  .video-wrap{position:relative;width:100%;padding-bottom:56.25%;border-radius:var(--radius-md);overflow:hidden;background:#000;}
  .video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
  .not-found{padding:60px 20px;text-align:center;}
  .not-found .nf-icon{font-size:56px;margin-bottom:12px;}
  .not-found h2{font-size:20px;font-weight:700;margin-bottom:8px;}
  .not-found p{font-size:14px;color:var(--ink-soft);margin-bottom:20px;}
  .empty-reviews{text-align:center;padding:24px;color:var(--ink-soft);font-size:13px;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
  .toast-item{padding:12px 24px;border-radius:12px;background:var(--ink);color:#fff;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:toastIn .35s ease;pointer-events:auto;white-space:nowrap;}
  .toast-item.success{background:linear-gradient(135deg,#0d9488,#059669);}
  .toast-item.error{background:linear-gradient(135deg,#ef4444,#dc2626);}
  @keyframes toastIn{from{opacity:0;transform:translateY(16px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
  @media(max-width:768px){.profile-hero{padding:32px 16px 24px;}.profile-avatar{width:80px;height:80px;font-size:32px;}.profile-hero h1{font-size:22px;}}
  @media(max-width:480px){.profile-hero{padding:24px 12px 20px;}.profile-avatar{width:68px;height:68px;font-size:26px;}.section-title{font-size:15px;}}
</style>
</head>
<body class="s-profile">
<script>if(localStorage.getItem('minbar_dark')==='true')document.body.classList.add('dark');</script>

<div class="toast-wrap" id="toastWrap"></div>
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleMenu()"></div>
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-menu-close" onclick="toggleMenu()">✕</button>
  <a href="dashboard-student.html" onclick="toggleMenu()">Dashboard</a>
  <a href="teachers.html" onclick="toggleMenu()">Teachers</a>
  <a href="lessons.html" onclick="toggleMenu()">Lessons</a>
  <a href="profile.html" onclick="toggleMenu()">Profile</a>
  <a href="index.html" onclick="toggleMenu()">Cards</a>
</div>

<div class="top-nav">
  <a href="index.html" class="logo">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    Minbar
  </a>
  <div class="nav-links">
    <a href="teachers.html" class="nav-link active">Teachers</a>
    <a href="dashboard-student.html" class="nav-link">Dashboard</a>

  </div>

    <button class="menu-btn" onclick="toggleMenu()" aria-label="Toggle menu">☰</button>
  </div>
</div>

<div class="container" id="profileContainer">
  <div class="skeleton" style="height:200px;border-radius:var(--radius-lg);"></div>
</div>

<script>
var KV_API = '/api/kv';

function toast(msg, type) {
  type = type || 'success';
  var w = document.getElementById('toastWrap');
  if (!w) return;
  var t = document.createElement('div');
  t.className = 'toast-item ' + type;
  t.setAttribute('role', 'alert');
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(function() { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(function(){t.remove();},300); }, 3500);
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function esc(s) { return escapeHtml(s); }

function safeAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function kvGet(key) {
  try { var r = await fetch('/api/kv?key=' + encodeURIComponent(key)); if (!r.ok) return null; var d = await r.json(); if (d && typeof d.value === 'string') { try { d.value = JSON.parse(d.value); } catch(e) {} } return d; } catch(e) { return null; }
}

async function kvSet(key, value) {
  await fetch('/api/kv?key=' + encodeURIComponent(key), { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: key, value: value }) });
}

function getTeacherId() {
  var p = new URLSearchParams(location.search);
  var id = p.get('id') || '';
  return id;
}

var teacherData = null;
var selectedDay = null;
var selectedSlot = null;

var demoSchedule = [
  {day:'Monday',time:'10:00',available:true},{day:'Monday',time:'11:00',available:true},{day:'Monday',time:'12:00',available:true},
  {day:'Tuesday',time:'10:00',available:true},{day:'Tuesday',time:'11:00',available:true},
  {day:'Wednesday',time:'14:00',available:true},{day:'Wednesday',time:'15:00',available:true},{day:'Wednesday',time:'16:00',available:true},
  {day:'Thursday',time:'10:00',available:true},{day:'Thursday',time:'11:00',available:true},{day:'Thursday',time:'12:00',available:true},
  {day:'Friday',time:'13:00',available:true},{day:'Friday',time:'14:00',available:true},{day:'Friday',time:'15:00',available:true}
];

function timeAgo(ts) {
  if (!ts || ts <= 0) return '';
  var diff = Date.now() - ts;
  if (diff < 0) return 'just now';
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  if (diff < 2592000000) return Math.floor(diff/86400000) + 'd ago';
  return Math.floor(diff/2592000000) + 'mo ago';
}

function getDayName(day) {
  if (!day) return '';
  var map = {sunday:'Sunday',monday:'Monday',tuesday:'Tuesday',wednesday:'Wednesday',thursday:'Thursday',friday:'Friday',saturday:'Saturday'};
  return map[day.toLowerCase()] || day.charAt(0).toUpperCase() + day.slice(1).toLowerCase();
}

function toggleMenu() {
  var m = document.getElementById('mobileMenu');
  var o = document.getElementById('mobileOverlay');
  if (m) m.classList.toggle('open');
  if (o) o.classList.toggle('open');
}
document.getElementById('mobileOverlay')?.addEventListener('click', toggleMenu);

/* Close mobile menu on Escape */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var m = document.getElementById('mobileMenu');
    if (m && m.classList.contains('open')) { m.classList.remove('open'); document.getElementById('mobileOverlay')?.classList.remove('open'); }
  }
});

function renderProfile(teacher) {
  if (!teacher) return '<div class="not-found"><div class="nf-icon">👤</div><h2>Teacher Not Found</h2><p>This teacher profile does not exist or has been removed.</p><a href="teachers.html" class="btn btn-primary">Browse Teachers</a></div>';

  var name = esc(teacher.name || 'Unknown Teacher');
  var bio = esc(teacher.bio || 'No bio yet.');
  var price = teacher.price || 0;
  var rating = teacher.stat_rating || teacher.rating || 0;
  var reviewCount = teacher.stat_reviews || (teacher.reviews ? teacher.reviews.length : 0);
  var students = teacher.stat_students || 0;
  var lessons = teacher.stat_lessons || 0;
  var specialties = teacher.specialties || [];
  var photo = teacher.photo || '';
  var photoAlt = "Profile photo of " + (teacher.name || 'teacher');
  var videoUrl = teacher.videoUrl || '';
  var reviews = teacher.reviews || [];
  var yearsExp = teacher.yearsExp || 0;

  var h = '';

  /* Hero */
  h += '<div class="profile-hero">';
  h += '<div class="profile-avatar">' + (photo ? '<img src="' + safeAttr(photo) + '" alt="' + safeAttr(photoAlt) + '" loading="lazy">' : esc(name.charAt(0).toUpperCase())) + '</div>';
  h += '<h1>' + name + '</h1>';
  if (teacher.subtitle) h += '<div class="sub">' + esc(teacher.subtitle) + '</div>';
  h += '<div class="hero-meta">';
  if (price > 0) h += '<span class="hero-meta-item">💰 $' + price + '/hr</span>';
  if (yearsExp > 0) h += '<span class="hero-meta-item">📅 ' + yearsExp + ' yr' + (yearsExp > 1 ? 's' : '') + '</span>';
  if (rating > 0) h += '<span class="hero-meta-item">⭐ ' + rating.toFixed(1) + '</span>';
  if (students > 0) h += '<span class="hero-meta-item">👥 ' + students + ' student' + (students > 1 ? 's' : '') + '</span>';
  h += '</div></div>';

  /* Info Grid */
  h += '<div class="info-grid">';

  /* About */
  h += '<div class="info-card"><h3>📖 About</h3><p>' + esc(bio) + '</p></div>';

  /* Specialties */
  h += '<div class="info-card"><h3>⭐ Specialties</h3>';
  if (specialties.length > 0) {
    h += '<div>' + specialties.map(function(s) { return '<span class="spec-tag">' + esc(s) + '</span>'; }).join('') + '</div>';
  } else {
    h += '<p>No specialties listed.</p>';
  }
  h += '</div>';

  /* Rating & Reviews Summary */
  h += '<div class="info-card"><h3>⭐ Rating</h3>';
  if (rating > 0) {
    h += '<div style="display:flex;align-items:center;gap:10px;"><div class="rating-big">' + rating.toFixed(1) + '</div><div><div class="stars">';
    for (var ri = 0; ri < 5; ri++) {
      h += '<span class="star' + (ri < Math.round(rating) ? ' filled' : '') + '">★</span>';
    }
    h += '</div><div class="rating-label">' + reviewCount + ' review' + (reviewCount !== 1 ? 's' : '') + '</div></div></div>';
  } else {
    h += '<p>No ratings yet.</p>';
  }
  h += '</div>';

  /* Stats */
  h += '<div class="info-card"><h3>📊 Stats</h3>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
  h += '<div style="text-align:center;padding:12px;background:var(--teal-soft);border-radius:8px;"><div style="font-size:20px;font-weight:800;color:var(--teal);">' + lessons + '</div><div style="font-size:11px;color:var(--ink-soft);">Lessons</div></div>';
  h += '<div style="text-align:center;padding:12px;background:var(--teal-soft);border-radius:8px;"><div style="font-size:20px;font-weight:800;color:var(--teal);">' + students + '</div><div style="font-size:11px;color:var(--ink-soft);">Students</div></div>';
  h += '</div></div>';

  h += '</div>'; /* End info-grid */

  /* Video */
  if (videoUrl) {
    h += '<div class="section-title">🎥 Intro Video</div>';
    h += '<div class="video-wrap"><iframe src="' + safeAttr(videoUrl) + '" title="Intro video from ' + safeAttr(name) + '" allow="accelerometer;autoplay;encrypted-media;gyroscope;picture-in-picture" loading="lazy"></iframe></div>';
    h += '<br>';
  }

  /* Booking Section */
  h += '<div class="section-title">📅 Book a Lesson</div>';
  if (price > 0) {
    h += '<div style="text-align:center;padding:12px;background:var(--teal-soft);border-radius:12px;margin-bottom:16px;"><span style="font-size:24px;font-weight:800;color:var(--teal);">$' + price + '</span><span style="font-size:14px;color:var(--ink-soft);"> /hour</span></div>';
  } else {
    h += '<div style="text-align:center;padding:12px;background:var(--teal-soft);border-radius:12px;margin-bottom:16px;font-size:14px;color:var(--ink-soft);">Contact for pricing</div>';
  }
  h += '<div id="dayPicker" class="day-picker" role="radiogroup" aria-label="Select a day"></div>';
  h += '<div id="slotGrid" class="slot-grid" role="grid" aria-label="Available time slots"></div>';
  h += '<div id="bookingHint" class="booking-hint">Select a day and time to book a lesson</div>';
  h += '<div class="btn-wrap"><button class="btn btn-primary btn-lg" id="bookBtn" onclick="openBookingModal()" aria-label="Book a lesson with ' + safeAttr(name) + '" style="flex:1;">📅 Book a Lesson</button></div>';

  /* Reviews */
  if (reviews.length > 0) {
    h += '<br><div class="section-title">💬 Reviews (' + reviews.length + ')</div>';
    h += reviews.map(function(r) {
      return '<div class="review-card"><div class="review-header"><div class="review-stars">' + '★'.repeat(Math.min(Math.max(r.rating || 0, 0), 5)) + '</div><span class="review-date">' + timeAgo(r.createdAt || r.date || 0) + '</span></div><div class="review-text">' + esc(r.text || r.comment || '') + '</div></div>';
    }).join('');
  }

  return h;
}

function renderDayPicker(schedule) {
  if (!schedule || !schedule.length) return;
  var days = [...new Set(schedule.map(function(s) { return getDayName(s.day); }))];
  var html = days.map(function(d) {
    return '<button class="day-btn' + (d === selectedDay ? ' active' : '') + '" data-day="' + safeAttr(d) + '" onclick="selectDay(\'' + safeAttr(d) + '\')" role="radio" aria-checked="' + (d === selectedDay ? 'true' : 'false') + '">' + esc(d.slice(0, 3)) + '</button>';
  }).join('');
  var el = document.getElementById('dayPicker');
  if (el) el.innerHTML = html;
}

function selectDay(day) {
  selectedDay = day;
  selectedSlot = null;
  document.querySelectorAll('.day-btn').forEach(function(b) {
    var isActive = b.dataset.day === day;
    b.classList.toggle('active', isActive);
    b.setAttribute('aria-checked', isActive ? 'true' : 'false');
  });
  renderSlots();
  updateBookingHint();
}

function renderSlots() {
  var schedule = window._currentSchedule || demoSchedule;
  var daySlots = schedule.filter(function(s) { return getDayName(s.day) === selectedDay; });
  var html = daySlots.map(function(s) {
    var disabledCls = s.available === false ? ' unavailable' : '';
    var selectedCls = s.time === selectedSlot ? ' selected' : '';
    return '<button class="slot' + disabledCls + selectedCls + '" data-time="' + safeAttr(s.time) + '" onclick="selectSlot(\'' + safeAttr(s.time) + '\')"' + (s.available === false ? ' disabled' : '') + ' role="gridcell">' + esc(s.time) + '</button>';
  }).join('');
  var el = document.getElementById('slotGrid');
  if (el) el.innerHTML = html || '<div style="text-align:center;padding:20px;color:var(--ink-soft);font-size:13px;">No available slots for this day.</div>';
}

function selectSlot(time) {
  selectedSlot = time;
  document.querySelectorAll('.slot').forEach(function(s) {
    s.classList.toggle('selected', s.dataset.time === time);
  });
  updateBookingHint();
}

function updateBookingHint() {
  var hint = document.getElementById('bookingHint');
  if (!hint) return;
  if (selectedDay && selectedSlot) {
    hint.textContent = '✅ ' + selectedDay + ' at ' + selectedSlot + ' — You can now book this lesson!';
  } else if (selectedDay) {
    hint.textContent = '📌 ' + selectedDay + ' selected — Choose a time slot above.';
  } else {
    hint.textContent = 'Select a day and time to book a lesson.';
  }
}

function openBookingModal() {
  if (!selectedDay || !selectedSlot) {
    toast('Please select a day and time first', 'error');
    return;
  }
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.setAttribute('role', 'dialog');
  overlay.setAttribute('aria-modal', 'true');
  overlay.setAttribute('aria-label', 'Confirm your booking');
  var price = (teacherData && teacherData.price) || 0;
  var name = teacherData ? esc(teacherData.name || 'Teacher') : 'Teacher';
  overlay.innerHTML =
    '<div class="modal" tabindex="-1">' +
      '<h3>Confirm Booking</h3>' +
      '<div style="padding:16px;background:var(--teal-soft);border-radius:var(--radius-md);margin-bottom:16px;text-align:center;">' +
        '<div style="font-weight:700;font-size:15px;">' + name + '</div>' +
        '<div style="font-size:14px;color:var(--teal);margin-top:4px;">' + esc(selectedDay) + ' &mdash; ' + esc(selectedSlot) + '</div>' +
        '<div style="font-size:22px;font-weight:800;color:var(--teal-dark);margin-top:8px;">$' + price + '</div>' +
      '</div>' +
      '<div style="margin-bottom:4px;">' +
        '<label for="bookingNote">Note (optional)</label>' +
        '<textarea id="bookingNote" placeholder="Any message for the teacher..." style="display:block;width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--bg);color:var(--ink);resize:vertical;min-height:60px;font-family:inherit;margin-top:6px;box-sizing:border-box;"></textarea>' +
      '</div>' +
      '<div style="display:flex;gap:8px;margin-top:16px;">' +
        '<button class="btn btn-primary" id="submitBookBtn" style="flex:1;">📅 Book Now — $' + price + '</button>' +
        '<button class="btn btn-ghost" id="cancelBookBtn">Cancel</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  document.getElementById('submitBookBtn').onclick = submitBooking;
  document.getElementById('cancelBookBtn').onclick = function() { overlay.remove(); };
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  overlay.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') overlay.remove();
    if (e.key === 'Tab') {
      var focusable = overlay.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
      if (focusable.length === 0) return;
      var first = focusable[0];
      var last = focusable[focusable.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    }
  });
  var modal = overlay.querySelector('.modal');
  if (modal) { modal.focus(); }
}

async function ensureTeacherEmail() {
  if (teacherData && teacherData.email) return teacherData.email;
  try {
    var listRes = await kvGet('teachers_list');
    var list = (listRes && listRes.value) || [];
    for (var i = 0; i < list.length; i++) {
      if (list[i].id === getTeacherId() || list[i].email === getTeacherId()) {
        return list[i].email || list[i].id || '';
      }
    }
  } catch(e) {}
  return '';
}

async function submitBooking() {
  var note = document.getElementById('bookingNote')?.value || '';
  var sess = localStorage.getItem('minbar_session');
  var parsed = sess ? JSON.parse(sess) : null;
  var studentName = (parsed && parsed.name) || 'Anonymous Student';
  var studentEmail = (parsed && parsed.email) || '';

  if (!studentEmail) {
    toast('Please log in to book a lesson', 'error');
    return;
  }

  var submitBtn = document.getElementById('submitBookBtn');
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Redirecting to payment...';
  }

  var teacherEmail = await ensureTeacherEmail();

  if (!teacherEmail) {
    toast('Teacher email not found. Please try again later.', 'error');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '📅 Book Now — $' + ((teacherData && teacherData.price) || 0); }
    return;
  }

  try {
    var resp = await fetch('/api/booking-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        teacherId: teacherData ? teacherData.id : '',
        teacherName: teacherData ? teacherData.name : '',
        teacherEmail: teacherEmail,
        studentName: studentName,
        studentEmail: studentEmail,
        day: selectedDay,
        time: selectedSlot,
        price: (teacherData && teacherData.price) || 25,
        note: note,
        duration: 60
      })
    });
    if (!resp.ok) {
      var errText = await resp.text();
      var errData;
      try { errData = JSON.parse(errText); } catch(e) { errData = null; }
      toast((errData && errData.error) || 'Payment error. Please try again.', 'error');
      if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '📅 Book Now — $' + ((teacherData && teacherData.price) || 0); }
      return;
    }
    var data = await resp.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      toast(data.error || 'Payment error. Please try again.', 'error');
      if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '📅 Book Now — $' + ((teacherData && teacherData.price) || 0); }
    }
  } catch (e) {
    toast('Network error. Please try again.', 'error');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '📅 Book Now — $' + ((teacherData && teacherData.price) || 0); }
  }
}

async function loadProfile() {
  var id = getTeacherId();
  if (!id) {
    document.getElementById('profileContainer').innerHTML = '<div class="not-found"><div class="nf-icon">👤</div><h2>No Teacher Specified</h2><p>Please select a teacher from the <a href="teachers.html">teachers page</a>.</p></div>';
    return;
  }
  try {
    var res = await kvGet('teacher:' + id);
    if (res && res.value) {
      teacherData = res.value;
    } else {
      teacherData = null;
    }
  } catch (e) {
    teacherData = null;
  }
  var container = document.getElementById('profileContainer');
  if (!container) return;

  if (!teacherData) {
    container.innerHTML = '<div class="not-found"><div class="nf-icon">👤</div><h2>Teacher Not Found</h2><p>This teacher profile does not exist or has been removed.</p><a href="teachers.html" class="btn btn-primary">Browse Teachers</a></div>';
    return;
  }

  container.innerHTML = renderProfile(teacherData);

  var schedule = teacherData.schedule || null;
  if (schedule && schedule.length && schedule[0] && schedule[0].from && schedule[0].to) {
    var slots = [];
    schedule.forEach(function(entry) {
      var fromParts = (entry.from || '09:00').split(':');
      var toParts = (entry.to || '17:00').split(':');
      var fromH = parseInt(fromParts[0], 10);
      var toH = parseInt(toParts[0], 10);
      if (fromH > toH) return;
      for (var h = fromH; h <= toH; h++) {
        var timeStr = (h < 10 ? '0' : '') + h + ':00';
        if (timeStr >= entry.from && timeStr <= entry.to) {
          slots.push({ day: entry.day, time: timeStr, available: true });
        }
      }
    });
    schedule = slots;
  }
  var finalSchedule = (schedule && schedule.length) ? schedule : demoSchedule;
  renderDayPicker(finalSchedule);
  window._currentSchedule = finalSchedule;
  updateBookingHint();
}

loadProfile();
</script>
