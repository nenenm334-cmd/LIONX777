<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F5C34">
<title>Teacher Login — Minbar</title>
<link rel="stylesheet" href="css/common.css">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<style>
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
/* Decorative background pattern */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(circle at 20% 50%, rgba(13,148,136,.06) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(16,185,129,.05) 0%, transparent 40%);
  pointer-events: none;
}
body.dark::before {
  background: radial-gradient(circle at 20% 50%, rgba(52,211,153,.04) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(52,211,153,.03) 0%, transparent 40%);
}

.auth-wrap {
  width: 100%; max-width: 420px;
  position: relative; z-index: 1;
}

/* Brand header */
.auth-brand {
  text-align: center;
  margin-bottom: 32px;
}
.auth-brand .brand-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--teal), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 800; color: #fff;
  margin: 0 auto 14px;
  box-shadow: 0 4px 20px rgba(13,148,136,.3);
  letter-spacing: -.02em;
}
.auth-brand h1 {
  font-size: 22px; font-weight: 700;
  color: var(--ink); letter-spacing: -.02em;
}
.auth-brand p {
  font-size: 14px; color: var(--ink-soft);
  margin-top: 4px;
}

/* Card */
.auth-card {
  background: var(--card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  padding: 32px;
  box-shadow: var(--shadow-md);
  transition: background var(--transition-smooth), border-color var(--transition-smooth);
}

/* Tabs (Login / Register) */
.auth-tabs {
  display: flex;
  background: var(--bg-alt);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 28px;
}
.auth-tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  border-radius: 7px;
  font-family: inherit;
  font-size: 13px; font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all var(--transition);
}
.auth-tab.active {
  background: var(--card);
  color: var(--teal);
  box-shadow: var(--shadow-sm);
}

/* Form fields */
.auth-field {
  margin-bottom: 18px;
}
.auth-field label {
  display: block;
  font-size: 12px; font-weight: 600;
  color: var(--ink-soft);
  margin-bottom: 6px;
  letter-spacing: .01em;
}
.auth-field input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--ink);
  font-family: inherit;
  font-size: 14px;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.auth-field input:focus {
  outline: none;
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(13,148,136,.1);
}
.auth-field input::placeholder { color: var(--ink-muted); }
.auth-field input.error {
  border-color: var(--rose);
  box-shadow: 0 0 0 3px rgba(220,38,38,.08);
}

/* Password toggle */
.password-wrap {
  position: relative;
}
.password-wrap input {
  padding-right: 44px;
}
.password-toggle {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 32px; height: 32px;
  border: none; background: none;
  color: var(--ink-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-xs);
  transition: color var(--transition-fast);
}
.password-toggle:hover { color: var(--ink-soft); }

/* Remember me */
.auth-options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.remember-wrap {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
}
.remember-wrap input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--teal);
  cursor: pointer;
}
.remember-wrap span {
  font-size: 13px; color: var(--ink-soft);
}
.forgot-link {
  font-size: 13px; color: var(--teal);
  cursor: pointer; font-weight: 500;
  transition: color var(--transition-fast);
}
.forgot-link:hover { color: var(--teal-dark); }

/* Submit button */
.auth-submit {
  width: 100%;
  padding: 13px 24px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--teal), var(--accent));
  color: #fff;
  font-family: inherit;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: 0 2px 10px rgba(13,148,136,.25);
  position: relative;
}
.auth-submit:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(13,148,136,.35);
}
.auth-submit:active {
  transform: translateY(0) scale(.98);
}
.auth-submit:disabled {
  opacity: .5; cursor: not-allowed; transform: none; box-shadow: none;
}
.auth-submit .spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin: 0 auto;
}
.auth-submit.loading .btn-text { display: none; }
.auth-submit.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Error message */
.auth-error {
  display: none;
  padding: 10px 14px;
  background: var(--rose-soft);
  color: var(--rose);
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  margin-bottom: 16px;
  line-height: 1.4;
}
.auth-error.visible { display: block; }

/* Success message */
.auth-success {
  display: none;
  padding: 10px 14px;
  background: var(--green-soft);
  color: var(--green);
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  margin-bottom: 16px;
  line-height: 1.4;
}
.auth-success.visible { display: block; }

/* Footer */
.auth-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  color: var(--ink-muted);
}
.auth-footer a {
  color: var(--teal);
  font-weight: 600;
  text-decoration: none;
}
.auth-footer a:hover { text-decoration: underline; }

/* Back to home */
.back-home {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--ink-soft);
  text-decoration: none;
  margin-bottom: 24px;
  transition: color var(--transition-fast);
}
.back-home:hover { color: var(--teal); text-decoration: none; }

/* Shake animation */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.shake { animation: shake .4s ease; }

/* Toast */
.toast-wrap {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast-item {
  padding: 12px 24px; border-radius: var(--radius-md);
  background: var(--ink); color: var(--bg);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toastIn .3s ease;
  pointer-events: auto;
  white-space: nowrap;
}
.toast-item.success { background: var(--teal); color: #fff; }
.toast-item.error { background: var(--rose); color: #fff; }
@keyframes toastIn { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }

/* Responsive */
@media (max-width: 480px) {
  .auth-card { padding: 24px 20px; }
  .auth-brand h1 { font-size: 20px; }
}
</style>
</head>
<body>
<script>if(localStorage.getItem('minbar_dark')==='true') document.body.classList.add('dark');</script>

<div class="auth-wrap">
  <a href="index.html" class="back-home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Minbar
  </a>

  <div class="auth-brand">
    <div class="brand-icon">M</div>
    <h1>Teacher Portal</h1>
    <p>Manage your classes, students, and content</p>
  </div>

  <div class="auth-card" id="authCard">
    <div class="auth-tabs">
      <button class="auth-tab active" data-mode="login" id="tabLogin">Sign In</button>
      <button class="auth-tab" data-mode="register" id="tabRegister">Create Account</button>
    </div>

    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm" autocomplete="on">
      <div class="auth-field">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="auth-field">
        <label for="loginPassword">Password</label>
        <div class="password-wrap">
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required />
          <button type="button" class="password-toggle" id="loginPassToggle" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="auth-options">
        <label class="remember-wrap">
          <input type="checkbox" id="rememberMe" checked />
          <span>Remember me</span>
        </label>
        <span class="forgot-link" id="forgotBtn">Forgot password?</span>
      </div>
      <button type="submit" class="auth-submit" id="loginSubmit">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" style="display:none;" autocomplete="on">
      <div class="auth-field">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" placeholder="e.g. Ahmad Hassan" autocomplete="name" required />
      </div>
      <div class="auth-field">
        <label for="regEmail">Email Address</label>
        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="auth-field">
        <label for="regPassword">Password</label>
        <div class="password-wrap">
          <input type="password" id="regPassword" placeholder="At least 6 characters" autocomplete="new-password" minlength="6" required />
          <button type="button" class="password-toggle" id="regPassToggle" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="auth-field">
        <label for="regPasswordConfirm">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="regPasswordConfirm" placeholder="Re-enter your password" autocomplete="new-password" minlength="6" required />
          <button type="button" class="password-toggle" id="regConfirmToggle" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="auth-options" style="margin-bottom:20px;">
        <label class="remember-wrap">
          <input type="checkbox" id="regRemember" checked />
          <span>Remember me</span>
        </label>
      </div>
      <button type="submit" class="auth-submit" id="regSubmit">
        <span class="btn-text">Create Account</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <div class="auth-footer">
    <span>Student? </span><a href="index.html">Go to Minbar</a>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
(function(){
  var API = '/api/teacher-auth';
  var SESSION_KEY = 'minbar_teacher_session';

  // ── Check existing session ──
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); } catch(e) {}
  if(saved && saved.email && saved.name) {
    window.location.href = 'dashboard-teacher.html';
    return;
  }

  // ── Elements ──
  var tabLogin = document.getElementById('tabLogin');
  var tabRegister = document.getElementById('tabRegister');
  var loginForm = document.getElementById('loginForm');
  var registerForm = document.getElementById('registerForm');
  var authError = document.getElementById('authError');
  var authSuccess = document.getElementById('authSuccess');
  var authCard = document.getElementById('authCard');

  // ── Toast ──
  function toast(msg, type) {
    var w = document.getElementById('toastWrap');
    var t = document.createElement('div');
    t.className = 'toast-item ' + (type || '');
    t.textContent = msg;
    w.appendChild(t);
    setTimeout(function(){ t.style.opacity = '0'; setTimeout(function(){ t.remove(); }, 300); }, 3000);
  }

  // ── Show/hide error/success ──
  function showError(msg) {
    authError.textContent = msg;
    authError.classList.add('visible');
    authSuccess.classList.remove('visible');
    authCard.classList.remove('shake');
    void authCard.offsetWidth;
    authCard.classList.add('shake');
  }
  function showSuccess(msg) {
    authSuccess.textContent = msg;
    authSuccess.classList.add('visible');
    authError.classList.remove('visible');
  }
  function clearMessages() {
    authError.classList.remove('visible');
    authSuccess.classList.remove('visible');
  }

  // ── Tab switching ──
  function switchTab(mode) {
    clearMessages();
    if(mode === 'login') {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      loginForm.style.display = '';
      registerForm.style.display = 'none';
    } else {
      tabLogin.classList.remove('active');
      tabRegister.classList.add('active');
      loginForm.style.display = 'none';
      registerForm.style.display = '';
    }
  }
  tabLogin.onclick = function(){ switchTab('login'); };
  tabRegister.onclick = function(){ switchTab('register'); };

  // ── Password toggles ──
  function setupToggle(inputId, toggleId) {
    var inp = document.getElementById(inputId);
    var btn = document.getElementById(toggleId);
    if(!inp || !btn) return;
    btn.onclick = function(){
      var showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      btn.innerHTML = showing
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    };
  }
  setupToggle('loginPassword', 'loginPassToggle');
  setupToggle('regPassword', 'regPassToggle');
  setupToggle('regPasswordConfirm', 'regConfirmToggle');

  // ── API call helper ──
  async function apiCall(data) {
    var res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    return await res.json();
  }

  // ── Set loading state ──
  function setLoading(btn, loading) {
    if(loading) {
      btn.classList.add('loading');
      btn.disabled = true;
    } else {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // ── Save session & redirect ──
  function saveSessionAndRedirect(teacher) {
    var session = { email: teacher.email, name: teacher.name, photo: teacher.photo || '' };
    var remember = document.getElementById('rememberMe').checked || document.getElementById('regRemember').checked;
    if(remember) {
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    } else {
      sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
    }
    showSuccess('Welcome, ' + teacher.name + '! Redirecting...');
    setTimeout(function(){ window.location.href = 'dashboard-teacher.html'; }, 800);
  }

  // ── LOGIN ──
  loginForm.onsubmit = async function(e) {
    e.preventDefault();
    clearMessages();
    var email = document.getElementById('loginEmail').value.trim().toLowerCase();
    var password = document.getElementById('loginPassword').value;
    var btn = document.getElementById('loginSubmit');

    if(!email) { showError('Please enter your email'); return; }
    if(!password) { showError('Please enter your password'); return; }

    setLoading(btn, true);
    try {
      var result = await apiCall({ action: 'login', email: email, password: password });
      if(result.error) {
        showError(result.error);
        setLoading(btn, false);
        return;
      }
      if(result.success && result.teacher) {
        saveSessionAndRedirect(result.teacher);
      }
    } catch(err) {
      showError('Connection failed. Please check your network.');
      setLoading(btn, false);
    }
  };

  // ── REGISTER ──
  registerForm.onsubmit = async function(e) {
    e.preventDefault();
    clearMessages();
    var name = document.getElementById('regName').value.trim();
    var email = document.getElementById('regEmail').value.trim().toLowerCase();
    var password = document.getElementById('regPassword').value;
    var confirm = document.getElementById('regPasswordConfirm').value;
    var btn = document.getElementById('regSubmit');

    if(!name) { showError('Please enter your name'); return; }
    if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('Please enter a valid email address'); return;
    }
    if(!password || password.length < 6) {
      showError('Password must be at least 6 characters'); return;
    }
    if(password !== confirm) {
      showError('Passwords do not match'); return;
    }

    setLoading(btn, true);
    try {
      var result = await apiCall({ action: 'register', email: email, password: password, name: name });
      if(result.error) {
        showError(result.error);
        setLoading(btn, false);
        return;
      }
      if(result.success && result.teacher) {
        saveSessionAndRedirect(result.teacher);
      }
    } catch(err) {
      showError('Connection failed. Please check your network.');
      setLoading(btn, false);
    }
  };

  // ── Forgot password ──
  if (document.getElementById('forgotBtn')) {
    document.getElementById('forgotBtn').style.display = 'none';
  }

  // ── Enter key navigation ──
  document.querySelectorAll('.auth-field input').forEach(function(inp){
    inp.addEventListener('keydown', function(e){
      if(e.key === 'Enter') {
        e.preventDefault();
        var form = inp.closest('form');
        if(form) form.requestSubmit();
      }
    });
  });
})();
</script>
</body>
</html>
