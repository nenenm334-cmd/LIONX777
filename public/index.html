/* 90-DAY JOURNEY */
.jrny-wrap{padding-bottom:80px;}
.jrny-header{background:linear-gradient(135deg,var(--teal-dark),var(--teal));border-radius:var(--radius-lg);padding:24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden;}
.jrny-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.06);border-radius:50%;}
.jrny-header h2{margin:0 0 2px;font-size:22px;font-weight:800;}
.jrny-header>p{margin:0 0 14px;font-size:13px;opacity:.8;}
.jrny-srow{display:flex;gap:20px;flex-wrap:wrap;}
.jrny-srow .s{font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;}
.jrny-pbar{height:6px;background:rgba(255,255,255,.2);border-radius:3px;margin-top:14px;overflow:hidden;}
.jrny-pbar span{display:block;height:100%;background:#fff;border-radius:3px;transition:width .6s;}
.jrny-worlds{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.jrny-wcard{border-radius:var(--radius-lg);padding:20px 16px;color:#fff;cursor:pointer;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;min-height:140px;display:flex;flex-direction:column;justify-content:flex-end;}
.jrny-wcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.jrny-wcard.locked{opacity:.3;cursor:not-allowed;filter:grayscale(.5);}
.jrny-wcard.locked:hover{transform:none;box-shadow:none;}
.jrny-wcard .wicon{font-size:32px;margin-bottom:8px;}
.jrny-wcard .wname{font-size:15px;font-weight:800;margin-bottom:2px;}
.jrny-wcard .wsub{font-size:11px;opacity:.8;margin-bottom:8px;}
.jrny-wcard .wprog{height:4px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden;}
.jrny-wcard .wprog span{display:block;height:100%;background:#fff;border-radius:2px;}
.jrny-wcard .winfo{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-top:6px;opacity:.9;}
.jrny-wcard::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:rgba(255,255,255,.07);border-radius:50%;}
.jrny-back{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--ink-soft);font-size:14px;font-weight:600;cursor:pointer;padding:6px 0;margin-bottom:12px;}
.jrny-back:hover{color:var(--teal);}
.jrny-wdh{padding:20px;border-radius:var(--radius-lg);color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
.jrny-wdh .wdi{font-size:28px;margin-bottom:6px;}
.jrny-wdh h3{margin:0 0 2px;font-size:18px;font-weight:800;}
.jrny-wdh .wds{font-size:12px;opacity:.8;margin-bottom:10px;}
.jrny-wdh .wdst{display:flex;gap:16px;font-size:12px;font-weight:700;}
.jrny-wdh::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:rgba(255,255,255,.06);border-radius:50%;}
.jrny-days{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.jrny-day{aspect-ratio:1;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:18px;cursor:pointer;transition:all .2s;border:3px solid transparent;background:var(--card);box-shadow:var(--shadow-sm);position:relative;}
.jrny-day:hover{transform:scale(1.08);}
.jrny-day .dd{font-size:8px;font-weight:600;color:var(--ink-soft);margin-top:1px;text-transform:uppercase;letter-spacing:.5px;}
.jrny-day .ds{position:absolute;bottom:2px;display:flex;}
.jrny-day .ds svg{width:10px;height:10px;}
.jrny-day.locked{opacity:.25;cursor:not-allowed;filter:grayscale(.6);background:var(--bg);}
.jrny-day.locked:hover{transform:none;}
.jrny-day.current{border-color:var(--accent);box-shadow:0 0 0 4px rgba(16,185,129,.2);animation:jPulse 2s infinite;}
.jrny-day.done{border-color:var(--accent);background:var(--accent-soft);}
.jrny-day.done .dd{color:var(--accent);}
.jrny-day.done::after{content:'✓';position:absolute;top:-1px;right:-1px;width:16px;height:16px;background:var(--accent);color:#fff;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;}
@keyframes jPulse{0%,100%{box-shadow:0 0 0 4px rgba(16,185,129,.2)}50%{box-shadow:0 0 0 8px rgba(16,185,129,.08)}}
@media(max-width:400px){.jrny-days{grid-template-columns:repeat(4,1fr);gap:10px;}.jrny-worlds{grid-template-columns:repeat(2,1fr);}}
/* LESSON VIEW */
.lesson-wrap{padding-bottom:80px;}
.lesson-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.lesson-back{background:none;border:none;color:var(--ink-soft);font-size:14px;font-weight:600;cursor:pointer;padding:6px 0;}
.lesson-back:hover{color:var(--teal);}
.lesson-title{font-size:17px;font-weight:800;}
.lesson-player-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:var(--radius-lg);overflow:hidden;background:#000;margin-bottom:16px;}
.lesson-player-wrap iframe,.lesson-player-wrap div{position:absolute;top:0;left:0;width:100%;height:100%;}
.lesson-subs{background:var(--card);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;max-height:280px;overflow-y:auto;border:1px solid var(--border);}
.lesson-sub{padding:10px 12px;border-radius:var(--radius-sm);margin-bottom:4px;transition:all .2s;cursor:pointer;border-left:3px solid transparent;}
.lesson-sub:hover{background:var(--bg);}
.lesson-sub.active{background:var(--accent-soft);border-left-color:var(--accent);}
.sub-ar{font-size:17px;font-weight:700;margin-bottom:3px;line-height:1.7;}
.sub-en{font-size:12px;color:var(--ink-soft);line-height:1.4;}
.lesson-word{display:inline;cursor:pointer;padding:2px 4px;border-radius:4px;transition:all .15s;}
.lesson-word:hover{background:rgba(16,185,129,.15);color:var(--accent);font-weight:800;}
.wp{position:fixed;background:var(--card);border-radius:16px;padding:16px;box-shadow:0 12px 40px rgba(0,0,0,0.18),0 0 0 1px var(--border);z-index:9999;min-width:220px;max-width:300px;border:none;animation:wpIn .2s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(8px);}
@keyframes wpIn{from{opacity:0;transform:translateY(-8px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.wp-word{font-size:22px;font-weight:800;margin-bottom:4px;}
.wp-sub{font-size:12px;color:var(--ink-soft);margin-bottom:12px;}
.wp-btns{display:flex;gap:8px;}
.lesson-ctrls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
.lesson-done-btn{padding:12px 28px;border-radius:var(--radius-md);background:var(--accent);color:#fff;font-weight:700;font-size:15px;border:none;cursor:pointer;transition:all .2s;}
.lesson-done-btn:hover{opacity:.9;transform:translateY(-1px);}
.lesson-empty{text-align:center;padding:60px 20px;}
.le-icon{font-size:64px;margin-bottom:16px;}
.lesson-empty h3{margin:0 0 8px;font-size:20px;}
.lesson-empty p{color:var(--ink-soft);margin:0 0 16px;font-size:14px;}
.vid-mgr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;}
.vid-mgr-item{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;display:flex;flex-direction:column;gap:4px;}
.vid-mgr-item label{font-size:11px;font-weight:700;color:var(--ink-soft);}
.vid-mgr-item input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;background:var(--card);}
.vid-mgr-item .vid-ok{font-size:10px;color:var(--accent);font-weight:600;}
.sub-loading{text-align:center;padding:20px;color:var(--ink-soft);font-size:13px;}
.sub-off{display:none;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* IMPORT LESSON */
.import-wrap{padding-bottom:80px;}
.import-steps{display:flex;align-items:center;gap:0;margin-bottom:20px;padding:0 8px;}
.import-steps .is{display:flex;align-items:center;gap:0;}
.import-steps .isc{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:var(--bg);color:var(--ink-soft);border:2px solid var(--border);transition:all .3s;flex-shrink:0;}
.import-steps .isc.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.import-steps .isc.done{background:var(--accent);color:#fff;border-color:var(--accent);}
.import-steps .isl{width:40px;height:2px;background:var(--border);flex-shrink:0;transition:background .3s;}
.import-steps .isl.done{background:var(--accent);}
.import-steps .isll{font-size:10px;color:var(--ink-soft);text-align:center;margin-top:4px;font-weight:600;}
.import-thumb-wrap{display:grid;grid-template-columns:220px 1fr;gap:16px;margin:16px 0;}
.import-thumb{width:100%;border-radius:var(--radius-sm);aspect-ratio:16/9;object-fit:cover;background:#000;}
.import-subs-view{max-height:220px;overflow-y:auto;background:var(--bg);border-radius:var(--radius-sm);padding:10px;font-size:12px;border:1px solid var(--border);margin:8px 0;}
.import-subs-view .isv-line{margin-bottom:4px;line-height:1.5;}
.import-subs-view .isv-t{color:var(--accent);font-weight:700;margin-right:6px;}
.import-subs-editor{width:100%;min-height:140px;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:monospace;resize:vertical;background:var(--card);color:var(--ink);line-height:1.5;}
.import-progress{margin:16px 0;}
.import-pstep{display:flex;align-items:center;gap:10px;padding:10px 0;font-size:13px;}
.import-pstep .ips-icon{width:20px;text-align:center;flex-shrink:0;}
.import-pstep .ips-spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:ispin .6s linear infinite;display:inline-block;}
.import-pstep.ok{color:var(--accent);}
.import-pstep.err{color:var(--rose);}
@keyframes ispin{to{transform:rotate(360deg)}}
.ai-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;vertical-align:middle;}
/* ENRICHED LESSON */
.lesson-vocab{background:var(--card);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;border:1px solid var(--border);}
.lesson-vocab h3{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:6px;}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
.vocab-item{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;transition:all .15s;border:1px solid transparent;}
.vocab-item:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.vocab-item .vw{font-size:16px;font-weight:700;margin-bottom:2px;}
.vocab-item .vm{font-size:11px;color:var(--ink-soft);}
.vocab-item .vlvl{display:inline-block;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700;background:var(--accent-soft);color:var(--accent);margin-top:4px;}
.lesson-quiz-mini{background:var(--card);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;border:1px solid var(--border);}
.lesson-quiz-mini h3{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:6px;}
.lqm-q{font-size:14px;font-weight:700;margin-bottom:10px;}
.lq-option{display:block;width:100%;text-align:left;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--ink);font-size:13px;cursor:pointer;margin-bottom:6px;transition:all .15s;}
.lq-option:hover{border-color:var(--accent);background:var(--accent-soft);}
.lq-option.correct{border-color:var(--accent);background:var(--accent-soft);font-weight:700;}
.lq-option.wrong{border-color:var(--rose);background:var(--rose-soft);color:var(--rose);}
.lq-option.disabled{pointer-events:none;opacity:.6;}
.lqm-nav{display:flex;gap:10px;align-items:center;margin-top:12px;}
.lqm-score{font-size:13px;font-weight:700;color:var(--accent);}
.lqm-next{padding:8px 16px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;}
@media(max-width:480px){.import-thumb-wrap{grid-template-columns:1fr;}.vocab-grid{grid-template-columns:1fr 1fr;}}
/* ================= VOCABULARY LIBRARY ================= */
.lib-wrap{padding-bottom:80px;}
.lib-header{background:linear-gradient(135deg,#0ea5e9,#8b5cf6);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px;color:#fff;text-align:center;}
.lib-header h2{margin:0 0 6px;font-size:22px;}
.lib-header p{margin:0;font-size:13px;opacity:.85;}
.lib-header .lib-hstats{display:flex;gap:14px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.lib-header .lib-hstats span{font-size:12px;font-weight:600;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px;}
.lib-cat{border-radius:16px;padding:0;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);color:#fff;position:relative;overflow:hidden;min-height:170px;display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.lib-cat:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 12px 28px rgba(0,0,0,.18);}
.lib-cat .cat-bg{position:absolute;inset:0;z-index:0;}
.lib-cat .cat-bg .circle1{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08);}
.lib-cat .cat-bg .circle2{position:absolute;bottom:-30px;left:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05);}
.lib-cat .cat-bg .dots{position:absolute;top:12px;left:12px;width:30px;height:30px;background-image:radial-gradient(rgba(255,255,255,.12) 1px,transparent 1px);background-size:6px 6px;}
.lib-cat .lci{width:30px;height:30px;margin-bottom:6px;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1));}
.lsvg,.lib-cat .lsvg,.tc-icon .lsvg{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1);}
.lib-cat .lcn{font-size:14px;font-weight:700;margin-bottom:2px;letter-spacing:-.2px;text-shadow:0 1px 3px rgba(0,0,0,.1);}
.lib-cat .lce{font-size:10px;opacity:.65;font-weight:500;margin-bottom:4px;text-shadow:0 1px 2px rgba(0,0,0,.08);}
.lib-cat .lcc{font-size:10px;opacity:.75;line-height:1.35;margin-bottom:0;}
.lib-cat .lcb{display:inline-flex;align-items:center;gap:3px;margin-top:8px;font-size:9px;font-weight:700;background:rgba(255,255,255,.12);backdrop-filter:blur(6px);padding:3px 9px;border-radius:6px;align-self:flex-start;border:1px solid rgba(255,255,255,.08);}
.lib-cat .cat-inner{padding:16px;flex:1;display:flex;flex-direction:column;position:relative;z-index:1;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.18) 100%);}
.lib-cat .cat-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:80%;height:40px;background:linear-gradient(180deg,rgba(255,255,255,.15),transparent);border-radius:0 0 50% 50%;pointer-events:none;}
.lib-back{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:14px;color:var(--ink);display:inline-flex;align-items:center;gap:6px;}
.lib-back:hover{border-color:var(--accent);}
.lib-templates{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.lib-tcard{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:0;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.lib-tcard:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.1);}
.lib-tcard .tc-accent{height:3px;width:100%;}
.lib-tcard .tc-body{padding:14px 14px 12px;}
.lib-tcard .tc-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px;color:#fff;padding:7px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.lib-tcard .tc-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.lib-tcard .tc-name-en{font-size:10px;color:var(--ink-soft);margin-bottom:6px;font-weight:500;}
.lib-tcard .tc-desc{font-size:11px;color:var(--ink-soft);margin-bottom:10px;line-height:1.45;}
.lib-tcard .tc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.lib-tcard .tc-meta span{font-size:9px;padding:2px 9px;border-radius:7px;background:var(--bg);color:var(--ink-soft);font-weight:600;border:1px solid var(--border);}
.lib-tcard .tc-progress{height:4px;border-radius:3px;background:var(--bg);overflow:hidden;}
.lib-tcard .tc-progress span{display:block;height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.lib-tcard .tc-lock{position:absolute;top:12px;right:12px;font-size:12px;opacity:.4;background:rgba(0,0,0,.06);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.05);}
.lib-info{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;}
.lib-info .li-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;}
.lib-info .li-row .li-stat{flex:1;min-width:100px;background:var(--bg);border-radius:var(--radius-sm);padding:12px;text-align:center;}
.lib-info .li-row .li-stat .li-num{font-size:22px;font-weight:800;color:var(--teal);}
.lib-info .li-row .li-stat .li-lab{font-size:11px;color:var(--ink-soft);}
.lib-stage-grid{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap;}
.lib-stage{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;cursor:pointer;transition:all .2s;border:2px solid var(--border);background:var(--bg-card);color:var(--ink-soft);flex-shrink:0;}
.lib-stage.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);}
.lib-stage.complete{background:var(--accent);color:#fff;border-color:var(--accent);}
.lib-stage.locked{opacity:.4;cursor:not-allowed;}
.lib-stage .ls-check{font-size:16px;}
.lib-word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin:12px 0;}
.lib-word-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;cursor:pointer;transition:all .2s;position:relative;}
.lib-word-card:hover{border-color:var(--accent);}
.lib-word-card.revealed{background:var(--accent-soft);border-color:var(--accent);}
.lib-word-card .lw-ar{font-size:18px;font-weight:700;margin-bottom:2px;direction:rtl;text-align:right;}
.lib-word-card .lw-en{font-size:12px;color:var(--ink-soft);margin-bottom:2px;}
.lib-word-card .lw-pr{font-size:11px;color:var(--ink-soft);font-style:italic;}
.lib-word-card .lw-status{position:absolute;top:6px;right:6px;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;}
.lib-word-card .lw-status.new{background:var(--blue);color:#fff;}
.lib-word-card .lw-status.learning{background:var(--accent);color:#fff;}
.lib-word-card .lw-status.review{background:var(--accent-soft);color:var(--accent);}
.lib-word-card .lw-status.mastered{background:var(--teal-dark);color:#fff;}
.lib-progress{height:8px;border-radius:4px;background:var(--bg);overflow:hidden;margin:12px 0;}
.lib-progress span{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--teal));transition:width .4s;}
.lib-review{text-align:center;padding:20px;}
.lib-review .lr-word{font-size:36px;font-weight:800;margin-bottom:10px;direction:rtl;}
.lib-review .lr-meaning{font-size:18px;color:var(--teal);margin-bottom:6px;}
.lib-review .lr-pron{font-size:14px;color:var(--ink-soft);font-style:italic;margin-bottom:12px;}
.lib-review .lr-example{font-size:13px;color:var(--ink-soft);background:var(--bg);border-radius:var(--radius-sm);padding:10px;margin:10px 0;line-height:1.6;direction:rtl;}
.lib-review .lr-actions{display:flex;gap:10px;justify-content:center;margin-top:16px;}
.lib-review .lr-actions button{padding:12px 28px;font-size:15px;font-weight:700;border-radius:var(--radius-md);border:none;cursor:pointer;transition:all .15s;}
.lib-review .lr-actions .lr-know{background:var(--accent);color:#fff;}
.lib-review .lr-actions .lr-know:hover{transform:scale(1.05);}
.lib-review .lr-actions .lr-dont{background:var(--rose);color:#fff;}
.lib-review .lr-actions .lr-dont:hover{transform:scale(1.05);}
.lib-review .lr-progress{font-size:12px;color:var(--ink-soft);margin-top:10px;}
.lib-clear{clear:both;}
.lib-search{margin-bottom:14px;}
.lib-search input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-size:14px;background:var(--bg-card);color:var(--ink);transition:border-color .15s;}
.lib-search input:focus{border-color:var(--accent);outline:none;}
@media(max-width:480px){.lib-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}.lib-templates{grid-template-columns:1fr;}.lib-word-grid{grid-template-columns:1fr 1fr;}.lib-review .lr-word{font-size:28px;}}

/* ── Onboarding ── */
.onboard-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.onboard-overlay.show{display:flex;}
.onboard-card{background:var(--card,#fff);border-radius:20px;width:90%;max-width:420px;padding:40px 32px 32px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:onboardIn .4s ease;position:relative;overflow:hidden;}
@keyframes onboardIn{from{opacity:0;transform:scale(.9) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.onboard-progress{display:flex;gap:6px;justify-content:center;margin-bottom:24px;}
.onboard-dot{width:8px;height:8px;border-radius:50%;background:var(--border,#e5e7eb);transition:all .3s;}
.onboard-dot.active{width:24px;border-radius:4px;background:var(--teal,#0d9488);}
.onboard-icon{font-size:56px;margin-bottom:16px;}
.onboard-title{font-size:22px;font-weight:800;color:var(--ink,#111827);margin-bottom:8px;letter-spacing:-.03em;}
.onboard-desc{font-size:14px;color:var(--ink-soft,#6b7280);line-height:1.6;margin-bottom:24px;max-width:320px;margin-left:auto;margin-right:auto;}
.onboard-btn{display:inline-block;padding:12px 32px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .2s;font-family:inherit;}
.onboard-btn-primary{background:linear-gradient(135deg,var(--teal,#0d9488),var(--teal-dark,#0a7e6e));color:#fff;box-shadow:0 4px 12px rgba(13,148,136,.25);}
.onboard-btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(13,148,136,.35);}
.onboard-skip{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--ink-muted,#9ca3af);font-size:12px;cursor:pointer;padding:8px;font-family:inherit;}
.onboard-skip:hover{color:var(--ink-soft,#6b7280);}
/* ---------- ARABIC SENTENCES FACTORY ---------- */
.sf-levels{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.sf-level{position:relative;padding:7px 18px;border-radius:999px;border:1.5px solid var(--border);background:var(--bg-card);cursor:pointer;font-weight:700;font-size:12px;color:var(--ink-soft);transition:all .15s ease;font-family:'Tajawal',sans-serif;}
.sf-level:hover{border-color:var(--teal);color:var(--teal);}
.sf-level.active{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:0 2px 8px rgba(13,148,136,.25);}
.sf-categories{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.sf-categories::-webkit-scrollbar{display:none;}
.sf-cat{padding:5px 12px;border-radius:8px;border:1px solid var(--border-subtle);background:var(--bg-card);cursor:pointer;font-weight:500;font-size:11px;color:var(--ink-soft);white-space:nowrap;transition:all .15s ease;font-family:'Tajawal',sans-serif;}
.sf-cat:hover{border-color:var(--accent);color:var(--accent);}
.sf-cat.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
.sf-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 24px;margin-bottom:16px;box-shadow:var(--shadow);text-align:center;}
.sf-arabic{font-family:'Cairo',sans-serif;font-size:clamp(28px,6vw,40px);color:var(--ink);line-height:1.6;direction:rtl;font-weight:600;}
.sf-translation{font-size:14px;color:var(--ink-soft);margin-bottom:16px;min-height:20px;cursor:pointer;transition:opacity .2s;}
.sf-translation:hover{opacity:.8;}
.sf-trans-hint{font-size:11px;color:var(--ink-soft);margin-bottom:12px;opacity:.6;}
.sf-words{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;direction:rtl;}
.sf-word{font-family:'Cairo',sans-serif;font-size:18px;padding:6px 14px;border-radius:8px;background:var(--bg);border:1px solid var(--border-subtle);transition:all .3s ease;font-weight:600;}
.sf-word.correct{background:var(--green-soft);border-color:var(--green);color:var(--green);}
.sf-word.partial{background:#fef3c7;border-color:#d97706;color:#d97706;}
.sf-word.incorrect{background:var(--rose-soft);border-color:var(--rose);color:var(--rose);}
.sf-word.pending{opacity:.6;}
.sf-record-btn{width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--teal),var(--accent));color:#fff;cursor:pointer;font-size:28px;box-shadow:0 4px 20px rgba(13,148,136,.35);transition:all .2s ease;margin:0 auto;display:flex;align-items:center;justify-content:center;}
.sf-record-btn:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(13,148,136,.45);}
.sf-record-btn:active{transform:scale(.95);}
.sf-record-btn.recording{background:linear-gradient(135deg,var(--rose),#ef4444);box-shadow:0 4px 20px rgba(220,38,38,.35);animation:sfPulse 1s infinite;}
@keyframes sfPulse{0%,100%{box-shadow:0 4px 20px rgba(220,38,38,.35)}50%{box-shadow:0 4px 30px rgba(220,38,38,.55)}}
.sf-record-label{font-size:12px;color:var(--ink-soft);margin-top:8px;text-align:center;}
.sf-score-wrap{text-align:center;margin-bottom:16px;}
.sf-score{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:999px;font-weight:800;font-size:18px;}
.sf-score.excellent{background:var(--green-soft);color:var(--green);}
.sf-score.good{background:var(--accent-soft);color:var(--accent);}
.sf-score.fair{background:#fef3c7;color:#d97706;}
.sf-score.low{background:var(--rose-soft);color:var(--rose);}
.sf-score .sf-label{font-size:12px;font-weight:600;opacity:.8;}
.sf-nav{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.sf-nav button{padding:10px 20px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg-card);cursor:pointer;font-weight:600;font-size:13px;color:var(--ink-soft);transition:all .15s ease;font-family:'Tajawal',sans-serif;}
.sf-nav button:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-soft);}
.sf-nav button:disabled{opacity:.3;cursor:not-allowed;transform:none!important;}
.sf-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:18px;}
.sf-stat{text-align:center;padding:12px 8px;background:var(--bg);border-radius:var(--radius-md);border:1px solid var(--border-subtle);}
.sf-stat-val{font-size:20px;font-weight:800;color:var(--teal);}
.sf-stat-label{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.3px;font-weight:700;margin-top:2px;}
.sf-xp-bar{height:8px;border-radius:4px;background:var(--border-subtle);overflow:hidden;margin-bottom:4px;}
.sf-xp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--teal),var(--accent));transition:width .5s ease;}
.sf-xp-label{font-size:10px;color:var(--ink-soft);font-weight:600;display:flex;justify-content:space-between;}
.sf-empty{text-align:center;padding:40px 20px;color:var(--ink-soft);}
.sf-empty .sf-empty-icon{font-size:48px;margin-bottom:12px;opacity:.5;}
.sf-empty h3{font-family:'Amiri',serif;font-size:20px;margin:0 0 6px;color:var(--ink);}
.sf-empty p{font-size:13px;margin:0 0 20px;line-height:1.5;}

.sf-listen-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-card);cursor:pointer;font-size:20px;color:var(--teal);display:inline-flex;align-items:center;justify-content:center;transition:all .15s ease;margin-bottom:8px;vertical-align:middle;}
.sf-sess-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sf-sess-bar{flex:1;height:6px;border-radius:3px;background:var(--border-subtle);overflow:hidden;}
.sf-sess-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s ease;}
.sf-sess-label{font-size:11px;color:var(--ink-soft);font-weight:600;white-space:nowrap;}
.sf-card{animation:sfFadeIn .3s ease;}
@keyframes sfFadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.sf-listen-btn:hover{border-color:var(--teal);background:var(--teal-soft);transform:scale(1.05);}
.sf-listen-btn:active{transform:scale(.95);}
.sf-arabic-wrap{display:flex;align-items:center;justify-content:center;gap:12px;margin:8px 0 16px;}
.sf-not-supported{text-align:center;padding:30px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);}
.sf-not-supported h3{font-family:'Amiri',serif;font-size:18px;margin:0 0 10px;}
.sf-not-supported p{font-size:13px;color:var(--ink-soft);line-height:1.5;margin:0;}
</style>
</head>

/* ================= SERVER-BACKED STORAGE SHIM =================
   Polyfills the same window.storage.get/set/delete/list contract that
   Claude artifacts provide, but backed by this project's own Express +
   SQLite API (see src/routes/kv.js). No changes were needed anywhere
   else in the app below — it still just calls window.storage.* exactly
   as before. The "shared" flag is accepted for API compatibility but is
   not otherwise meaningful here, since this deployment has a single
   classroom database rather than per-account sandboxes. */
(function () {
const API_BASE = '/api/kv';
/* Set API_SECRET to the same value as the Vercel env var API_SECRET.
   Leave empty if the API has no auth configured (dev mode). */
const API_SECRET = '';
  async function parseJsonSafe(res) {
    try { return await res.json(); } catch (e) { return null; }
  }
  function authHeaders() {
    const h = { 'Content-Type': 'application/json' };
    if (API_SECRET) h['Authorization'] = 'Bearer ' + API_SECRET;
    return h;
  }

  const fetchCache = {};
  function fetchWithTimeout(url, opts, ms) {
    const ck = url + '|' + (opts?.method||'GET');
    if (opts?.method !== 'PUT' && opts?.method !== 'DELETE' && fetchCache[ck]) return fetchCache[ck];
    const c = new AbortController();
    const timer = setTimeout(() => c.abort(), ms || 10000);
    const p = fetch(url, { ...opts, signal: c.signal }).then(r => { clearTimeout(timer); return r; }).catch(e => { clearTimeout(timer); throw e; });
    if (opts?.method !== 'PUT' && opts?.method !== 'DELETE') fetchCache[ck] = p;
    return p;
  }
  window.storage = {
    async get(key, shared) {
      const res = await fetchWithTimeout(API_BASE + '?key=' + encodeURIComponent(key), {
        headers: API_SECRET ? { 'Authorization': 'Bearer ' + API_SECRET } : {}
      });
      if (res.status === 401) throw new Error('Unauthorized — check API_SECRET');
      if (!res.ok) throw new Error('storage.get failed with status ' + res.status);
      const data = await parseJsonSafe(res);
      if (!data) throw new Error('storage.get received an invalid response');
      return { key: data.key, value: data.value, shared: !!shared };
    },
    async set(key, value, shared) {
      delete fetchCache[API_BASE + '?key=' + encodeURIComponent(key) + '|GET'];
      const res = await fetch(API_BASE + '?key=' + encodeURIComponent(key), {
        method: 'PUT',
        headers: authHeaders(),
        body: JSON.stringify({ value }),
      });
      if (res.status === 401) throw new Error('Unauthorized — check API_SECRET');
      if (!res.ok) throw new Error('storage.set failed with status ' + res.status);
      const data = await parseJsonSafe(res);
      if (!data) throw new Error('storage.set received an invalid response');
      return { key: data.key, value: data.value, shared: !!shared };
    },
    async delete(key, shared) {
      Object.keys(fetchCache).forEach(k => delete fetchCache[k]);
      const res = await fetch(API_BASE + '?key=' + encodeURIComponent(key), {
        method: 'DELETE',
        headers: API_SECRET ? { 'Authorization': 'Bearer ' + API_SECRET } : {}
      });
      if (res.status === 401) throw new Error('Unauthorized — check API_SECRET');
      if (!res.ok) throw new Error('storage.delete failed with status ' + res.status);
      const data = await parseJsonSafe(res);
      if (!data) throw new Error('storage.delete received an invalid response');
      return { key: data.key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared) {
      const url = API_BASE + (prefix ? '?prefix=' + encodeURIComponent(prefix) : '');
      const res = await fetch(url, {
        headers: API_SECRET ? { 'Authorization': 'Bearer ' + API_SECRET } : {}
      });
      if (res.status === 401) throw new Error('Unauthorized — check API_SECRET');
      if (!res.ok) throw new Error('storage.list failed with status ' + res.status);
      const data = await parseJsonSafe(res);
      if (!data) throw new Error('storage.list received an invalid response');
      return { keys: data.keys, prefix: prefix, shared: !!shared };
    },
  };
})();
</script>

}
function generateDeviceId(){
  const raw = [screen.width+'x'+screen.height, navigator.language, navigator.platform, navigator.userAgent.substring(0,120), new Date().getTimezoneOffset()].join('|');
  let h = 5381; for(let i=0;i<raw.length;i++){ h=((h<<5)+h)+raw.charCodeAt(i); h=h&h; }
  return 'dev_'+Math.abs(h).toString(36);
}
function parseUA(ua){
  let os='Unknown', browser='Unknown';
  if(/Windows/i.test(ua)) os='Windows'; else if(/Mac OS/i.test(ua)) os='macOS'; else if(/Linux/i.test(ua)) os='Linux'; else if(/Android/i.test(ua)) os='Android'; else if(/iPhone|iPad|iPod/i.test(ua)) os='iOS';
  if(/Edg\//i.test(ua)) browser='Edge'; else if(/Chrome/i.test(ua)) browser='Chrome'; else if(/Firefox/i.test(ua)) browser='Firefox'; else if(/Safari/i.test(ua)) browser='Safari';
  return {os, browser};
}

async function registerStudent(email, name, password, avatar, teacherEmail){
  try {
    var r = await fetch('/api/student-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'register', email: email, password: password, name: name, avatar: avatar || '', teacherEmail: teacherEmail || '' })
    });
    var data = await r.json();
    if (data.ok) return data.user;
    return { error: data.error || 'register_failed' };
  } catch(e) { return { error: 'network_error' }; }
}
async function loginStudent(email, password){
  try {
    var r = await fetch('/api/student-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', email: email, password: password })
    });
    var data = await r.json();
    if (data.ok) return { success: true, avatar: data.user.avatar || null, name: data.user.name || email.split('@')[0], email: data.user.email, teacherEmail: data.user.teacherEmail || '' };
    return { error: data.error || 'login_failed' };
  } catch(e) { return { error: 'network_error' }; }
}
async function loadAllStudents(){
  try{
    const res=await storage.list('user:',true); const list=[];
    for(const k of(res.keys||[])){try{const d=await storage.get(k,true);list.push(d.value);}catch(e){}}
    list.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    return list;
  }catch(e){return[];}

function ytId(url){if(!url)return null;const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&?#]+)/);return m?m[1]:null;}
async function fetchYTSubsClient(videoId){
  try{
    const r=await fetch('/api/youtube-subs?videoId='+encodeURIComponent(videoId));
    if(!r.ok)return[];
    const d=await r.json();
    if(d.subs&&d.subs.length)return d.subs;
    return[];
  }catch(e){return[];}
}
async function fetchYTSubsBrowser(videoId){
  try{
    const langs=['ar','ar-SA','en'];
    for(const lang of langs){
      const url='https://www.youtube.com/api/timedtext?v='+videoId+'&lang='+lang+'&fmt=json3';
      const r=await fetch(url);
      if(!r.ok)continue;
      const txt=await r.text();
      if(!txt||txt.length<10)continue;
      const d=JSON.parse(txt);
      if(!d.events)continue;
      const subs=[];
      for(const ev of d.events){if(!ev.segs)continue;const t=ev.segs.map(s=>s.utf8).join('').trim();if(t)subs.push({start:(ev.tStartMs||0)/1000,dur:(ev.dDurationMs||0)/1000,text:t});}
      if(subs.length)return subs;
    }
    return[];
  }catch(e){return[];}
}
async function fetchYTSubs(videoId){
  let subs=await fetchYTSubsClient(videoId);
  if(!subs.length)subs=await fetchYTSubsBrowser(videoId);

    if(!r.ok)return[];
    const txt=await r.text();
    if(!txt||txt.length<10)return[];
    const d=JSON.parse(txt);
    if(!d.events)return[];
    const subs=[];
    for(const ev of d.events){if(!ev.segs)continue;const t=ev.segs.map(s=>s.utf8).join('').trim();if(t)subs.push({start:(ev.tStartMs||0)/1000,dur:(ev.dDurationMs||0)/1000,text:t});}

async function quickExtract(){
  const url=document.getElementById('qeUrl')?.value?.trim();
  const day=document.getElementById('qeDay')?.value||'1';
  const log=document.getElementById('qeLog');
  if(!url){toast('Enter a YouTube URL');return;}
  const vid=parseYTUrl(url);
  if(!vid){toast('Invalid YouTube URL');return;}
  log.innerHTML='<div style="color:var(--accent);">⏳ Extracting Arabic subtitles...</div>';
  let subs=[];
  try{
    const pr=await fetch('https://www.youtube.com/youtubei/v1/player',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({context:{client:{clientName:'WEB',clientVersion:'2.20250715.00.00',hl:'en',gl:'US'}},videoId:vid})});
    const pd=await pr.json();
    const tracks=pd?.captions?.playerCaptionsTracklistRenderer?.captionTracks;
    if(tracks&&tracks.length){
      const arTrack=tracks.find(t=>t.languageCode==='ar')||tracks.find(t=>t.languageCode==='ar-SA')||tracks[0];
      if(arTrack&&arTrack.baseUrl){
        const sr=await fetch(arTrack.baseUrl,{headers:{'Referer':'https://www.youtube.com/'}});
        const xml=await sr.text();
        const re=/<text start="([\d.]+)" dur="([\d.]+)"[^>]*>([\s\S]*?)<\/text>/g;
        let m;
        while((m=re.exec(xml))!==null){
          const text=m[3].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&#x27;/g,"'").replace(/\n/g,' ').trim();
          if(text)subs.push({start:parseFloat(m[1]),dur:parseFloat(m[2]),text,translation:'',words:[]});
        }
      }
    }
  }catch(e){}
  if(!subs.length){
    try{
      const r=await fetch('https://www.youtube.com/api/timedtext?v='+vid+'&lang=ar&fmt=json3');
      if(r.ok){
        const txt=await r.text();
        if(txt&&txt.length>10){
          const d=JSON.parse(txt);
          if(d.events){
            for(const ev of d.events){
              if(!ev.segs)continue;
              const text=ev.segs.map(s=>s.utf8).join('').trim();
              if(text)subs.push({start:(ev.tStartMs||0)/1000,dur:(ev.dDurationMs||0)/1000,text,translation:'',words:[]});
            }
          }
        }
      }
    }catch(x){}
  }
  if(!subs.length){
    log.innerHTML='<div style="color:var(--rose);">✗ Arabic subtitles not found. Video may not have Arabic captions.</div>';
    return;
  }
  log.innerHTML='<div style="color:var(--accent);">⏳ Found '+subs.length+' Arabic lines. Saving...</div>';
  let title='',channel='',thumbnail='';
  try{const mr=await fetch('/api/lesson-import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'fetchMeta',videoId:vid})});const md=await mr.json();title=md.title||'';channel=md.channel||'';thumbnail=md.thumbnail||'';}catch(x){}
  try{
    const sr=await fetch('/api/quick-extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',videoId:vid,dayNumber:parseInt(day),subs,title,channel,thumbnail})});
    const sd=await sr.json();
    if(sd.ok){
      log.innerHTML='<div style="color:var(--accent);">✓ Day '+day+' saved! '+subs.length+' Arabic subtitle lines synced with video.</div>';
      toast(ico('check')+' Day '+day+' Arabic lesson saved!');
    }else{
      log.innerHTML='<div style="color:var(--rose);">✗ Save failed: '+escapeHtml(sd.error||'')+'</div>';
    }
  }catch(e){log.innerHTML='<div style="color:var(--rose);">✗ Error: '+escapeHtml(e.message)+'</div>';}
}

      }

function parseManualSubs(text){
  if(!text||!text.trim())return[];
  const lines=text.trim().split('\n').map(l=>l.trim());
  const subs=[];let t=0;
  const isTimestamp=l=>l.match(/^\d{2}:\d{2}[,.]\d{3}\s*-->/)||l.match(/^\d{2}:\d{2}:\d{2}[,.]\d{3}\s*-->/);
  const isBlockNum=l=>l.match(/^\d+$/);
  const isHeader=l=>l.match(/^WEBVTT/)||l.match(/^Kind:/)||l.match(/^Language:/)||l.match(/^NOTE/);
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(!line||isHeader(line)||isBlockNum(line)){i++;continue;}
    if(isTimestamp(line)){
      const srtFull=line.match(/^(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
      const vttShort=line.match(/^(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2})[,.](\d{3})/);
      if(srtFull){
        const start=parseInt(srtFull[1])*3600+parseInt(srtFull[2])*60+parseInt(srtFull[3])+parseInt(srtFull[4])/1000;
        const end=parseInt(srtFull[5])*3600+parseInt(srtFull[6])*60+parseInt(srtFull[7])+parseInt(srtFull[8])/1000;
        i++;
        const textLines=[];
        while(i<lines.length&&lines[i]&&!isTimestamp(lines[i])&&!isBlockNum(lines[i])&&!isHeader(lines[i])){
          textLines.push(lines[i]);i++;
        }
        const txt=textLines.join(' ').trim();
        if(txt){subs.push({start,dur:Math.max(end-start,1),text:txt});}
        continue;
      }
      if(vttShort){
        const start=parseInt(vttShort[1])*60+parseInt(vttShort[2])+parseInt(vttShort[3])/1000;
        const end=parseInt(vttShort[4])*60+parseInt(vttShort[5])+parseInt(vttShort[6])/1000;
        i++;
        const textLines=[];
        while(i<lines.length&&lines[i]&&!isTimestamp(lines[i])&&!isBlockNum(lines[i])&&!isHeader(lines[i])){
          textLines.push(lines[i]);i++;
        }
        const txt=textLines.join(' ').trim();
        if(txt){subs.push({start,dur:Math.max(end-start,1),text:txt});}
        continue;
      }
    }
    subs.push({start:t,dur:3,text:line});t+=3;i++;
  }
  return subs;
}

async function impProcess(){
  const provider=document.getElementById('impProvider')?.value||getAIProvider();
  const apiKey=document.getElementById('impApiKey')?.value?.trim()||(provider==='gemini'?getGeminiKey():getOpenAIKey());
  if(!apiKey){toast('Enter a '+(provider==='gemini'?'Gemini':'OpenAI')+' API key to use AI processing');return;}
  setAIProvider(provider);
  if(provider==='gemini'){if(apiKey!==getGeminiKey())setGeminiKey(apiKey);}
  else{if(apiKey!==getOpenAIKey())setOpenAIKey(apiKey);}
  const manualText=document.getElementById('impSubsArea')?.value||'';
  let subs=_imp.rawSubs;
  if(!subs.length&&manualText.trim())subs=parseManualSubs(manualText);
  if(!subs.length){toast('No subtitles to process');return;}
  const provLabel=provider==='gemini'?'Gemini':'OpenAI';
  _imp.processing=true;_imp.processLog.push({text:'Sending to '+provLabel+' for AI processing...',status:'pending'});render();
  try{
    const r=await fetch('/api/lesson-import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'processAI',subs,apiKey,title:_imp.title,provider})});
    if(!r.ok){const err=await r.json();throw new Error(err.error||'Request failed');}
    const data=await r.json();_imp.vocab=data.vocab||[];_imp.quiz=data.quiz||[];
    if(data.subs&&data.subs.length)_imp.rawSubs=data.subs;
    _imp.processLog[_imp.processLog.length-1]={text:'AI processing complete ✓ ('+_imp.vocab.length+' words, '+_imp.quiz.length+' questions)',status:'ok'};
    if(data._warning)_imp.processLog.push({text:data._warning,status:'err'});
  }catch(e){_imp.processLog[_imp.processLog.length-1]={text:'AI failed: '+e.message,status:'err'};}
  _imp.processing=false;render();
}

class Spring{
  constructor(v=0, tg=0, stiff=220, damp=26){this.pos=v;this.vel=0;this.target=tg;this.stiff=stiff;this.damp=damp;this.done=true;}
  step(dt){
    if(this.done) return this.pos;
    const f=-this.stiff*(this.pos-this.target)-this.damp*this.vel;
    this.vel+=f*dt;this.pos+=this.vel*dt;
    if(Math.abs(this.pos-this.target)<.5&&Math.abs(this.vel)<.5){this.pos=this.target;this.vel=0;this.done=true;}
    return this.pos;
  }
  setTarget(t){this.target=t;this.done=false;}
  setImmediate(v){this.pos=v;this.vel=0;this.target=v;this.done=true;}
}

/* ================= STORAGE (server-backed via window.storage shim) ================= */
/* window.storage is defined above by a small shim that calls this project's own
   /api/kv REST API (Express + SQLite). Every value written here is visible to
   every teacher and student who opens this site — that's what makes
   "teacher adds a card -> student sees it" work through a real, shared backend. */
function storageAvailable(){ return typeof window!=='undefined' && !!window.storage; }
async function safeGet(key, shared){
  if(!storageAvailable()) return null;
  try{
    const res = await window.storage.get(key, !!shared);
    if(!res || res.value===undefined) return null;
    try{ return JSON.parse(res.value); }catch(e){ return res.value; }
  }catch(e){ return null; }
}
async function safeSet(key, value, shared){
  if(!storageAvailable()){ toast('Cannot save — server unreachable'); return; }
  try{
    const res = await window.storage.set(key, JSON.stringify(value), !!shared);
    if(!res) throw new Error('storage.set returned null');
  }catch(e){ console.error('storage set failed', e); toast('Save failed, please check your connection'); }
}
/* Fire-and-forget save: never blocks the UI. Errors are logged, not shown as a toast
   (a toast during rapid interactions would be jarring). */
function safeSetBg(key, value, shared){
  if(!storageAvailable()) return;
  try{
    window.storage.set(key, JSON.stringify(value), !!shared).catch(err=>console.warn('bg save failed', key, err));
  }catch(e){ console.warn('bg save threw', key, e); }
}

function computeStreak(p){
  const dates = new Set(p.activityDates||[]);
  let streak = 0;
  let d = new Date();
  const todayStr = d.toISOString().slice(0,10);
  if(!dates.has(todayStr)){
    d.setDate(d.getDate()-1);
  }
  while(true){
    const s = d.toISOString().slice(0,10);
    if(dates.has(s)){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

/* ── Pronunciation Practice ── */
var _practiceRec = null;
var _practiceMediaRecorder = null;
var _practiceStream = null;

function scorePractice(target, spoken, confidence) {
  target = target.toLowerCase().trim();
  spoken = (spoken || '').toLowerCase().trim();
  var match = spoken === target;
  var partial = spoken && (spoken.includes(target) || target.includes(spoken));
  var score = Math.round((confidence || 0) * 100);
  if (match) score = Math.max(score, 90);
  else if (partial) score = Math.max(score, 60);
  else score = Math.min(score, 40);
  var cls, msg;
  if (score >= 80) { cls = 'pr-good'; msg = '✅ ' + score + '% — Excellent!'; }
  else if (score >= 50) { cls = 'pr-ok'; msg = '🔄 ' + score + '% — Keep practicing'; }
  else { cls = 'pr-bad'; msg = '🔊 ' + score + '% — Try again'; }
  return { score: score, cls: cls, msg: msg };
}

function showPracticeResult(cardId, spoken, result) {
  var el = document.getElementById('pr' + cardId);
  if (!el) return;
  el.textContent = result.msg + (spoken ? ' ("' + spoken + '")' : '');
  el.className = 'practice-result ' + result.cls;
}

function startPractice(word, cardId) {
  var el = document.getElementById('pr' + cardId);
  if (!el) return;

  // Clean up any existing recording
  if (_practiceRec) { _practiceRec.abort(); _practiceRec = null; }
  if (_practiceMediaRecorder) { _practiceMediaRecorder.stop(); _practiceMediaRecorder = null; }
  if (_practiceStream) { _practiceStream.getTracks().forEach(function(t) { t.stop(); }); _practiceStream = null; }

  speak(word);
  el.textContent = '🎤 Listening...'; el.className = 'practice-result pr-recording';

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    // Chrome/Edge native SpeechRecognition
    var rec = new SR();
    rec.lang = 'ar-SA';
    rec.interimResults = true;
    rec.maxAlternatives = 3;
    rec.continuous = false;
    var finalTranscript = '';
    var bestConfidence = 0;

    rec.onresult = function(e) {
      for (var i = e.resultIndex; i < e.results.length; i++) {
        var r = e.results[i];
        if (r.isFinal) {
          finalTranscript = r[0].transcript.trim();
          bestConfidence = Math.max(bestConfidence, r[0].confidence);
        } else {
          var interim = r[0].transcript.trim();
          if (interim) { el.textContent = '🎤 ' + interim; el.className = 'practice-result pr-recording'; }
        }
      }
    };

    rec.onend = function() {
      _practiceRec = null;
      if (!finalTranscript) { el.textContent = '❌ Didn\'t catch that, try again'; el.className = 'practice-result pr-bad'; return; }
      var result = scorePractice(word, finalTranscript, bestConfidence);
      showPracticeResult(cardId, finalTranscript, result);
    };

    rec.onerror = function() {
      _practiceRec = null;
      // Fallback to server-side if native fails
      startServerPractice(word, cardId);
    };

    rec.start();
    _practiceRec = rec;
    setTimeout(function() { if (_practiceRec) { try { rec.stop(); } catch(e) {} } }, 4000);
  } else {
    // Safari/Firefox - use MediaRecorder + server
    startServerPractice(word, cardId);
  }
}

function startServerPractice(word, cardId) {
  var el = document.getElementById('pr' + cardId);
  if (!el) return;
  el.textContent = '🎤 Recording (server)...'; el.className = 'practice-result pr-recording';

  // Get OpenAI key from localStorage or from server env
  var openaiKey = '';
  try { openaiKey = localStorage.getItem('minbar_openai_key') || ''; } catch(e) {}

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    el.textContent = '❌ Mic not available. Use Chrome or Edge'; el.className = 'practice-result pr-bad';
    return;
  }

  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    _practiceStream = stream;
    var chunks = [];
    var mr = new MediaRecorder(stream, { mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4' });
    _practiceMediaRecorder = mr;

    mr.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };

    mr.onstop = function() {
      _practiceMediaRecorder = null;
      if (_practiceStream) { _practiceStream.getTracks().forEach(function(t) { t.stop(); }); _practiceStream = null; }
      var blob = new Blob(chunks, { type: mr.mimeType });
      if (blob.size < 1000) { el.textContent = '❌ No audio detected'; el.className = 'practice-result pr-bad'; return; }

      el.textContent = '🔄 Transcribing...'; el.className = 'practice-result pr-recording';

      // Convert blob to base64
      var reader = new FileReader();
      reader.onloadend = function() {
        var base64data = reader.result.split(',')[1];
        var headers = { 'Content-Type': 'application/json' };
        var openaiKey = '';
        try { openaiKey = localStorage.getItem('minbar_openai_key') || ''; } catch(e) {}
        if (openaiKey) headers['x-openai-key'] = openaiKey;

        fetch('/api/transcribe', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({ audio: base64data, mime: blob.type })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error) {
            el.innerHTML = '❌ ' + data.error + ' <button onclick="startPractice(\'' + escapeHtml(word) + '\',\'' + cardId + '\')" style="background:none;border:1px solid;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:12px;">Retry</button>';
            el.className = 'practice-result pr-bad';
            return;
          }
          var spoken = (data.text || '').trim();
          if (!spoken) { el.textContent = '❌ No speech detected'; el.className = 'practice-result pr-bad'; return; }
          var result = scorePractice(word, spoken, 0.7);
          showPracticeResult(cardId, spoken, result);
        })
        .catch(function() {
          el.textContent = '❌ Transcription failed'; el.className = 'practice-result pr-bad';
        });
      };
      reader.readAsDataURL(blob);
    };

    mr.start();
    setTimeout(function() { try { mr.stop(); } catch(e) {} }, 4000);
  }).catch(function() {
    el.textContent = '❌ Mic access denied'; el.className = 'practice-result pr-bad';
  });
}

function stripTashkeel(s){ return (s||'').replace(/[\u064B-\u0652\u0640]/g,'').trim(); }
function normalizeArabic(s){
  return stripTashkeel(s)
    .replace(/[\u0622\u0623\u0625\u0671]/g, '\u0627')  // أ إ آ ٱ → ا
    .replace(/[\u0629]/g, '\u0647')                       // ة → ه
    .replace(/[\u0649]/g, '\u064A')                       // ى → ي
    .replace(/[\u0626]/g, '\u064A')                       // ئ → ي
    .replace(/[\u0624]/g, '\u0648')                       // ؤ → و
    .replace(/[\u0621]/g, '\u064A')                       // ء → ي (hamza standalone)
    .replace(/\s+/g, ' ')
    .trim();
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
/* Only allow http(s) links in resource URLs — blocks javascript:/data: URI XSS via the href attribute. */
function safeUrl(u){
  const s = (u||'').trim();
  if(/^https?:\/\//i.test(s)) return escapeHtml(s);
  return '#';
}
function timeAgo(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  const m = Math.floor(s/60); if(m<60) return m+' minute'+(m>1?'s':'')+' ago';
  const h = Math.floor(m/60); if(h<24) return h+' hour'+(h>1?'s':'')+' ago';
  const d = Math.floor(h/24); if(d<7) return d+' day'+(d>1?'s':'')+' ago';
  return new Date(ts).toLocaleDateString();
}
function unreadAnnouncementsCount(){
  const read = new Set((STATE.progress.readAnnouncements||[]).map(String));
  return STATE.announcements.filter(a=>!read.has(String(a.id))).length;
}

/* -- Q&A counts -- */
function unansweredQuestionsCount(){
  return STATE.questions.filter(q=>!q.reply).length;
}
function unreadRepliesCount(){
  if(!STATE.name) return 0;
  const seen = new Set((STATE.progress.readReplies||[]).map(String));
  return STATE.questions.filter(q =>
    q.name === STATE.name && q.reply && !seen.has(String(q.id))
  ).length;
}

function attachGate(){
  let picked = null;
  let isRegister = false;
  const gateBox = document.getElementById('gateBox');
  const cardTeacher = document.getElementById('cardTeacher');
  const cardStudent = document.getElementById('cardStudent');
  const nameInput = document.getElementById('nameInput');
  const codeInput = document.getElementById('codeInput');
  const codeFieldWrap = document.getElementById('codeFieldWrap');
  const enterBtn = document.getElementById('enterBtn');
  const authToggle = document.getElementById('authToggle');
  const authLabel = document.getElementById('authLabel');
  const authSwitchBtn = document.getElementById('authSwitchBtn');
  const emailInput = document.getElementById('emailInput');

  selectRole('student');

  function refreshEnter(){
    const emailOk = !!(emailInput && emailInput.value.trim());
    const nameOk = isRegister ? !!(nameInput && nameInput.value.trim()) : true;
    const codeOk = !!codeInput.value.trim();
    enterBtn.disabled = !(emailOk && nameOk && codeOk);
  }
  function selectRole(role){
    picked = role;
    if(cardStudent) cardStudent.classList.add('active');
    const nw = document.getElementById('nameWrap'), cw = document.getElementById('codeWrap'), ew = document.getElementById('emailWrap'), tw = document.getElementById('teacherCodeWrap');
    const sd = document.getElementById('socialDivider'), sb = document.getElementById('socialBtns');
    const codeLabel = document.getElementById('codeLabel'), codeHint = document.getElementById('codeHint');
    if(ew) ew.style.display = 'block';
    if(nw) nw.style.display = isRegister ? 'block' : 'none';
    if(tw) tw.style.display = isRegister ? 'block' : 'none';
    if(cw) cw.style.display = 'block';
    if(sd) sd.style.display = 'flex';
    if(sb) sb.style.display = 'block';
    if(authToggle) authToggle.style.display = 'flex';
    var forgotLink = document.getElementById('forgotLink');
    if(forgotLink) forgotLink.style.display = isRegister ? 'none' : 'block';
    if(codeInput) codeInput.placeholder = isRegister ? 'Choose a password' : 'Your password';
    if(codeInput) codeInput.type = 'password';
    if(codeLabel) codeLabel.textContent = isRegister ? 'Create password' : 'Password';
    if(codeHint) codeHint.innerHTML = isRegister ? ico('key')+' Choose a password you\'ll remember' : ico('key')+' Your password';
    if(authLabel) authLabel.textContent = isRegister ? 'Already have an account?' : 'Don\'t have an account?';
    if(authSwitchBtn) authSwitchBtn.textContent = isRegister ? 'Login' : 'Register';
    if(codeFieldWrap) codeFieldWrap.classList.remove('err');
    refreshEnter();
    setTimeout(()=>{ (isRegister ? nameInput : emailInput)?.focus(); }, 0);
  }
  if(authSwitchBtn) authSwitchBtn.onclick = ()=>{
    isRegister = !isRegister;
    selectRole(picked);
  };
  if(cardStudent){
    cardStudent.onclick = ()=>{ selectRole('student'); };
    cardStudent.onkeydown = (e)=>{ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); selectRole('student'); } };
  }
  const ctBtn = document.getElementById('codeToggle');
  if(ctBtn) ctBtn.onclick = ()=>{
    const btn = document.getElementById('codeToggle');
    const showing = codeInput?.type==='text';
    if(codeInput) codeInput.type = showing ? 'password' : 'text';
    if(btn) btn.innerHTML = showing ? ico('eye') : ico('eyeOff');
    if(btn) btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    codeInput?.focus();
  };
  nameInput.addEventListener('input', refreshEnter);
  nameInput.addEventListener('keydown', (e)=>{
    if(e.key==='Enter' && !enterBtn.disabled){ e.preventDefault(); enterBtn.click(); }
  });
  emailInput.addEventListener('input', refreshEnter);
  emailInput.addEventListener('keydown', (e)=>{
    if(e.key==='Enter' && !enterBtn.disabled){ e.preventDefault(); enterBtn.click(); }
  });
  codeInput.addEventListener('input', ()=>{ codeFieldWrap.classList.remove('err'); refreshEnter(); });
  codeInput.addEventListener('keydown', (e)=>{
    if(e.key==='Enter' && !enterBtn.disabled){ e.preventDefault(); enterBtn.click(); }
  });
  enterBtn.onclick = async ()=>{
    picked = 'student';
    const enteredPassword = codeInput.value.trim();
    const enteredEmail = emailInput.value.trim().toLowerCase();
    const enteredName = nameInput.value.trim();
    if(!enteredEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(enteredEmail)){
      toast(ico('warning')+' Please enter a valid email');
      emailInput.classList.add('err'); void emailInput.offsetWidth; emailInput.classList.remove('err');
      gateBox.classList.remove('shake'); void gateBox.offsetWidth; gateBox.classList.add('shake');
      emailInput.focus(); return;
    }
    if(!enteredPassword){ toast(ico('warning')+' Please enter a password'); codeInput.focus(); return; }
    if(isRegister){
      if(!enteredName){ toast(ico('warning')+' Please enter your display name'); nameInput.focus(); return; }
      const teacherCodeVal = document.getElementById('teacherCodeInput') ? document.getElementById('teacherCodeInput').value.trim() : '';
      const reg = await registerStudent(enteredEmail, enteredName, enteredPassword, null, teacherCodeVal || null);
      if(reg.error==='exists'){
        toast(ico('warning')+' An account with this email already exists — try login');
        emailInput.classList.add('err'); void emailInput.offsetWidth; emailInput.classList.remove('err');
        gateBox.classList.remove('shake'); void gateBox.offsetWidth; gateBox.classList.add('shake');
        return;

      STATE.email = enteredEmail;
      toast(ico('check')+' Account created! Welcome, '+enteredName);

      STATE.avatar = lr.avatar || null;
      STATE.name = lr.name || enteredEmail.split('@')[0];

      STATE.teacherEmail = lr.teacherEmail || '';

      STATE.tab = 'journey';
      startPolling();
      startNotificationLoop();
      startHeartbeat();
    } catch(e){ console.error('Login render error', e); }
    render();
  };

    cancelBtn.onclick = ()=> overlay.remove();
    const goBtn = overlay.querySelector('#socialGoBtn');
    const nameInput = overlay.querySelector('#socialNameInput');
    nameInput.focus();
    const doLogin = async ()=>{
      const nm = nameInput.value.trim();
      const displayName = nm || (provider==='google'?'Google User':'Apple User');
      const uid = Math.random().toString(36).slice(2,10);
      const email = uid+'@'+provider+'.user';
      overlay.remove();
      await socialLogin(email, displayName, null, provider);
    };
    goBtn.onclick = doLogin;
    nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  }

  const googleBtn = document.getElementById('googleSignInBtn');
  if(googleBtn) googleBtn.onclick = ()=> showSocialQuickLogin('google');

  const appleBtn = document.getElementById('appleSignInBtn');
  if(appleBtn) appleBtn.onclick = ()=> showSocialQuickLogin('apple');
}

/* ================= VOCABULARY LIBRARY ================= */
function getLibTemplates(catId){return LIB_TEMPLATES.filter(t=>t.catId===catId);}
function getLibTemplate(id){return LIB_TEMPLATES.find(t=>t.id===id);}
function getLibReleased(tplId){const p=STATE.libProgress[tplId];return p&&Array.isArray(p.released)?p.released:[];}
function setLibReleased(tplId,arr){if(!STATE.libProgress[tplId])STATE.libProgress[tplId]={};STATE.libProgress[tplId].released=arr;STATE.libProgress[tplId].batchSize=STATE.libProgress[tplId].batchSize||10;safeSetBg('libProgress',STATE.libProgress,true);}
function isLibWordMastered(wordAr){
  const card=STATE.flashcards.find(c=>c.word===wordAr);
  if(!card)return false;
  const srs=STATE.progress.srs[card.id];
  return srs&&srs.srsLevel>=3;
}
function countLibMastered(tplId){
  const released=getLibReleased(tplId);
  if(!released||!released.length)return 0;
  return released.filter(w=>w&&isLibWordMastered(w)).length;
}
function getLibNextBatch(tpl){
  if(!tpl||!Array.isArray(tpl.words)) return [];
  const released=getLibReleased(tpl.id);
  const batchSize=STATE.libProgress[tpl.id]?.batchSize||10;
  const unstarted=tpl.words.filter(w=>!released.includes(w.ar));
  return unstarted.slice(0,batchSize);
}
function addLibBatch(tplId){
  const tpl=getLibTemplate(tplId);if(!tpl)return 0;
  const next=getLibNextBatch(tpl);
  if(!next.length){toast('🎉 All words have been added to your deck');return 0;}
  const released=getLibReleased(tplId);
  let added=0;
  for(const w of next){
    if(STATE.flashcards.some(c=>c.word===w.ar)) continue;
    STATE.flashcards.push({id:Date.now()+added,word:w.ar,meaning:w.en,pronunciation:w.pronunciation||'',root:w.root||'',level:w.level||'',definition:w.definition||'',example:w.example||'',exampleEn:w.exampleEn||'',category:'📚 '+tpl.name,addedBy:STATE.name||'student',createdAt:Date.now()});
    added++;
    released.push(w.ar);
  }
  setLibReleased(tplId,released);
  safeSetBg('flashcards',STATE.flashcards,true);
  return added;
}

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,${cat.color},${cat.color}99);display:flex;align-items:center;justify-content:center;color:#fff;padding:8px;">${LIB_IMG[cat.id]||LIB_SVGS[cat.id]||cat.icon}</div>
      <div><h2 style="margin:0;font-size:17px;">${cat.name}</h2><p style="margin:1px 0 0;font-size:11px;color:var(--ink-soft);">${cat.nameEn} · ${cat.desc}</p></div>
    </div>
    <div class="lib-templates">`;
  for(const tpl of tpls){
    const released=getLibReleased(tpl.id).length;
    const mastered=countLibMastered(tpl.id);
    const remaining=tpl.words.length-released;
    const allDone=released>0&&mastered>=released&&!remaining;
    const canRelease=released===0||!remaining||(released>0&&mastered>=released);
    const pct=tpl.words.length>0?Math.round(mastered/tpl.words.length*100):0;
    h+=`<div class="lib-tcard" data-lib-add="${tpl.id}">
      <div class="tc-accent" style="background:linear-gradient(90deg,${cat.color},${cat.color}66);"></div>
      <div class="tc-body">
        <div class="tc-icon" style="background:linear-gradient(135deg,${cat.color},${cat.color}88);">${LIB_IMG[cat.id]||LIB_SVGS[cat.id]||cat.icon}</div>
        <div class="tc-name">${tpl.name}</div>
        <div class="tc-name-en">${tpl.nameEn}</div>
        <div class="tc-desc">${tpl.desc}</div>
        <div class="tc-meta">
          <span>📖 ${tpl.words.length}</span>
          <span>🎯 ${tpl.level}</span>
          <span>⏱ ${tpl.estimatedHours}h</span>
        </div>
        <div style="font-size:10px;margin:5px 0;display:flex;gap:8px;flex-wrap:wrap;">
          <span>📤 ${released}/${tpl.words.length}</span>
          <span>✅ ${mastered}</span>
        </div>
        <div class="tc-progress"><span style="width:${pct}%;background:linear-gradient(90deg,${cat.color},${cat.color}88);"></span></div>
        <div style="display:flex;align-items:center;justify-content:center;margin-top:8px;">
          <button class="primary-btn" style="font-size:11px;padding:7px 14px;width:auto;">
            ${allDone?'🔄 إعادة التعلم':canRelease?'📥 إضافة مجموعة جديدة':'📖 اذهب للمراجعة'}
          </button>
        </div>
      </div>
    </div>`;
  }
  h+=`</div></div>`;
  return h;
  }catch(e){console.error('renderLibCategory error',e);return '<div class="lib-wrap"><p style="text-align:center;padding:40px;color:red;">حدث خطأ في تحميل القوالب</p></div>';}
}

async function toggleTeacherOnline(){
  const tp = STATE.teacherProfile || {};
  tp._status = tp._status === 'online' ? 'offline' : 'online';
  tp._lastSeen = Date.now();
  STATE.teacherProfile = tp;
  safeSetBg('teacherProfile', tp);
  if(STATE.email){
    const teacherKey = 'teacher:'+STATE.email;
    const existing = await safeGet(teacherKey, true);
    const data = (existing && typeof existing==='object') ? existing : {};
    data._status = tp._status;
    data._lastSeen = tp._lastSeen;
    if(!data.name) data.name = STATE.name;
    if(!data.email) data.email = STATE.email;
    if(!data.id) data.id = STATE.email;
    safeSetBg(teacherKey, data, true);
    const ids = (await safeGet('teachers_list', true)) || [];
    if(!ids.includes(STATE.email)){
      ids.push(STATE.email);
      safeSetBg('teachers_list', ids, true);
    }
  }
  toast(tp._status === 'online' ? 'You are now online — visible to students' : 'You are now offline');
  renderApp();
}

function addScheduleDay(){
  const wrap = document.getElementById('tpScheduleWrap');
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;align-items:center;';
  row.innerHTML = '<select class="tp-sched-day" style="flex:1;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg);color:var(--ink);">'+days.map(d=>'<option>'+d+'</option>').join('')+'</select><input class="tp-sched-from" type="time" value="09:00" style="padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg);color:var(--ink);"/><span style="color:var(--ink-soft);font-size:12px;">to</span><input class="tp-sched-to" type="time" value="17:00" style="padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg);color:var(--ink);"/><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;">✕</button>';
  wrap.appendChild(row);
}

async function saveTeacherProfile(){
  const name = document.getElementById('tpName').value.trim();
  const bio = document.getElementById('tpBio').value.trim();
  const price = parseInt(document.getElementById('tpPrice').value) || 25;
  const yearsExp = parseInt(document.getElementById('tpExp').value) || 0;
  const specialties = document.getElementById('tpSpec').value.split(',').map(s=>s.trim()).filter(Boolean);
  const image = document.getElementById('tpImage').value.trim();
  const schedRows = document.querySelectorAll('#tpScheduleWrap > div');
  const schedule = [];
  schedRows.forEach(row => {
    const day = row.querySelector('.tp-sched-day').value;
    const from = row.querySelector('.tp-sched-from').value;
    const to = row.querySelector('.tp-sched-to').value;
    schedule.push({day, from, to});
  });
  if(!name){ toast('Please enter a display name','error'); return; }

  const tp = STATE.teacherProfile || {};
  const profileData = {
    id: STATE.email,
    name: name,
    bio: bio,
    price: price,
    yearsExp: yearsExp,
    specialties: specialties,
    image: image,
    schedule: schedule,
    _status: tp._status || 'offline',
    _lastSeen: Date.now(),
    gradientStart: tp.gradientStart || '#1D8348',
    gradientEnd: tp.gradientEnd || '#10b981',
    rating: tp.rating || 0,
    studentsCount: tp.studentsCount || 0,
    lessonsCount: tp.lessonsCount || 0,
    email: STATE.email
  };
  STATE.teacherProfile = profileData;
  safeSetBg('teacherProfile', profileData);

  if(STATE.email){
    const teacherKey = 'teacher:'+STATE.email;
    safeSetBg(teacherKey, profileData, true);
    const ids = (await safeGet('teachers_list', true)) || [];
    if(!ids.includes(STATE.email)){
      ids.push(STATE.email);
      safeSetBg('teachers_list', ids, true);
    }
  }
  toast('Teacher profile saved!');
}

  const open = STATE.questions.filter(q=>!q.reply).sort((a,b)=>b.createdAt-a.createdAt);
  const answered = STATE.questions.filter(q=>q.reply).sort((a,b)=>b.repliedAt-a.repliedAt);

  const renderQ = (q, isOpen) => {
    const showReply = !!STATE.qOpenReply[q.id];
    const draft = STATE.qReplyDrafts[q.id] || '';
    return `
    <div class="q-card ${isOpen?'q-open':'q-answered'}">
      <div class="q-head">
        <div class="q-who"><span class="q-avatar">${escapeHtml((q.name||'?').charAt(0).toUpperCase())}</span><b>${escapeHtml(q.name)}</b> <span class="q-time">· ${timeAgo(q.createdAt)}</span></div>
        <span class="q-status ${isOpen?'pending':'done'}">${isOpen?'Pending':ico('check')+' Answered'}</span>
      </div>
      <p class="q-body">${escapeHtml(q.body)}</p>
      ${q.reply ? `
        <div class="q-reply">
          <div class="q-reply-label">${ico('alertCircle')} Your reply · ${timeAgo(q.repliedAt)}</div>
          <p>${escapeHtml(q.reply)}</p>
        </div>` : ''}
      <div class="q-actions">
        ${isOpen ? `<button class="ghost-btn q-reply-btn" data-q-toggle="${q.id}">${showReply?ico('x')+' Cancel':'Reply'}</button>` : ''}
        <button class="ghost-btn danger" data-q-del="${q.id}">Delete</button>
      </div>
      ${(isOpen && showReply) ? `
        <div class="q-reply-form">
          <textarea class="q-reply-input" data-q-input="${q.id}" placeholder="Write a helpful reply to ${escapeHtml(q.name)}...">${escapeHtml(draft)}</textarea>
          <button class="primary-btn" data-q-send="${q.id}">${ico('review')} Send Reply</button>
        </div>` : ''}
    </div>`;
  };

  return `
  <div class="panel"><h2>Student Questions <small>${open.length} awaiting reply</small></h2>
    <p style="font-size:12.5px;color:var(--ink-soft);margin-top:-4px;">Anything a student writes here shows up in real time so you can help fast.</p>
    ${open.length===0 ? '<div class="empty">No open questions right now</div>' : open.map(q=>renderQ(q,true)).join('')}
  </div>
  ${answered.length ? `
  <div class="panel"><h2>Answered <small>${answered.length}</small></h2>
    ${answered.map(q=>renderQ(q,false)).join('')}
  </div>` : ''}`;
}
