:root{
  --bg:#F4F7F5; --bg-card:#FFFFFF; --ink:#0F1A14; --ink-soft:#5A7265;
  --teal:#0D9488; --teal-dark:#0A6B62; --teal-soft:#E0F5F0;
  --accent:#10b981; --accent-soft:#D1FAE5; --rose:#DC2626; --rose-soft:#FEE2E2;
  --blue:#2563EB; --green:#16A34A; --green-soft:#DCFCE7;
  --border:#D4E2DA; --border-subtle:#E8F0EB;
  --shadow-sm:0 1px 3px rgba(10,20,14,.06),0 1px 2px rgba(10,20,14,.04);
  --shadow:0 4px 12px rgba(10,20,14,.07),0 1px 4px rgba(10,20,14,.04);
  --shadow-lg:0 16px 48px rgba(10,20,14,.10),0 4px 12px rgba(10,20,14,.05);
  --radius-lg:16px; --radius-md:12px; --radius-sm:8px;
}
body.dark{
  --bg:#0C1410; --bg-card:#162019; --ink:#E8F5EC; --ink-soft:#8EA89A;
  --teal:#34D399; --teal-dark:#6EE7B7; --teal-soft:#0D3D2E;
  --accent:#34d399; --accent-soft:#0D3D2E; --rose:#F87171; --rose-soft:#3B1212;
  --blue:#60A5FA; --green:#4ADE80; --green-soft:#143322;
  --border:#243830; --border-subtle:#1C2E26;
  --shadow-sm:0 1px 3px rgba(0,0,0,.25),0 1px 2px rgba(0,0,0,.15);
  --shadow:0 4px 12px rgba(0,0,0,.25),0 1px 4px rgba(0,0,0,.15);
  --shadow-lg:0 16px 48px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.2);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{margin:0;background:var(--bg);
  font-family:'Tajawal',sans-serif;color:var(--ink);min-height:100vh;transition:background .3s,color .3s;
  overscroll-behavior-y:contain;-webkit-font-smoothing:antialiased;position:relative;}
/* Instant tap feedback — press states fire before rendering, so it FEELS instant */
button,.tab,.role-card,.icon-btn,.ghost-btn,.primary-btn,.quiz-opt,.flashcard,.enter-btn,.theme-toggle,.switch-btn,.q-reply-btn{
  -webkit-user-select:none;user-select:none;
}
button:active,.tab:active,.role-card:active,.icon-btn:active,.ghost-btn:active,.primary-btn:active,.quiz-opt:active,.enter-btn:active{
  transform:scale(.97);opacity:.88;
}
@media (prefers-reduced-motion: reduce){
  button:active,.tab:active,.role-card:active,.icon-btn:active,.ghost-btn:active,.primary-btn:active,.quiz-opt:active,.enter-btn:active{
    transform:none;opacity:.85;
  }
}
/* Signature motif: a faint eight-point star lattice, echoing the geometric wood/tile
   inlay of a real minbar. Repeated at low opacity throughout the page, then reused
   at full strength as accents on the gate medallion, section markers and cards. */
body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2248%22%20height%3D%2248%22%20viewBox%3D%220%200%2048%2048%22%3E%3Cpolygon%20points%3D%2224%2C15%2025.38%2C20.67%2030.36%2C17.64%2027.33%2C22.62%2033%2C24%2027.33%2C25.38%2030.36%2C30.36%2025.38%2C27.33%2024%2C33%2022.62%2C27.33%2017.64%2C30.36%2020.67%2C25.38%2015%2C24%2020.67%2C22.62%2017.64%2C17.64%2022.62%2C20.67%22%20fill%3D%22none%22%20stroke%3D%22%230F5C34%22%20stroke-width%3D%220.6%22%2F%3E%3C%2Fsvg%3E");
  background-size:48px 48px;opacity:.05;transition:opacity .3s;}
body.dark:before{
  background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2248%22%20height%3D%2248%22%20viewBox%3D%220%200%2048%2048%22%3E%3Cpolygon%20points%3D%2224%2C15%2025.38%2C20.67%2030.36%2C17.64%2027.33%2C22.62%2033%2C24%2027.33%2C25.38%2030.36%2C30.36%2025.38%2C27.33%2024%2C33%2022.62%2C27.33%2017.64%2C30.36%2020.67%2C25.38%2015%2C24%2020.67%2C22.62%2017.64%2C17.64%2022.62%2C20.67%22%20fill%3D%22none%22%20stroke%3D%22%238FCB6F%22%20stroke-width%3D%220.6%22%2F%3E%3C%2Fsvg%3E");
  opacity:.07;}
button,.tab,.role-card,.icon-btn,.ghost-btn,.primary-btn,.quiz-opt,.flashcard,.enter-btn,.theme-toggle,.switch-btn{touch-action:manipulation;font-family:inherit;}
input,select,textarea{font-size:16px!important;} /* prevents iOS auto-zoom on focus */
:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
button{transition:transform .15s ease, box-shadow .15s ease, background-color .15s ease, border-color .15s ease, opacity .15s ease;}
@media (prefers-reduced-motion: reduce){ *{transition:none!important;animation:none!important;} }
.wrap{max-width:980px;margin:0 auto;padding:calc(20px + env(safe-area-inset-top)) max(14px, env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-right));width:100%;position:relative;z-index:1;}
@media (max-width:480px){
  .wrap{padding-inline:10px;}
}

.masthead{position:relative;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--accent);padding-bottom:18px;margin-bottom:26px;flex-wrap:wrap;gap:10px;}
.brand{display:flex;align-items:center;gap:14px;min-width:0;}
.brand-mark{width:46px;height:46px;flex-shrink:0;border-radius:12px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;color:var(--accent-soft);font-size:24px;font-weight:700;box-shadow:0 4px 12px rgba(13,148,136,.3);}
.brand h1{font-family:'Amiri',serif;font-size:clamp(22px,5vw,28px);margin:0;color:var(--teal-dark);letter-spacing:.2px;}
body.dark .brand h1{color:var(--accent);}
.brand p{margin:1px 0 0;font-size:11px;color:var(--ink-soft);letter-spacing:.5px;text-transform:uppercase;font-weight:500;}
.header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
@media (max-width:480px){
  .brand p{display:none;}
  .role-badge span,.role-badge{font-size:11px;}
}
.role-badge{font-size:12.5px;background:var(--bg-card);border:1.5px solid var(--border);padding:7px 14px;border-radius:10px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-sm);}
body.dark .role-badge{background:var(--bg-card);border-color:var(--border);}
.role-badge b{color:var(--teal);}
body.dark .role-badge b{color:var(--accent);}
.switch-btn{border:none;background:none;color:var(--rose);font-weight:700;cursor:pointer;font-size:12px;text-decoration:underline;text-underline-offset:3px;transition:opacity .15s;}
.switch-btn:hover{opacity:.7;}
.theme-toggle{border:1.5px solid var(--border);background:var(--bg-card);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:14px;box-shadow:var(--shadow-sm);transition:all .15s ease;}
body.dark .theme-toggle{border-color:var(--border);background:var(--bg-card);}
.theme-toggle:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(13,148,136,.15);}
body.dark .theme-toggle:hover{border-color:var(--accent);}
.bell-btn{position:relative;padding:7px 9px;}
.bell-btn svg{width:18px;height:18px;display:block;}
.bell-badge{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--rose);color:#fff;font-size:9px;font-weight:800;line-height:16px;text-align:center;box-shadow:0 2px 6px rgba(220,38,38,.3);}

.gate{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#f0fdf4 0%,#f8fafc 50%,#ecfdf5 100%);}
body.dark .gate{background:linear-gradient(135deg,#08080e 0%,#0a0a12 50%,#080c0a 100%);}
.gate::before{content:'';position:absolute;inset:0;
  background:
    radial-gradient(900px at 85% 0%,rgba(13,148,136,.1) 0%,transparent 50%),
    radial-gradient(800px at 15% 100%,rgba(16,185,129,.07) 0%,transparent 50%),
    radial-gradient(600px at 50% 50%,rgba(13,148,136,.04) 0%,transparent 50%),
    radial-gradient(500px at 10% 10%,rgba(16,185,129,.05) 0%,transparent 50%);
  pointer-events:none;animation:gateBgPulse 10s ease-in-out infinite;}
body.dark .gate::before{
  background:
    radial-gradient(900px at 85% 0%,rgba(52,211,153,.12) 0%,transparent 50%),
    radial-gradient(800px at 15% 100%,rgba(16,185,129,.08) 0%,transparent 50%),
    radial-gradient(600px at 50% 50%,rgba(52,211,153,.05) 0%,transparent 50%),
    radial-gradient(500px at 10% 10%,rgba(16,185,129,.06) 0%,transparent 50%);}
.gate::after{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(13,148,136,.07) .8px,transparent .8px);
  background-size:24px 24px;pointer-events:none;opacity:.5;}
body.dark .gate::after{background-image:radial-gradient(circle,rgba(52,211,153,.08) .8px,transparent .8px);}
@keyframes gateBgPulse{0%,100%{opacity:1}50%{opacity:.8}}
.gate-card{width:100%;max-width:420px;background:rgba(255,255,255,.8);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,.3);border-radius:24px;padding:40px 36px;box-shadow:0 24px 80px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.04);position:relative;z-index:1;animation:gateIn .5s cubic-bezier(.2,.7,.3,1);}
body.dark .gate-card{background:rgba(16,16,24,.85);border-color:rgba(255,255,255,.06);box-shadow:0 24px 80px rgba(0,0,0,.3);}
@media (prefers-reduced-motion:reduce){.gate-card{animation:none}.gate::before{animation:none}}
.gate-crest{width:48px;height:48px;margin:0 auto 16px;border-radius:14px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;color:#fff;font-size:24px;font-weight:700;box-shadow:0 4px 12px rgba(13,148,136,.3);}
.gate-step{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--teal);display:block;text-align:center;margin-bottom:4px;}
body.dark .gate-step{color:#34d399;}
.gate-card h2{font-family:'Amiri',serif;font-size:26px;text-align:center;margin:0 0 4px;color:var(--ink);}
body.dark .gate-card h2{color:#e2e8f0;}
.gate-card p{text-align:center;color:var(--ink-soft);font-size:14px;margin:0 0 28px;line-height:1.5;}
.gate-form{display:flex;flex-direction:column;gap:2px;}
.gate-field{margin-bottom:8px;}
.gate-field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.2px;}
input.name-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;background:var(--bg-card);color:var(--ink);transition:border-color .15s,box-shadow .15s;outline:none;}
body.dark input.name-input{border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.04);}
input.name-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.12);}
body.dark input.name-input:focus{border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.1);}
.code-field{position:relative;}
.code-field input{padding-inline-end:42px}
.code-toggle{position:absolute;top:50%;transform:translateY(-50%);inset-inline-end:6px;border:none;background:none;cursor:pointer;font-size:15px;padding:8px;line-height:1;color:var(--ink-soft);border-radius:50%;}
.code-toggle:hover{color:var(--ink);background:var(--teal-soft);}
.gate-hint{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-soft);margin-top:4px;}
.gate.shake{animation:shakeErr .4s;}
.code-field.err input,.name-input.err{border-color:var(--rose)!important;box-shadow:0 0 0 3px rgba(225,29,72,.12)!important;}
.enter-btn{margin-top:12px;padding:13px 24px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;box-shadow:0 4px 14px rgba(13,148,136,.3);transition:all .2s ease;}
body.dark .enter-btn{background:linear-gradient(135deg,#34d399,var(--teal));color:#0C1410;}
.enter-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,148,136,.35);}
.enter-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none;}
.auth-toggle{display:flex;align-items:center;justify-content:center;gap:4px;margin:12px 0 0;font-size:13px;color:var(--ink-soft);}
body.dark .auth-toggle{color:#94a3b8;}
.auth-toggle button{background:none;border:none;color:var(--teal);font-weight:700;cursor:pointer;font-size:13px;padding:0;}
body.dark .auth-toggle button{color:#34d399;}
.auth-toggle button:hover{text-decoration:underline;}
.forgot-link{text-align:center;margin:8px 0 0;font-size:13px;}
.forgot-link a{color:var(--ink-soft);text-decoration:none;}
.forgot-link a:hover{color:var(--teal);}
body.dark .forgot-link a:hover{color:#34d399;}
.social-divider{display:flex;align-items:center;gap:12px;margin:16px 0;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.social-divider::before,.social-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.social-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s ease;border:1.5px solid var(--border);background:var(--bg-card);color:var(--ink);margin-bottom:8px;}
body.dark .social-btn{border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--ink);}
.social-btn:hover{border-color:var(--teal);background:var(--teal-soft);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.05);}
body.dark .social-btn:hover{border-color:#34d399;background:rgba(52,211,153,.05);}
.social-btn:active{transform:translateY(0);}
.social-btn svg{width:20px;height:20px;flex-shrink:0;}
.social-btn-apple{background:#000;color:#fff;border-color:#000;}
body.dark .social-btn-apple{background:#fff;color:#000;border-color:#fff;}
.social-btn-apple:hover{background:#1a1a1a;}
body.dark .social-btn-apple:hover{background:#e5e5e5;}
.gate-foot{text-align:center;margin-top:18px;font-size:11px;color:var(--ink-soft);line-height:1.4;}
.gate-avatar-wrap{text-align:center;margin-bottom:18px;display:none;}
.gate-avatar-wrap.show{display:block;}
.gate-avatar-label{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
.gate-avatar{position:relative;width:80px;height:80px;margin:0 auto 8px;cursor:pointer;}
.gate-avatar input[type="file"]{display:none;}
.gate-avatar-ring{width:80px;height:80px;border-radius:50%;border:3px dashed var(--teal);display:flex;align-items:center;justify-content:center;background:rgba(13,148,136,.06);transition:all .2s ease;overflow:hidden;}
body.dark .gate-avatar-ring{border-color:#34d399;background:rgba(52,211,153,.06);}
.gate-avatar-ring:hover{border-color:var(--teal);background:rgba(13,148,136,.12);}
.gate-avatar-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.gate-avatar-ring .avatar-placeholder{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink-soft);font-size:10px;font-weight:600;}
.gate-avatar-ring .avatar-placeholder svg{width:24px;height:24px;opacity:.5;}
.gate-avatar-hint{font-size:11px;color:var(--ink-soft);margin-top:4px;}
.gate-avatar-remove{display:none;position:absolute;top:-4px;right:-4px;width:22px;height:22px;border-radius:50%;background:var(--rose);color:#fff;border:2px solid var(--bg-card);font-size:11px;cursor:pointer;line-height:1;text-align:center;padding:0;}
.gate-avatar-remove.show{display:flex;align-items:center;justify-content:center;}
.role-cards{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:22px;}
.role-card{position:relative;width:220px;max-width:100%;flex:1 1 200px;padding:26px 18px;border:1.5px solid var(--border);border-radius:14px;cursor:pointer;transition:all .2s ease;background:var(--bg-card);box-shadow:var(--shadow-sm);text-align:center;}
body.dark .role-card{border-color:var(--border);background:var(--bg-card);box-shadow:var(--shadow-sm);}
.role-card:hover{border-color:var(--teal);transform:translateY(-3px);box-shadow:0 8px 24px rgba(13,148,136,.15);}
body.dark .role-card:hover{border-color:var(--accent);box-shadow:0 8px 24px rgba(16,185,129,.15);}
.role-card.active{border-color:var(--teal);background:linear-gradient(180deg,#fff,var(--teal-soft) 200%);box-shadow:0 4px 16px rgba(13,148,136,.2);}
body.dark .role-card.active{border-color:var(--accent);background:linear-gradient(180deg,var(--bg-card),var(--teal-soft) 200%);box-shadow:0 4px 16px rgba(16,185,129,.2);}
.role-card.active:after{content:"✓";position:absolute;top:10px;inset-inline-end:10px;width:22px;height:22px;border-radius:50%;background:var(--teal);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;}
body.dark .role-card.active:after{background:#34d399;color:#1a1a2e;}
.role-card .ic-wrap{width:52px;height:52px;margin:0 auto;border-radius:14px;background:#f0fdfa;display:flex;align-items:center;justify-content:center;transition:all .2s ease;}
body.dark .role-card .ic-wrap{background:rgba(13,148,136,.1);}
.role-card.active .ic-wrap{background:var(--teal);}
body.dark .role-card.active .ic-wrap{background:#34d399;}
.role-card .ic{font-size:24px;}
.role-card.active .ic{filter:brightness(2.4);}
.role-card h3{font-family:'Amiri',serif;margin:12px 0 4px;font-size:19px;color:var(--teal);}
body.dark .role-card h3{color:#34d399;}
.role-card p{font-size:12px;margin:0;color:var(--ink-soft);line-height:1.5;}
body.dark .role-card p{color:#9ca3af;}
@keyframes shakeErr{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-4px)}40%,60%{transform:translateX(4px)}}
@keyframes gateIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.live-banner{position:relative;background:linear-gradient(135deg,var(--teal-dark),var(--teal));border-radius:var(--radius-lg);padding:24px 28px;color:#fff;margin-bottom:22px;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;box-shadow:0 4px 20px rgba(13,148,136,.25);}
.live-banner::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.06);border-radius:50%;pointer-events:none;}
.live-banner::after{content:"";position:absolute;bottom:-30px;left:30%;width:120px;height:120px;background:rgba(255,255,255,.04);border-radius:50%;pointer-events:none;}
.live-banner-text{position:relative;z-index:1;}
.live-banner-text h2{margin:0 0 4px;font-family:'Amiri',serif;font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
body.dark .live-banner-text h2{color:var(--accent);}
.live-banner-text p{margin:0;font-size:13px;opacity:.85;line-height:1.5;}
.live-promo{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px;}
.live-promo-badge{display:inline-block;background:#f97316;color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:6px;letter-spacing:.3px;line-height:1.4;}
.live-promo-price{font-size:13px;font-weight:600;opacity:.95;}
.live-promo-price s{opacity:.55;font-weight:400;margin-right:4px;}
.live-banner-btn{position:relative;z-index:1;display:inline-flex;align-items:center;gap:7px;padding:11px 24px;border-radius:10px;background:#fff;color:var(--teal-dark);font-weight:700;font-size:13px;text-decoration:none;box-shadow:0 3px 12px rgba(0,0,0,.15);transition:all .2s ease;white-space:nowrap;flex-shrink:0;}
body.dark .live-banner-btn{background:var(--accent);color:var(--teal-dark);}
.live-banner-btn:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(0,0,0,.2);}
.live-banner-btn:active{transform:translateY(0);}
.header-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--accent);object-fit:cover;flex-shrink:0;}
.role-avatar-fallback{width:32px;height:32px;border-radius:50%;border:2px solid var(--accent);background:linear-gradient(135deg,#0d9488,#14b8a6);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.role-badge-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.header-avatar-btn{background:none;border:none;padding:0;cursor:pointer;display:flex;border-radius:50%;transition:transform .15s;}
.header-avatar-btn:hover{transform:scale(1.1);}

/* ===== NAVIGATION TABS — Premium Duolingo-style ===== */
.tabs{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;padding:2px 0;}
.tab{
  padding:10px 20px;border-radius:999px;border:1.5px solid var(--border-subtle);
  background:var(--bg-card);cursor:pointer;font-weight:650;font-size:13px;
  color:var(--ink-soft);white-space:nowrap;min-height:42px;
  display:inline-flex;align-items:center;gap:7px;
  transition:all .2s cubic-bezier(.4,0,.2,1);user-select:none;
  position:relative;letter-spacing:.01em;
}
.tab svg{width:16px;height:16px;flex-shrink:0;}
body.dark .tab{border-color:var(--border);background:var(--bg-card);color:var(--ink-soft);}
.tab:hover{
  border-color:var(--teal);color:var(--teal);
  transform:translateY(-1px);box-shadow:0 4px 12px rgba(13,148,136,.12);
}
body.dark .tab:hover{
  border-color:var(--accent);color:var(--accent);
  box-shadow:0 4px 12px rgba(16,185,129,.12);
}
.tab:active{transform:scale(.96);}
.tab.active{
  background:linear-gradient(135deg,var(--teal),var(--accent));color:#fff;
  border-color:transparent;box-shadow:0 4px 16px rgba(13,148,136,.3);
  font-weight:700;
}
body.dark .tab.active{
  background:linear-gradient(135deg,var(--accent),var(--teal));color:#0C1410;
  border-color:transparent;box-shadow:0 4px 16px rgba(16,185,129,.35);
}
.tab.active svg{color:#fff;}
body.dark .tab.active svg{color:#0C1410;}
@media(max-width:768px){
  .tabs{gap:8px;margin-bottom:20px;}
  .tab{padding:9px 16px;font-size:12.5px;min-height:38px;}
  .tab svg{width:15px;height:15px;}
}
@media(max-width:640px){
  .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:6px;margin-inline:-16px;padding-inline:16px;
    scrollbar-width:none;gap:8px;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0;}
}
@media(max-width:380px){
  .tabs{gap:6px;margin-bottom:16px;}
  .tab{padding:8px 14px;font-size:12px;min-height:36px;gap:5px;}
  .tab svg{width:14px;height:14px;}
}

.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px;box-shadow:var(--shadow-sm);}
.panel h2{font-family:'Amiri',serif;color:var(--teal-dark);margin-top:0;font-size:20px;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;position:relative;padding-inline-start:21px;}
body.dark .panel h2{color:var(--accent);}
.panel h2 small{font-size:11px;color:var(--ink-soft);font-weight:700;letter-spacing:.4px;text-transform:uppercase;background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:999px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:11.5px;color:var(--ink-soft);margin-bottom:6px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg-card);color:var(--ink);transition:border-color .15s, box-shadow .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft);}
.field textarea{resize:vertical;min-height:60px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr;}}
.primary-btn{padding:12px 28px;min-height:44px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--teal) 0%,var(--accent) 100%);color:#fff;font-weight:700;font-size:14px;letter-spacing:.3px;cursor:pointer;box-shadow:0 4px 14px rgba(13,148,136,.35);transition:all .2s ease;}
body.dark .primary-btn{background:linear-gradient(135deg,var(--accent) 0%,var(--teal) 100%);color:#0C1410;box-shadow:0 4px 14px rgba(16,185,129,.3);}
.primary-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,148,136,.4);}
.primary-btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(13,148,136,.3);}
.ghost-btn{padding:10px 16px;min-height:40px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg-card);color:var(--ink-soft);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s ease;}
body.dark .ghost-btn{border-color:var(--border);background:var(--bg-card);color:var(--ink-soft);}
.ghost-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-soft);}
body.dark .ghost-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--teal-soft);}
.ghost-btn.danger{color:var(--rose);border-color:var(--rose-soft);}
.ghost-btn.danger:hover{background:var(--rose-soft);border-color:var(--rose);}
.ghost-btn.active-mode{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:0 2px 8px rgba(13,148,136,.25);}
body.dark .ghost-btn.active-mode{background:var(--accent);color:#0C1410;border-color:var(--accent);box-shadow:0 2px 8px rgba(16,185,129,.25);}

.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 15px;border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:9px;background:var(--bg-card);transition:border-color .15s,background .15s;}
.row:hover{border-color:var(--accent);background:var(--teal-soft);}
.row .info b{font-family:'Amiri',serif;font-size:17px;color:var(--teal-dark);}
body.dark .row .info b{color:var(--accent);}
.row .info span{display:block;font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
.tag{font-size:10px;padding:3px 10px;border-radius:999px;background:var(--accent-soft);color:var(--teal-dark);font-weight:700;letter-spacing:.2px;margin-inline-end:6px;}
body.dark .tag{color:var(--accent);}
.tag.due{background:var(--rose-soft);color:var(--rose);}
.tag.new{background:var(--teal-soft);color:var(--teal);}

/* ================= REVIEW PAGE ================= */
/* ---- Stats ribbon ---- */
.deck-ribbon{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);margin-bottom:16px;background:var(--bg-card);}
.deck-ribbon .rb-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 6px;text-align:center;position:relative;transition:background .15s;}
.deck-ribbon .rb-item:not(:last-child)::after{content:"";position:absolute;right:0;top:20%;height:60%;width:1px;background:var(--border);}
.deck-ribbon .rb-item:hover{background:var(--teal-soft);}
.deck-ribbon .rb-num{font-family:'Amiri',serif;font-size:22px;font-weight:700;color:var(--teal-dark);line-height:1;}
body.dark .deck-ribbon .rb-num{color:var(--accent);}
.deck-ribbon .rb-label{font-size:9.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:3px;}
.deck-ribbon .rb-label svg{width:11px;height:11px;flex-shrink:0;}
.deck-ribbon .rb-item.rb-urgent .rb-num{color:var(--rose);}
body.dark .deck-ribbon .rb-item.rb-urgent .rb-num{color:var(--rose);}

/* ---- Mode switch ---- */
.mode-switch{display:flex;gap:0;margin-bottom:14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:3px;}
.mode-switch .ghost-btn{flex:1;border:none;border-radius:9px;padding:10px 8px;font-size:12.5px;min-height:40px;justify-content:center;background:transparent;color:var(--ink-soft);transition:all .2s ease;font-weight:600;}
body.dark .mode-switch .ghost-btn{background:var(--bg-card);color:var(--ink-soft);}
.mode-switch .ghost-btn.active-mode{background:var(--accent);color:#fff;border-radius:9px;box-shadow:0 2px 10px rgba(16,185,129,.35);}
body.dark .mode-switch .ghost-btn.active-mode{background:var(--accent);color:#0C1410;border-radius:9px;box-shadow:0 2px 10px rgba(52,211,153,.35);}

/* ---- Controls row ---- */
.deck-controls{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
.deck-controls select,.deck-controls input{padding:9px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:12.5px;background:var(--bg-card);color:var(--ink);transition:border-color .15s;}
.deck-controls select:focus{border-color:var(--teal);}
.deck-counter{margin-inline-start:auto;font-size:13px;color:var(--ink-soft);font-weight:700;display:flex;align-items:center;gap:6px;}
.deck-counter .cur{color:var(--teal-dark);font-family:'Amiri',serif;font-size:17px;font-weight:700;}
body.dark .deck-counter .cur{color:var(--accent);}

/* ---- Progress bar ---- */
.deck-bar{width:100%;height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:16px;}
.deck-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--accent));border-radius:3px;transition:width .4s ease;}

/* ---- Flashcard Stack ---- */
.flash-stage{position:relative;display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;padding:4px 0;overflow:visible;}
.card-stack{position:relative;width:100%;max-width:400px;margin:0 auto;}
.card-stack-spacer{width:100%;aspect-ratio:5/3;}
.flashcard{width:100%;aspect-ratio:5/3;border-radius:24px;position:absolute;top:0;left:0;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;overflow:hidden;box-shadow:0 2px 4px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.08),0 24px 48px rgba(0,0,0,.06);}
body.dark .flashcard{box-shadow:0 2px 4px rgba(0,0,0,.15),0 8px 24px rgba(0,0,0,.25),0 24px 48px rgba(0,0,0,.15);}
.flashcard.active{z-index:3;cursor:grab;}
.flashcard.behind-1{z-index:2;pointer-events:none;}
.flashcard.behind-2{z-index:1;pointer-events:none;}
.flashcard.behind-3{z-index:0;pointer-events:none;}
.flashcard.empty-card{opacity:0;pointer-events:none;}
.flashcard.fly-right{animation:cardFlyRight .3s cubic-bezier(.4,0,.2,1) forwards !important;}
.flashcard.fly-left{animation:cardFlyLeft .3s cubic-bezier(.4,0,.2,1) forwards !important;}
.flashcard.fly-down{animation:cardFlyDown .3s cubic-bezier(.4,0,.2,1) forwards !important;}
@keyframes cardFlyRight{to{transform:translateX(140%) rotate(22deg);opacity:0}}
@keyframes cardFlyLeft{to{transform:translateX(-140%) rotate(-22deg);opacity:0}}
@keyframes cardFlyDown{to{transform:translateY(100%) rotate(8deg);opacity:0}}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .4s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.face{position:absolute;inset:0;border-radius:24px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 28px;border:none;}
.face.front{background:#fff;border:1px solid rgba(0,0,0,.05);}
body.dark .face.front{background:#1a2420;border-color:rgba(255,255,255,.06);}
.face .word{font-family:'Amiri',serif;font-size:clamp(36px,10vw,52px);color:#17281F;font-weight:700;line-height:1.2;position:relative;z-index:1;}
body.dark .face .word{color:#f0e8d8;}
.face .hint{font-size:11.5px;color:var(--ink-soft);margin-top:14px;display:flex;align-items:center;gap:5px;position:relative;z-index:1;opacity:.7;}
.card-actions{display:flex;gap:8px;justify-content:center;margin-top:12px;position:relative;z-index:2;}
.card-act-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border,#e5e7eb);background:var(--card,#fff);color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.card-act-btn:hover{background:var(--teal,#0d9488);color:#fff;border-color:var(--teal);}
.practice-result{font-size:13px;font-weight:700;margin-top:10px;text-align:center;min-height:22px;position:relative;z-index:1;}
.pr-good{color:#0d9488;}
.pr-ok{color:#f59e0b;}
.pr-bad{color:#ef4444;}
.pr-recording{color:#6366f1;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.face .hint svg{width:13px;height:13px;}
.face.back{background:linear-gradient(160deg,#0d9488 0%,#0a7a70 40%,#087a6a 100%);color:#fff;transform:rotateY(180deg);border:1px solid rgba(255,255,255,.1);}
.face.back .meaning{font-size:clamp(22px,6vw,30px);font-weight:700;line-height:1.3;position:relative;z-index:1;}
.face.back .example{font-family:'Amiri',serif;font-size:clamp(13px,3.5vw,16px);margin-top:14px;opacity:.88;line-height:1.6;padding:10px 16px;background:rgba(255,255,255,.12);border-radius:12px;position:relative;z-index:1;}
.swipe-label{position:absolute;top:50%;padding:8px 18px;border-radius:10px;font-size:15px;font-weight:800;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;letter-spacing:.5px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.swipe-label.know{left:8px;color:#16a34a;border:2px solid #16a34a;background:rgba(22,163,74,.15);transform:translateY(-50%) rotate(-8deg);}
.swipe-label.review{right:8px;color:#ea580c;border:2px solid #ea580c;background:rgba(234,88,12,.15);transform:translateY(-50%) rotate(8deg);}
.swipe-label.delete{top:auto;bottom:0;left:50%;transform:translateX(-50%);color:#dc2626;border:2px solid #dc2626;background:rgba(220,38,38,.15);}
.swipe-label.show{opacity:1;}
.fav-star{position:absolute;top:14px;inset-inline-end:14px;z-index:5;width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.85);color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .15s,background .15s,color .15s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
body.dark .fav-star{background:rgba(26,36,32,.85);color:var(--ink-soft);}
.fav-star:hover{transform:scale(1.15);}
.fav-star.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(16,185,129,.4);}
.card-image{margin-bottom:10px;position:relative;z-index:1;}
.card-image img{max-width:120px;max-height:90px;border-radius:12px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.pronunciation{font-size:clamp(13px,3.5vw,16px);color:var(--ink-soft);margin-top:6px;opacity:.7;font-style:italic;position:relative;z-index:1;}
.face.back .pronunciation{color:rgba(255,255,255,.7);}

/* ---- Action buttons ---- */
.deck-actions{display:flex;gap:10px;justify-content:center;width:100%;margin-top:8px;opacity:0;max-height:0;overflow:hidden;transition:opacity .3s ease, max-height .3s ease, margin .3s ease;}
.deck-actions.show{opacity:1;max-height:120px;}
.deck-actions .icon-btn{flex:1 1 0;min-width:0;justify-content:center;border-radius:14px;padding:14px 12px;font-size:13px;min-height:52px;overflow:hidden;}
.deck-panel{padding:20px;overflow:hidden;}
.deck-empty{text-align:center;padding:48px 20px;color:var(--ink-soft);}
.deck-empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.3;}
.deck-empty p{font-size:14px;line-height:1.6;margin:0;}
.svg-icon{display:inline-flex;align-items:center;justify-content:center;line-height:0;flex-shrink:0;}
.svg-icon svg{vertical-align:middle;}
.icon-btn .svg-icon svg{width:17px;height:17px;}
.role-card .svg-icon svg{width:28px;height:28px;}
.activity-chart{display:flex;justify-content:space-between;gap:6px;}
.activity-day{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;min-width:0;}
.activity-dot{width:100%;aspect-ratio:1;max-width:38px;border-radius:10px;background:var(--border);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;transition:.2s;}
.activity-dot.active{background:var(--teal);box-shadow:0 3px 8px rgba(13,148,136,.3);}
.activity-label{font-size:11px;color:var(--ink-soft);}
.activity-day.today .activity-label{color:var(--teal-dark);font-weight:800;}
body.dark .activity-day.today .activity-label{color:var(--accent);}
.timer-compact-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.timer-card{flex:1 1 170px;max-width:220px;background:linear-gradient(165deg,var(--bg-card),var(--teal-soft) 260%);
  border:1px solid var(--border);border-radius:18px;padding:22px 16px 18px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:var(--shadow-sm);}
.timer-ring{width:112px;height:112px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;background:var(--bg-card);box-shadow:var(--shadow-lg), inset 0 0 0 5px var(--border);}
.timer-ring.running{box-shadow:var(--shadow-lg), inset 0 0 0 5px var(--teal-soft);}
.timer-ring:before{content:"";position:absolute;inset:-5px;border-radius:50%;padding:5px;
  background:conic-gradient(from 0deg, var(--teal) 0deg, var(--accent) 70deg, transparent 100deg 360deg);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;
  opacity:0;transition:opacity .25s;}
.timer-ring.running:before{opacity:1;animation:ringSpin 2.4s linear infinite;}
@keyframes ringSpin{to{transform:rotate(360deg);}}
.timer-ring-inner{display:flex;flex-direction:column;align-items:center;gap:2px;}
.timer-icon-lg{font-size:24px;line-height:1;}
.timer-time-lg{font-family:'Amiri',serif;font-size:22px;font-weight:700;color:var(--teal-dark);letter-spacing:.3px;}
body.dark .timer-time-lg{color:var(--accent);}
.timer-card-label{font-size:12.5px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.6px;}
.tc-btns{display:flex;gap:8px;width:100%;}
.tc-btn{flex:1;padding:10px 6px;border-radius:999px;font-weight:800;font-size:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:.15s ease;}
.tc-btn.start{background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(22,163,74,.32);}
.tc-btn.start:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 16px rgba(22,163,74,.4);}

.icon-btn{padding:12px 20px;min-height:44px;border-radius:12px;border:none;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s ease;letter-spacing:.2px;overflow:hidden;white-space:nowrap;}
.icon-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
.icon-btn:active{transform:translateY(0);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.icon-btn.speak{background:var(--teal-soft);color:var(--teal);border:1.5px solid var(--teal-soft);}
body.dark .icon-btn.speak{background:var(--teal-soft);color:var(--accent);border:1.5px solid var(--teal-soft);}
.icon-btn.know{background:var(--green-soft);color:var(--green);border:1.5px solid var(--green-soft);}
body.dark .icon-btn.know{background:var(--green-soft);color:var(--green);border:1.5px solid var(--green-soft);}

.empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:34px 10px;line-height:1.6;}

.progress-wrap{margin-bottom:20px;}

.bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--accent));border-radius:999px;transition:width .5s ease;}
.stats-row{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;}
.stat-box{flex:1;min-width:120px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 14px;text-align:center;transition:border-color .15s,background .15s;}

.stat-box .num{font-family:'Amiri',serif;font-size:25px;color:var(--teal-dark);font-weight:700;}
body.dark .stat-box .num{color:var(--accent);}
.stat-box .lab{font-size:10.5px;color:var(--ink-soft);margin-top:3px;letter-spacing:.3px;text-transform:uppercase;}
.timer-btns{display:flex;gap:8px;margin-top:12px;}

.res-row{border-inline-start:4px solid var(--teal);}
.res-row.type-Listening{border-inline-start-color:var(--blue);}
.res-row.type-Conversation{border-inline-start-color:var(--rose);}
.res-row.type-Reading{border-inline-start-color:var(--accent);}
.res-row a{color:var(--teal-dark);font-weight:700;text-decoration:none;}
body.dark .res-row a{color:var(--accent);}

.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.badge{position:relative;border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 10px;text-align:center;background:var(--bg-card);transition:.15s;}
.badge:not(.locked){border-color:var(--accent);box-shadow:var(--shadow-sm);}
.badge:not(.locked):after{content:"";position:absolute;top:8px;inset-inline-end:8px;width:8px;height:8px;background:var(--accent);
  clip-path:polygon(50% 4%, 57.3% 32.4%, 82.5% 17.5%, 67.6% 42.7%, 96% 50%, 67.6% 57.3%, 82.5% 82.5%, 57.3% 67.6%, 50% 96%, 42.7% 67.6%, 17.5% 82.5%, 32.4% 57.3%, 4% 50%, 32.4% 42.7%, 17.5% 17.5%, 42.7% 32.4%);}
.badge.locked{opacity:.3;filter:grayscale(1);}
.badge .bic{font-size:26px;}
.badge .bname{font-size:11.5px;font-weight:700;margin-top:7px;color:var(--teal-dark);}

.lb-row{display:flex;align-items:center;gap:12px;padding:11px 15px;border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:7px;background:var(--bg-card);}
.lb-rank{width:28px;height:28px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.lb-rank.top1{background:linear-gradient(145deg,#a7f3d0,var(--accent));color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.45);}
.lb-rank.top2{background:linear-gradient(145deg,#EDEDED,#9B9B9B);color:#3A3A3A;box-shadow:0 2px 8px rgba(130,130,130,.35);}
.lb-rank.top3{background:linear-gradient(145deg,#6ee7b7,#059669);color:#fff;box-shadow:0 2px 8px rgba(5,150,105,.4);}
.lb-name{font-weight:700;flex:1;}
.lb-stat{font-size:12px;color:var(--ink-soft);font-weight:600;}

.quiz-q{text-align:center;padding:12px 0 22px;}
.quiz-q .qword{font-family:'Amiri',serif;font-size:clamp(24px,6vw,34px);color:var(--teal-dark);word-break:break-word;}
body.dark .quiz-q .qword{color:var(--accent);}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:500px){.quiz-options{grid-template-columns:1fr;}}
.quiz-opt{padding:14px;min-height:48px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg-card);cursor:pointer;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;text-align:center;transition:all .2s ease;box-shadow:var(--shadow-sm);}

.quiz-opt:hover{border-color:var(--teal);background:var(--teal-soft);transform:translateY(-1px);box-shadow:0 3px 10px rgba(13,148,136,.1);}
body.dark .quiz-opt:hover{border-color:var(--accent);background:var(--teal-soft);}
.quiz-opt.correct{border-color:var(--green);background:var(--green-soft);color:var(--green);box-shadow:0 2px 8px rgba(22,163,74,.15);}
.quiz-opt.wrong{border-color:var(--rose);background:var(--rose-soft);color:var(--rose);box-shadow:0 2px 8px rgba(239,68,68,.15);}
.quiz-score{text-align:center;font-size:13px;color:var(--ink-soft);margin-bottom:10px;}
.type-input-row{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
.type-input-row input{max-width:260px;width:100%;text-align:center;font-family:'Amiri',serif;font-size:20px;}

.exam-qbuilder{border:1px dashed var(--border);border-radius:var(--radius-md);padding:16px;margin:14px 0;background:var(--bg);}
.exam-qlist{margin-top:16px;}
.exam-card{border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin-bottom:12px;background:var(--bg);}
.exam-card-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.exam-card .info b{font-family:'Amiri',serif;font-size:17px;color:var(--teal-dark);}
body.dark .exam-card .info b{color:var(--accent);}
.exam-card .info span{display:block;font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
.score-badge{background:var(--green-soft);color:var(--green);font-weight:800;font-size:12.5px;padding:6px 14px;border-radius:999px;white-space:nowrap;}
.theme-toggle.spin{animation:spinRefresh .6s linear;}
@keyframes spinRefresh{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.tab{position:relative;}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 5px;margin-inline-start:6px;border-radius:999px;background:var(--rose);color:#fff;font-size:10px;font-weight:800;line-height:1;}
.tab.active .tab-badge{background:#fff;color:var(--rose);}

.announce-card{position:relative;border:1px solid var(--border);border-radius:var(--radius-md);padding:15px 16px 14px;margin-bottom:12px;background:var(--bg);border-inline-start:4px solid var(--teal);transition:border-color .15s, box-shadow .15s;}
.announce-card:hover{box-shadow:var(--shadow-sm);}
.announce-card.prio-important{border-inline-start-color:var(--accent);}
.announce-card.prio-urgent{border-inline-start-color:var(--rose);}
.announce-card.is-new{background:linear-gradient(180deg,var(--teal-soft),var(--bg) 140%);}
.announce-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.announce-title-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.announce-title-row b{font-family:'Amiri',serif;font-size:17px;color:var(--teal-dark);}
body.dark .announce-title-row b{color:var(--accent);}
.announce-prio-dot{width:9px;height:9px;border-radius:50%;background:var(--teal);flex-shrink:0;}
.prio-important .announce-prio-dot{background:var(--accent);}
.prio-urgent .announce-prio-dot{background:var(--rose);}
.announce-body{font-size:13.5px;line-height:1.65;color:var(--ink);margin:9px 0 8px;white-space:pre-wrap;}
.announce-meta{font-size:11px;color:var(--ink-soft);letter-spacing:.2px;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:11px 24px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:50;max-width:90vw;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.25);}
body.dark .toast{background:#e5e7eb;color:#1a1a2e;}
.toast.show{opacity:1;}
.kbd-hint{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:8px;letter-spacing:.2px;}

/* ================= Q&A (student ↔ teacher) ================= */
.q-card{position:relative;border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 15px 12px;margin-bottom:12px;background:var(--bg);border-inline-start:4px solid var(--teal);transition:border-color .15s, box-shadow .15s;}
.q-card:hover{box-shadow:var(--shadow-sm);}
.q-card.q-open{border-inline-start-color:var(--accent);}
.q-card.q-answered{border-inline-start-color:var(--green);}
.q-card.q-new{background:linear-gradient(180deg,var(--teal-soft),var(--bg) 140%);}
.q-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.q-who{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);min-width:0;}
.q-who b{color:var(--teal-dark);font-family:'Amiri',serif;font-size:15px;}
body.dark .q-who b{color:var(--accent);}
.q-time{color:var(--ink-soft);font-size:11.5px;font-weight:500;}
.q-avatar{width:26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:12.5px;flex-shrink:0;}
.q-status{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;letter-spacing:.2px;white-space:nowrap;}
.q-status.pending{background:var(--accent-soft);color:var(--teal-dark);}
body.dark .q-status.pending{color:var(--accent);}
.q-status.done{background:var(--green-soft);color:var(--green);}
.q-body{font-size:13.5px;line-height:1.6;color:var(--ink);margin:6px 0 8px;white-space:pre-wrap;word-break:break-word;}
.q-reply{background:var(--teal-soft);border-radius:10px;padding:10px 12px;margin-top:8px;}
body.dark .q-reply{background:var(--teal-dark);}
.q-reply-label{font-size:10.5px;font-weight:800;color:var(--teal-dark);letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px;}
body.dark .q-reply-label{color:var(--accent);}
.q-reply p{margin:0;font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word;color:var(--ink);}
body.dark .q-reply p{color:#E7F3EA;}
.q-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.q-reply-form{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
.q-reply-input{width:100%;min-height:80px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;resize:vertical;background:var(--bg-card);color:var(--ink);margin-bottom:8px;}
.q-reply-input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft);}

/* ================= Preferences panel ================= */
.pref-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:12px 0;border-bottom:1px dashed var(--border);}
.pref-row:last-child{border-bottom:none;padding-bottom:0;}
.pref-row:first-of-type{padding-top:2px;}
.pref-info{flex:1 1 260px;min-width:0;}
.pref-info b{display:block;color:var(--teal-dark);font-family:'Amiri',serif;font-size:15.5px;margin-bottom:3px;}
body.dark .pref-info b{color:var(--accent);}
.pref-info span{font-size:12px;color:var(--ink-soft);line-height:1.5;display:block;}
.pref-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pref-pill{font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:999px;white-space:nowrap;}
.pref-pill.pref-on{background:var(--green-soft);color:var(--green);}
.pref-pill.pref-off{background:var(--rose-soft);color:var(--rose);}
.pref-pill.pref-pending{background:var(--accent-soft);color:var(--teal-dark);}
body.dark .pref-pill.pref-pending{color:var(--accent);}

@media (max-width:640px){
  .q-card{padding:12px 12px 10px;}
  .q-body{font-size:14px;}
  .q-reply p{font-size:13.5px;}
  .pref-row{padding:12px 0;gap:10px;}
  .pref-info{flex:1 1 100%;}
  .pref-actions{flex:1 1 100%;}
  .pref-actions .primary-btn{width:100%;}
}

/* ================= MOBILE POLISH ================= */
/* Tablet and below */
@media (max-width:768px){
  .panel{padding:18px 16px;border-radius:14px;margin-bottom:16px;}
  .panel h2{font-size:18px;padding-bottom:10px;margin-bottom:14px;}
  .kbd-hint{display:none;} /* keyboard shortcuts are irrelevant on phones */
}
/* Phone */
@media (max-width:640px){
  .wrap{padding-inline:12px;padding-top:calc(14px + env(safe-area-inset-top));}
  .masthead{padding-bottom:14px;margin-bottom:18px;gap:8px;}
  .masthead .brand{gap:10px;flex:1 1 auto;min-width:0;}
  .brand-mark{width:40px;height:40px;font-size:21px;border-radius:9px;}
  .brand h1{font-size:20px;}
  .header-actions{gap:6px;}
  .role-badge{padding:5px 10px;font-size:11px;gap:5px;}
  .theme-toggle{padding:6px 9px;font-size:13px;}

  .panel{padding:16px 14px;}
  .panel h2{font-size:17px;padding-inline-start:19px;}
  .field label{font-size:11px;}
  .field input,.field select,.field textarea{padding:12px 12px;font-size:16px;} /* 16px prevents iOS zoom */

  /* Tabs get a subtle fade indicator at the right edge so users know to swipe */
  .tabs{position:relative;padding-right:18px;}
  .tab{padding:9px 14px;font-size:12.5px;}

  /* Content Overview stat boxes wrap to 2 columns */
  .stats-row{gap:8px;}
  .stat-box{flex:1 1 calc(50% - 4px);min-width:0;padding:12px 10px;}
  .stat-box .num{font-size:22px;}
  .stat-box .lab{font-size:10px;}
  .deck-quickstats .stat-box{flex:1 1 calc(33.33% - 6px);padding:10px 6px;}
  .deck-quickstats .stat-box .num{font-size:20px;}
  .deck-quickstats .stat-box .lab{font-size:8px;gap:3px;}
  .deck-quickstats .stat-box .lab svg{width:11px;height:11px;}

  /* Deck panel */
  .deck-panel{padding:12px 8px;}
  .deck-ribbon{overflow:hidden;}
  .mode-switch{padding:3px;gap:4px;}
  .mode-switch .ghost-btn{padding:8px 6px;font-size:12px;min-height:36px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* Flashcard sizing */
  .flash-stage{padding:2px 0;gap:14px;}
  .flashcard{max-width:100%;border-radius:18px;}
  .card-stack{max-width:100%;}
  .face{padding:20px 16px;border-radius:18px;}
  .face .word{font-size:clamp(26px,8vw,38px);}
  .face .hint{font-size:11px;}
  .face.back .meaning{font-size:19px;}
  .face.back .example{font-size:13px;padding:8px 10px;}

  .deck-controls{gap:8px;}
  .deck-controls select,.deck-controls input{flex:1 1 auto;min-width:0;font-size:14px;padding:10px 12px;}
  .deck-actions{gap:8px;}
  .deck-actions .icon-btn{flex:1 1 0;min-width:0;padding:11px 6px;font-size:12px;min-height:44px;border-radius:12px;}
  .deck-actions .icon-btn svg{width:16px;height:16px;flex-shrink:0;}
  .deck-actions .icon-btn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fav-star{width:32px;height:32px;top:8px;inset-inline-end:8px;}

  /* Rows in Manage Content / Resources / Exams */
  .row{padding:12px 12px;gap:8px;flex-wrap:wrap;}
  .row .info{flex:1 1 100%;min-width:0;}
  .row .info b{font-size:16px;line-height:1.4;word-break:break-word;}

  /* Exam cards */
  .exam-card{padding:14px 12px;}
  .exam-card-top{gap:8px;}

  /* Announcements */
  .announce-card{padding:14px 14px 12px;}
  .announce-title-row b{font-size:16px;}

  /* Leaderboard */
  .lb-row{padding:10px 12px;gap:10px;}
  .lb-name{font-size:14px;word-break:break-word;}
  .lb-stat{font-size:11px;}

  /* Badges */
  .badges-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
  .badge{padding:12px 8px;}
  .badge .bname{font-size:11px;}

  /* Activity chart labels */
  .activity-label{font-size:10px;}
  .activity-dot{font-size:12px;}

  /* Quiz */
  .quiz-opt{padding:14px 10px;font-size:13.5px;min-height:52px;}

  /* Timer cards side-by-side but compact */
  .timer-compact-row{gap:10px;}
  .timer-card{flex:1 1 calc(50% - 5px);max-width:none;padding:16px 10px 14px;gap:10px;}
  .timer-ring{width:88px;height:88px;}
  .timer-time-lg{font-size:17px;}
  .timer-icon-lg{font-size:20px;}
  .tc-btn{padding:9px 4px;font-size:11.5px;}

  /* Buttons full-width for easier tapping */
  .primary-btn{width:100%;padding:14px 20px;font-size:15px;}
  .ghost-btn{padding:11px 14px;font-size:12.5px;}

  /* Toast a bit higher above nav gestures */
  .toast{bottom:calc(20px + env(safe-area-inset-bottom));font-size:13px;padding:11px 20px;}
}
/* Very small phones (< 380px) */
@media (max-width:380px){
  .brand h1{font-size:18px;}
  .brand-mark{width:36px;height:36px;font-size:19px;}
  .role-badge{padding:5px 8px;font-size:10.5px;}
  .role-badge .switch-btn{font-size:11px;}
  .theme-toggle{padding:5px 8px;}
  .panel{padding:14px 12px;}
  .deck-panel{padding:8px 6px;}
  .panel h2{font-size:16px;padding-inline-start:17px;}
  .stat-box .num{font-size:20px;}
  .tab{padding:8px 12px;font-size:12px;}
  .gate-card{padding:28px 18px;max-width:360px;}
  .gate-card h2{font-size:22px;}
  .deck-quickstats .stat-box{flex:1 1 calc(50% - 4px);}

  .deck-actions .icon-btn svg{width:15px;height:15px;}

  .gate-card h2{font-size:20px;}
  .gate-card p{margin-bottom:16px;}
  .gate-card p{margin-bottom:16px;}
