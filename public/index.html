/* ---------- STUDENT: deck (SRS) ---------- */
function filteredCards(){
  return STATE.flashcards.filter(c =>
    (STATE.filterCat==='All' || c.category===STATE.filterCat) &&
    (STATE.filterLevel==='All' || c.level===STATE.filterLevel)
  );
}
function dueCards(){
  const now = Date.now();
  return filteredCards().filter(c=>{
    const e = STATE.progress.srs[c.id];
    return !e || e.due<=now;
  }).sort((a,b)=>{
    const ea = STATE.progress.srs[a.id], eb = STATE.progress.srs[b.id];
    return (ea?ea.due:0) - (eb?eb.due:0);
  });
}
function dueTomorrowCount(){
  const now = Date.now();
  return filteredCards().filter(c=>{
    const e = STATE.progress.srs[c.id];
    return e && e.due>now && e.due<=now+DAY_MS;
  }).length;
}
function currentDeckPool(){
  return STATE.deckMode==='due' ? dueCards() : STATE.deckMode==='favorites' ? favoriteCards() : filteredCards();
}
function favoriteCards(){
  const favs = new Set((STATE.progress.favorites||[]).map(String));
  return filteredCards().filter(c=>favs.has(String(c.id)));
}
function toggleFavorite(cardId){
  const favs = (STATE.progress.favorites||[]).map(String);
  const idStr = String(cardId);
  const idx = favs.indexOf(idStr);
  if(idx===-1){ favs.push(idStr); toast(ico('star')+' Added to favorites'); }
  else { favs.splice(idx,1); toast('Removed from favorites'); }
  STATE.progress.favorites = favs;
  saveProgressBg();
}
function renderDeck(){
  const pool = currentDeckPool();
  if(STATE.deckIndex >= pool.length) STATE.deckIndex = 0;
  const dueTotal = dueCards().length;
  const favTotal = favoriteCards().length;
  const total = filteredCards().length;
  const masteredTotal = masteredCount(STATE.progress);
  const remaining = Math.max(0, total - masteredTotal);
  const tomorrowTotal = dueTomorrowCount();
  const reviewedToday = Object.values(STATE.progress.srs||{}).filter(e => {
    if(!e || !e.lastReview) return false;
    return new Date(e.lastReview).toISOString().slice(0,10) === new Date().toISOString().slice(0,10);
  }).length;

  function cardHTML(c, idx){
    if(!c) return `<div class="flashcard empty-card" data-stack="${idx}"></div>`;
    const isFav = (STATE.progress.favorites||[]).map(String).includes(String(c.id));
    const cls = idx===0?'active':idx===1?'behind-1':'behind-2';
    return `<div class="flashcard ${cls}" data-id="${c.id}" data-stack="${idx}">
      <button class="fav-star ${isFav?'active':''}" data-fav="${c.id}">${isFav?ico('star'):ico('starEmpty')}</button>
      <div class="flashcard-inner">
        <div class="face front">
          ${c.image ? `<div class="card-image"><img src="${escapeHtml(c.image)}" alt="" loading="lazy"/></div>` : ''}
          <div class="word">${escapeHtml(c.word)}</div>
          ${c.pronunciation ? `<div class="pronunciation">/${escapeHtml(c.pronunciation)}/</div>` : ''}
          <div class="hint">${ico('eye')} Tap to reveal meaning</div>
        </div>
        <div class="face back">
          <div class="meaning">${escapeHtml(c.meaning)}</div>
          ${c.pronunciation ? `<div class="pronunciation">/${escapeHtml(c.pronunciation)}/</div>` : ''}
          ${c.example ? `<div class="example">${escapeHtml(c.example)}</div>` : ''}
        </div>
      </div>
    </div>`;
  }

  const stackCards = [];
  for(let i=0;i<3;i++) stackCards.push(pool[STATE.deckIndex+i]||null);

  return `
  <div class="panel deck-panel">
    <div class="stats-row deck-quickstats">
      <div class="stat-box"><div class="num">${dueTotal}</div><div class="lab">${ico('clock')} Due Now</div></div>
      <div class="stat-box"><div class="num">${tomorrowTotal}</div><div class="lab">${ico('fire')} Due Tomorrow</div></div>
      <div class="stat-box"><div class="num">${masteredTotal}</div><div class="lab">${ico('check')} Mastered</div></div>
      <div class="stat-box"><div class="num">${remaining}</div><div class="lab">${ico('book')} Remaining</div></div>
      <div class="stat-box"><div class="num">${reviewedToday}</div><div class="lab">${ico('star')} Today</div></div>
    </div>
  </div>
  <div class="panel deck-panel">
    <div class="mode-switch">
      <button class="ghost-btn ${STATE.deckMode==='due'?'active-mode':''}" data-mode="due">${ico('clock')} Due (${dueTotal})</button>
      <button class="ghost-btn ${STATE.deckMode==='browse'?'active-mode':''}" data-mode="browse">${ico('book')} Browse</button>
      <button class="ghost-btn ${STATE.deckMode==='favorites'?'active-mode':''}" data-mode="favorites">${ico('star')} Favorites (${favTotal})</button>
    </div>
    <div class="deck-controls">
      <select id="filterCat"><option>All</option>${CATS.map(c=>`<option ${STATE.filterCat===c?'selected':''}>${c}</option>`).join('')}</select>
      <select id="filterLevel"><option>All</option>${LEVELS.map(l=>`<option ${STATE.filterLevel===l?'selected':''}>${l}</option>`).join('')}</select>
      ${pool.length ? `<div class="deck-counter"><span class="cur">${STATE.deckIndex+1}</span> / ${pool.length}</div>` : ''}
    </div>
    ${pool.length ? `<div class="deck-bar"><div class="deck-bar-fill deck-progress-bar" style="width:${pool.length?((STATE.deckIndex+1)/pool.length*100):0}%;"></div></div>` : ''}
    ${!stackCards[0] ? `<div class="empty">${STATE.deckMode==='due' ? 'No cards due right now — check back later or browse all cards' : STATE.deckMode==='favorites' ? 'No favorite cards yet — tap the star on any tricky card to save it here' : 'No flashcards match this filter yet'}</div>` : `
    <div class="flash-stage" id="flashStage">
      <div class="swipe-label know" id="swipeKnow">${ico('know')} Know</div>
      <div class="swipe-label review" id="swipeReview">${ico('review')} Review</div>
      <div class="swipe-label delete" id="swipeDelete">${ico('trash')} Delete</div>
      <div class="card-stack" id="cardStack">
        <div class="card-stack-spacer"></div>
        ${cardHTML(stackCards[2],2)}
        ${cardHTML(stackCards[1],1)}
        ${cardHTML(stackCards[0],0)}
      </div>
      <div class="deck-actions ${STATE.flipped?'show':''}" id="deckActions">
        <button class="icon-btn speak" id="speakBtn">${ico('speak')} Listen</button>
        <button class="icon-btn know" id="knowBtn">${ico('know')} I Know It</button>
        <button class="icon-btn review" id="reviewBtn">${ico('review')} Review</button>
      </div>
      <div class="kbd-hint">Swipe → Know · Swipe ← Review · Swipe ↓ Delete</div>
    </div>`}
  </div>`;
}

/* ---------- STUDENT: quiz ---------- */
function buildQuizQuestion(){
  const pool = STATE.flashcards;
  if(pool.length<4) return null;
  const idx = Math.floor(Math.random()*pool.length);
  const card = pool[idx];
  const direction = Math.random()<0.5 ? 'w2m' : 'm2w';
  const correct = direction==='w2m' ? card.meaning : card.word;
  const distractors = pool.filter(c=>c.id!==card.id)
    .sort(()=>Math.random()-0.5).slice(0,3)
    .map(c=> direction==='w2m' ? c.meaning : c.word);
  const options = [correct, ...distractors].sort(()=>Math.random()-0.5);
  const correctIndex = options.indexOf(correct);
  return { card, direction, correct, options, correctIndex };
}
function renderQuiz(){
  if(STATE.flashcards.length<4){
    return `<div class="panel"><div class="empty">You need at least 4 flashcards to start a quiz — wait for your teacher to add more</div></div>`;
  }
  if(!STATE.quiz.question) STATE.quiz.question = buildQuizQuestion();
  const q = STATE.quiz.question;
  const promptText = q.direction==='w2m' ? q.card.word : q.card.meaning;
  return `
  <div class="panel">
    <h2>Multiple Choice Quiz <small>Score: ${STATE.quiz.score} / ${STATE.quiz.total}</small></h2>
    <div class="quiz-q">
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;">${q.direction==='w2m' ? 'What does this word mean?' : 'Which Arabic word matches?'}</div>
      <div class="qword">${escapeHtml(promptText)}</div>
    </div>
    <div class="quiz-options">
      ${q.options.map((o,i)=>`<div class="quiz-opt ${STATE.quiz.answered ? (i===q.correctIndex?'correct':(i===STATE.quiz.picked?'wrong':'')) : ''}" data-opt-index="${i}">${escapeHtml(o)}</div>`).join('')}
    </div>
    ${STATE.quiz.answered ? `<div style="text-align:center;margin-top:16px;"><button class="primary-btn" id="nextQuizBtn">Next Question</button></div>` : ''}
  </div>
  <div class="panel"><h2>Typing Quiz</h2>
    <p style="font-size:12.5px;color:var(--ink-soft);">Type the correct Arabic word based on the meaning shown.</p>
    ${renderTypingBlock()}
  </div>`;
}
function renderTypingBlock(){

  const q = STATE.typing.question;
  return `

/* ---------- STUDENT: arabic sentences factory ---------- */
const SF = {
  data: null, filtered: [], index: 0, selectedLevel: null, selectedCategory: null,
  session: { done:0, totalScore:0, xp:0 },
  recognition: null, isRecording: false, lastResult: null,
  stats: { xp:0, level:1, streak:0, lastDate:'' },
  showRetry: false, reviewQueue: [],
};
function sfLoadData(){
  if(SF.data) return Promise.resolve(SF.data);
  return fetch('/sentences-data.json').then(r=>r.json()).then(d=>{
    SF.data = d; sfResetFilter(); return d;
  });
}
function sfResetFilter(){
  if(!SF.data) return;
  SF.filtered = SF.data.sentences.filter(s=>{
    if(SF.selectedLevel && s.level!==SF.selectedLevel) return false;
    if(SF.selectedCategory && s.category!==SF.selectedCategory) return false;
    return true;
  });
  sfShuffle();
}
function sfLevelsHtml(){
  return `<div class="sf-levels">${['A1','A2','B1','B2','C1','C2'].map(l=>`<button class="sf-level ${SF.selectedLevel===l?'active':''}" data-sf-level="${l}">${l}</button>`).join('')}<button class="sf-level ${!SF.selectedLevel?'active':''}" data-sf-level="">All</button></div>`;
}
function sfCategoriesHtml(){
  const cats = SF.data ? SF.data.categories : [];
  return `<div class="sf-categories">${cats.map(c=>`<button class="sf-cat ${SF.selectedCategory===c?'active':''}" data-sf-cat="${c}">${c.replace(/-/g,' ')}</button>`).join('')}${cats.length?`<button class="sf-cat ${!SF.selectedCategory?'active':''}" data-sf-cat="">All</button>`:''}</div>`;
}
function sfWordHtml(word, status){
  return `<span class="sf-word ${status}">${word}</span>`;
}
function sfScoreHtml(score){
  let cls = 'low';
  if(score>=80) cls='excellent'; else if(score>=60) cls='good'; else if(score>=40) cls='fair';
  return `<div class="sf-score-wrap"><div class="sf-score ${cls}"><span class="sf-label">Score</span> ${score}%</div></div>`;
}
function sfNormAr(t){
  return t.replace(/[أإآآ]/g,'ا').replace(/[ى]/g,'ي').replace(/[ة]/g,'ه').replace(/[ؤ]/g,'و').replace(/[ئ]/g,'ي').replace(/[ًٌٍَُِّْٰٖ]/g,'').replace(/[؟\.,!?;:()\-"'\s]+/g,' ').trim().toLowerCase();
}
function sfLevenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0]=i;
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function sfWordSim(a,b){
  const an=sfNormAr(a),bn=sfNormAr(b);
  if(!an||!bn) return 0;
  if(an===bn) return 1;
  const dist=sfLevenshtein(an,bn);
  const maxLen=Math.max(an.length,bn.length);
  if(maxLen===0) return 1;
  return Math.max(0,1-dist/maxLen);
}
function sfCalcScore(recognized, targetWords){
  if(!recognized||!recognized.trim()) return {score:0,wordStatus:targetWords.map(()=>'incorrect')};
  const recWords = recognized.trim().split(/[\s,\.!?;:]+/).filter(Boolean);
  const wordStatus = targetWords.map(tw=>{
    let best=0;
    for(const rw of recWords){
      const sim=sfWordSim(tw,rw);
      if(sim>best) best=sim;
    }
    if(best>=0.7) return 'correct';
    if(best>=0.4) return 'partial';
    return 'incorrect';
  });
  const weighted=wordStatus.reduce((s,st,i)=>{
    const w=1/(targetWords.length);
    if(st==='correct') return s+w;
    if(st==='partial') return s+w*0.5;
    return s;
  },0);
  const score=Math.round(weighted*100);
  return {score,wordStatus};
}
function sfGetCurrent(){
  if(!SF.filtered.length || SF.index>=SF.filtered.length) return null;
  return SF.filtered[SF.index];
}
function sfXpForLevel(lvl){ return (lvl-1)*120; }
function sfLevelFromXp(xp){
  let lvl=1;
  while(sfXpForLevel(lvl+1)<=xp && lvl<100) lvl++;
  return lvl;
}
function sfShuffle(){
  for(let i=SF.filtered.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [SF.filtered[i], SF.filtered[j]] = [SF.filtered[j], SF.filtered[i]];
  }
  SF.index = 0; SF.lastResult = null;
}
function sfUpdateStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(SF.stats.lastDate === today) return;
  const yesterday = new Date(Date.now()-864e5).toISOString().slice(0,10);
  SF.stats.streak = SF.stats.lastDate === yesterday ? SF.stats.streak + 1 : 1;
  SF.stats.lastDate = today;
  saveSfStats();
}
function sfNext(){
  SF.lastResult = null; SF.showRetry = false;
  if(SF.reviewQueue.length && SF.index >= SF.filtered.length-1){
    SF.filtered = SF.reviewQueue; SF.reviewQueue = []; SF.index = 0; render(); return;
  }
  if(SF.index < SF.filtered.length-1){ SF.index++; render(); return; }
  render(); // "All done" screen
}
function sfStartRecording(){
  if(!SF.recognition){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) return;
    SF.recognition = new SR();
    SF.recognition.lang = 'ar-SA';
    SF.recognition.continuous = true;
    SF.recognition.interimResults = true;
    SF.recognition.maxAlternatives = 3;
    SF.recognition.onresult = function(e){
      let interim = '';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const r = e.results[i];
        if(r.isFinal){
          const targetWords = SF.filtered[SF.index].words || SF.filtered[SF.index].ar.split(/[\s]+/).filter(Boolean);
          let bestResult = null, bestScore = -1;
          for(let j=0;j<r.length;j++){
            const text = r[j].transcript;
            const res = sfCalcScore(text, targetWords);
            if(res.score>bestScore){ bestScore=res.score; bestResult=res; }
          }
          SF.lastResult = bestResult || sfCalcScore(r[0]?.transcript||'', targetWords);
          const diff = SF.filtered[SF.index].difficulty || 1;
          const earned = Math.round((SF.lastResult.score/100)*6*diff);
          SF.session.xp += earned;
          SF.session.done++;
          SF.session.totalScore += SF.lastResult.score;
          SF.stats.xp += earned;
          SF.stats.level = sfLevelFromXp(SF.stats.xp);
          sfUpdateStreak();
          saveSfStats();
          saveSfHistory(SF.lastResult.score, SF.filtered[SF.index].level, SF.filtered[SF.index].category, earned);
          SF.isRecording = false;
          if(SF.lastResult.score < 70){
            SF.showRetry = true;
            if(SF.lastResult.score < 60) SF.reviewQueue.push(SF.filtered[SF.index]);
            render();
          } else {
            render();
            setTimeout(sfNext, 1200);
          }
          return;
        } else {
          interim += r[0].transcript;
        }
      }
      const el = document.getElementById('sfInterim');
      if(el && interim) el.textContent = interim;
    };
    SF.recognition.onerror = function(){
      if(SF._maxTimer) clearTimeout(SF._maxTimer);
      SF.isRecording = false; render();
    };
    SF.recognition.onend = function(){
      if(SF._maxTimer) clearTimeout(SF._maxTimer);
      if(SF.isRecording){ SF.isRecording = false; render(); }
    };
  }
  SF.isRecording = true;
  SF.lastResult = null;
  if(SF._maxTimer) clearTimeout(SF._maxTimer);
  SF._maxTimer = setTimeout(()=>{ if(SF.isRecording) sfStopRecording(); }, 20000);
  try { SF.recognition.start(); } catch(e) {}
  render();
}
function sfStopRecording(){
  SF.isRecording = false;
  if(SF._maxTimer) clearTimeout(SF._maxTimer);
  if(SF.recognition) try { SF.recognition.stop(); } catch(e) {}
  render();
}
function saveSfStats(){
  try { localStorage.setItem('minbar_sf_stats', JSON.stringify(SF.stats)); } catch(e) {}
}
function saveSfHistory(score, level, cat, earned){
  try {
    let h = JSON.parse(localStorage.getItem('minbar_sf_history')||'[]');
    h.push({score,level,cat,date:new Date().toISOString().slice(0,10),ts:Date.now()});
    if(h.length>500) h = h.slice(-500);
    localStorage.setItem('minbar_sf_history', JSON.stringify(h));
    // Also update progress totals
    const p = STATE.progress;
    p.sessionsTotal = (p.sessionsTotal||0) + 1;
    p.totalXpEarned = (p.totalXpEarned||0) + (earned||1);
    if(!p.byCategory) p.byCategory = {};
    if(cat){
      if(!p.byCategory[cat]) p.byCategory[cat] = {count:0,score:0,total:0};
      p.byCategory[cat].count++;
      p.byCategory[cat].total += score;
      p.byCategory[cat].score = p.byCategory[cat].total / p.byCategory[cat].count;
    }
    // CEFR progress
    if(level){
      if(!p.cefr) p.cefr = {};
      if(!p.cefr[level]) p.cefr[level] = {score:0};
      p.cefr[level].started = true;
      p.cefr[level].score = Math.min(100, (p.cefr[level].score||0) + Math.round(score/20));
    }
    saveProgressBg();
  } catch(e) {}
}
function loadSfStats(){
  try {
    const d = JSON.parse(localStorage.getItem('minbar_sf_stats'));
    if(d){ SF.stats.xp = d.xp || 0; SF.stats.level = d.level || 1; SF.stats.streak = d.streak || 0; SF.stats.lastDate = d.lastDate || ''; }
  } catch(e) {}
}
function renderSentencesFactory(){
  const s = sfGetCurrent();
  if(!SF.data) return `<div class="panel"><div class="sf-empty"><div class="sf-empty-icon">${ico('volume')}</div><h3>Loading sentences...</h3><p>Please wait while the sentence database loads.</p></div></div>`;
  if(!SF.filtered.length) return `<div class="panel">${sfLevelsHtml()}${sfCategoriesHtml()}<div class="sf-empty"><div class="sf-empty-icon">${ico('bookOpen')}</div><h3>No sentences found</h3><p>Try selecting a different level or category.</p></div></div>`;
  if(!s) return `<div class="panel"><div class="sf-empty"><div class="sf-empty-icon">${ico('checkCircle')}</div><h3>All done!</h3><p>You've completed all sentences in this filter.</p><button class="primary-btn" id="sfReset">Reset</button></div></div>`;
  const total = SF.filtered.length;
  const done = SF.session.done;
  const xp = SF.stats.xp;
  const lvl = SF.stats.level;
  const nextXp = sfXpForLevel(lvl+1);
  const currXp = sfXpForLevel(lvl);
  const xpPct = nextXp>currXp ? Math.min(100, Math.round(((xp-currXp)/(nextXp-currXp))*100)) : 100;
  const hasRec = !!(window.SpeechRecognition||window.webkitSpeechRecognition);
  const showTrans = SF._showTrans;
  const transText = showTrans ? (s.tr || s.en) : '';
  const scoreRes = SF.lastResult;
  const words = s.words || s.ar.split(/[\s]+/).filter(Boolean);
  const wordHtml = scoreRes ? words.map((w,i)=>sfWordHtml(w, scoreRes.wordStatus[i]||'pending')).join('') : words.map(w=>sfWordHtml(w,'pending')).join('');
  const sessPct = total ? Math.round((done/total)*100) : 0;
  return `
    <div class="panel">
      ${sfLevelsHtml()}
      ${sfCategoriesHtml()}
      <div class="sf-stats">
        <div class="sf-stat"><div class="sf-stat-val">${done}</div><div class="sf-stat-label">Done</div></div>
        <div class="sf-stat"><div class="sf-stat-val">${done?Math.round(SF.session.totalScore/done):0}%</div><div class="sf-stat-label">Avg Score</div></div>
        <div class="sf-stat"><div class="sf-stat-val">${SF.session.totalScore}</div><div class="sf-stat-label">Total Score</div></div>
        <div class="sf-stat"><div class="sf-stat-val">${SF.session.xp}</div><div class="sf-stat-label">XP Session</div></div>
      </div>
      <div class="sf-xp-bar"><div class="sf-xp-fill" style="width:${xpPct}%"></div></div>
      <div class="sf-xp-label"><span>Level ${lvl} &middot; ${xp} XP</span><span>${nextXp} XP for Level ${lvl+1}</span></div>
    </div>
    <div class="sf-card">
      <div style="font-size:11px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;">${s.level} &middot; ${s.category.replace(/-/g,' ')} &middot; ${SF.index+1}/${total}</div>
      <div class="sf-sess-bar-wrap"><div class="sf-sess-bar"><div class="sf-sess-fill" style="width:${sessPct}%"></div></div><span class="sf-sess-label">${done}/${total}</span></div>
      <div class="sf-arabic-wrap">
        <div class="sf-arabic">${s.ar}</div>
        <button class="sf-listen-btn" id="sfListenBtn" title="Listen">${ico('volume')}</button>
      </div>
      <div class="sf-translation" id="sfToggleTrans">${transText || (showTrans===undefined?'<span class="sf-trans-hint">Tap for translation</span>':'')}</div>
      ${scoreRes ? sfScoreHtml(scoreRes.score) : ''}
      <div class="sf-words">${wordHtml}</div>
      ${SF.showRetry && scoreRes ? `<button class="primary-btn" id="sfRetryBtn" style="margin:0 auto 12px;display:block;">${ico('mic')} Try Again</button>` : ''}
      ${!hasRec ? `<div class="sf-not-supported"><p>Speech recognition is not supported in this browser. Try Chrome or Edge.</p></div>` : `
        <button class="sf-record-btn" id="sfRecordBtn">${SF.isRecording?'⬤':ico('mic')}</button>
        <div class="sf-record-label">${SF.isRecording?'Tap again to stop (max 20s)':'Tap to speak'}</div>
        <div style="font-size:11px;color:var(--ink-soft);margin-top:4px;min-height:16px;" id="sfInterim"></div>
      `}
    </div>
    <div class="sf-nav">
      <button class="ghost-btn" id="sfSkip" ${!s?'disabled':''}>${ico('skipBack')} ${SF.showRetry?'Next':'Skip'}</button>
      <button class="ghost-btn" id="sfResetSession">Reset</button>
    </div>`;
}

function attachHandlers(){
  const bellBtn = document.getElementById('bellBtn');
  if(bellBtn) bellBtn.onclick = ()=>{ STATE.tab='announcements'; render(); };
  const themeBtn = document.getElementById('themeToggle');
  if(themeBtn) themeBtn.onclick = ()=>{ STATE.dark=!STATE.dark; localStorage.setItem('minbar_dark', STATE.dark); render(); };
  const switchBtn = document.getElementById('switchRole');
  if(switchBtn) switchBtn.onclick = ()=>{
    stopAllTimers();
    stopPolling();
    stopNotificationLoop();
    stopHeartbeat();
    STATE.role=null; STATE.name=''; STATE.email=''; STATE.avatar=null; STATE.tab='deck'; STATE.deckIndex=0; STATE.flipped=false;
    try{ localStorage.removeItem('minbar_tab'); }catch(e){}
    STATE.quiz={active:false,direction:'w2m',question:null,options:[],answered:false,picked:null,score:0,total:0};
    STATE.typing={active:false,question:null,feedback:null};
    STATE.examBuilder={title:'',qType:'mcq',options:['','','',''],questions:[]};
    STATE.examSession=null; STATE.examOpenResults={};
    localStorage.removeItem('minbar_session');
    render();
  };
  const profileBtn = document.getElementById('openProfile');
  if(profileBtn) profileBtn.onclick = ()=>{ window.location.href = 'profile.html'; };
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = ()=>{
      // Stop and save running timers before switching tabs
      stopAllTimers();
      STATE.tab = t.dataset.tab; STATE.deckIndex=0; STATE.flipped=false;
      try{ localStorage.setItem('minbar_tab', STATE.tab); }catch(e){}
      // Render instantly so tab feels snappy — refresh data in the background.
      render();
      // Kick off any tab-specific background loads (don't block UI):
      const needsLeaderboard = (t.dataset.tab==='students' || t.dataset.tab==='leaderboard');
      if(needsLeaderboard){
        loadLeaderboard().then(()=>{ if(STATE.tab===t.dataset.tab) render(); }).catch(()=>{});
      }
      if(t.dataset.tab==='students' && STATE.role==='teacher'){
        Promise.all([loadAllStudents(), loadLeaderboard()]).then(([students,lb])=>{ STATE.students=students; STATE.leaderboard=lb; if(STATE.tab==='students') render(); }).catch(()=>{});
      }
      // Mark announcements as read (background save)
      if(STATE.role==='student' && t.dataset.tab==='announcements' && STATE.announcements.length){
        STATE.progress.readAnnouncements = STATE.announcements.map(a=>String(a.id));
        saveProgressBg();
      }
      // Preload sentences factory data when switching to resources tab
      if(t.dataset.tab==='resources' && !SF.data){
        sfLoadData().then(()=>render());
      }
    };
  });
  // Sentences factory event delegation
  document.querySelectorAll('[data-sf-level]').forEach(el=>{
    el.onclick = ()=>{ SF.selectedLevel = el.dataset.sfLevel || null; sfResetFilter(); render(); };
  });
  document.querySelectorAll('[data-sf-cat]').forEach(el=>{
    el.onclick = ()=>{ SF.selectedCategory = el.dataset.sfCat || null; sfResetFilter(); render(); };
  });
  const sfRecord = document.getElementById('sfRecordBtn');
  if(sfRecord){
    sfRecord.onclick = ()=>{
      if(SF.isRecording){ sfStopRecording(); return; }
      sfStartRecording();
    };
  }
  const sfTrans = document.getElementById('sfToggleTrans');
  if(sfTrans) sfTrans.onclick = ()=>{ SF._showTrans = !SF._showTrans; render(); };
  const sfSkip = document.getElementById('sfSkip');
  if(sfSkip) sfSkip.onclick = ()=>{ sfNext(); };
  const sfResetSess = document.getElementById('sfResetSession');
  if(sfResetSess) sfResetSess.onclick = ()=>{ SF.session={done:0,totalScore:0,xp:0}; SF.stats={xp:0,level:1,streak:0,lastDate:''}; SF.lastResult=null; SF.showRetry=false; SF.reviewQueue=[]; SF.index=0; saveSfStats(); if(SF.data) sfResetFilter(); render(); };
  const sfResetBtn = document.getElementById('sfReset');
  if(sfResetBtn) sfResetBtn.onclick = ()=>{ SF.index=0; SF.lastResult=null; render(); };
  const sfListenBtn = document.getElementById('sfListenBtn');
  if(sfListenBtn) sfListenBtn.onclick = ()=>{ const s=sfGetCurrent(); if(s) speak(s.ar); };
  const sfRetryBtn = document.getElementById('sfRetryBtn');
  if(sfRetryBtn) sfRetryBtn.onclick = ()=>{ SF.lastResult=null; SF.showRetry=false; render(); };
  const refreshBtn = document.getElementById('refreshBtn');
  if(refreshBtn) refreshBtn.onclick = async ()=>{
    refreshBtn.disabled = true; refreshBtn.classList.add('spin');
    Object.keys(fetchCache).forEach(k => delete fetchCache[k]);
    try {
      await loadShared();
      if(STATE.role==='teacher' && (STATE.tab==='students')){ STATE.students=await loadAllStudents(); await loadLeaderboard(); }
      if(STATE.role==='student' && STATE.tab==='leaderboard') await loadLeaderboard();
      render();
      toast('Content updated');
    } finally {
      // The re-render replaces refreshBtn, so we don't need to re-enable — safe.
    }
  };

  if(STATE.role==='teacher'){
    const refBtn = document.getElementById('refreshKeysBtn');
    if(refBtn) refBtn.onclick = async ()=>{
      STATE.students = await loadAllStudents(); await loadLeaderboard(); render(); toast('Refreshed');
    };
    document.querySelectorAll('[data-block-student]').forEach(b=>{
      b.onclick = async ()=>{ await blockStudentAccount(b.dataset.blockStudent); STATE.students = await loadAllStudents(); render(); toast(ico('warning')+' Student blocked'); };
    });
    document.querySelectorAll('[data-unblock-student]').forEach(b=>{
      b.onclick = async ()=>{ await unblockStudentAccount(b.dataset.unblockStudent); STATE.students = await loadAllStudents(); render(); toast(ico('check')+' Student unblocked'); };
    });
    document.querySelectorAll('[data-delete-student]').forEach(b=>{
      b.onclick = async ()=>{ if(!confirm('Delete this student? They will lose access permanently.')) return; await deleteStudentAccount(b.dataset.deleteStudent); STATE.students = await loadAllStudents(); render(); toast('Student deleted'); };
    });
    const resetLbBtn = document.getElementById('resetLbBtn');
    if(resetLbBtn) resetLbBtn.onclick = async ()=>{ if(!confirm('Reset all leaderboard data? This cannot be undone.')) return; await resetLeaderboard(); render(); toast(ico('check')+' Leaderboard reset'); };
    attachTeacherHandlers();
  }
  else attachStudentHandlers();
}

      STATE.flashcards.push({ id:uid(), word, meaning,
        example: document.getElementById('fExample').value.trim(),
        pronunciation: document.getElementById('fPronunciation').value.trim(),
        image: document.getElementById('fImage').value.trim(),
        category: document.getElementById('fCat').value, level: document.getElementById('fLevel').value,
        audio: document.getElementById('fAudio').value.trim(),

    const qeUrl=document.getElementById('qeUrl');if(qeUrl)qeUrl.onkeydown=(e)=>{if(e.key==='Enter')quickExtract();};

        const oldVal=keyInput.value;
        if(provSelect.value==='gemini'){setOpenAIKey(oldVal);keyInput.value=getGeminiKey();keyInput.placeholder='AIza...';}

      };

  if(STATE.tab==='settings'){

  if(STATE.tab==='questions'){
    document.querySelectorAll('[data-q-toggle]').forEach(b=>{

        if(idx<0) return;

function attachSwipeHandlers(){
  const stack = document.getElementById('cardStack');
  if(!stack) return;
  let activeEl = stack.querySelector('.flashcard.active');
  if(!activeEl || _swipeActive) return;
  _swipeActive = true;

  const deckActions = document.getElementById('deckActions');
  const knowLabel = document.getElementById('swipeKnow');
  const reviewLabel = document.getElementById('swipeReview');
  const deleteLabel = document.getElementById('swipeDelete');
  const exitSpr = new Spring(0,0,200,24);
  let animId = null;
  let dragging=false, startX=0, startY=0, dx=0, dy=0, didSwipe=false;
  let _exiting = false;

  function showLabels(dxx, dyy){
    if(knowLabel) knowLabel.classList.toggle('show', dxx > 25);
    if(reviewLabel) reviewLabel.classList.toggle('show', dxx < -25);
    if(deleteLabel) deleteLabel.classList.toggle('show', dyy > 25 && Math.abs(dxx) < 35);
  }
  function hideLabels(){ [knowLabel,reviewLabel,deleteLabel].forEach(l=>{ if(l){ l.classList.remove('show'); l.style.opacity=''; } }); }

  function onStart(ex,ey){
    if(_exiting) return;
    if(!activeEl||!activeEl.parentNode) return;
    dragging=true; startX=ex; startY=ey; dx=0; dy=0; didSwipe=false;
    activeEl.style.transition='none';
  }
  function onMove(ex,ey){
    if(!dragging) return;
    if(!activeEl||!activeEl.parentNode){ dragging=false; return; }
    dx=ex-startX; dy=ey-startY;
    if(Math.abs(dx)>8||Math.abs(dy)>8) didSwipe=true;
    if(!didSwipe) return;
    activeEl.style.transform=`translateX(${dx}px) rotate(${Math.max(-SWIPE_MAX_ROT,Math.min(SWIPE_MAX_ROT,dx*0.06))}deg)`;
    const absDx=Math.abs(dx);
    if(absDx>40){
      const progress=Math.min((absDx-40)/(SWIPE_THRESHOLD-40),1);
      if(dx>0){ if(knowLabel) knowLabel.style.opacity=progress; if(reviewLabel) reviewLabel.style.opacity=0; }
      else { if(reviewLabel) reviewLabel.style.opacity=progress; if(knowLabel) knowLabel.style.opacity=0; }
    } else { if(knowLabel) knowLabel.style.opacity=0; if(reviewLabel) reviewLabel.style.opacity=0; }
    if(dy>25&&Math.abs(dx)<35){ if(deleteLabel) deleteLabel.style.opacity=Math.min((dy-25)/40,1); }
    else if(deleteLabel) deleteLabel.style.opacity=0;
  }
  function onEnd(){
    if(!dragging) return; dragging=false; hideLabels();
    if(!didSwipe){ toggleFlip(); return; }
    const dir=Math.abs(dx)>SWIPE_THRESHOLD?(dx>0?'right':'left'):(dy>SWIPE_THRESHOLD+30&&Math.abs(dx)<35?'down':'');
    if(dir) flyOut(dir); else springBack();
  }

  function springBack(){
    if(!activeEl||!activeEl.parentNode) return;
    activeEl.style.transition='transform .4s cubic-bezier(.34,1.56,.64,1)';
    activeEl.style.transform='';
    setTimeout(()=>{ if(activeEl) activeEl.style.transition=''; },410);
  }

  function flyOut(dir){
    if(!activeEl||!activeEl.parentNode) return;
    _exiting=true; dragging=false; hideLabels();
    activeEl.style.transition='none';
    const cx=parseFloat(getComputedStyle(activeEl).width)||400;
    exitSpr.setImmediate(0); exitSpr.setTarget(1); exitSpr.vel=0;
    let last=performance.now();
    function anim(now){
      if(!activeEl||!activeEl.parentNode){ _exiting=false; return; }
      const dt=(now-last)/1000; last=now;
      exitSpr.step(dt);
      const p=exitSpr.pos;
      if(dir==='down') activeEl.style.transform=`translateY(${p*cx}px) rotate(${p*8}deg)`;
      else activeEl.style.transform=`translateX(${p*(dir==='right'?1:-1)*cx*1.4}px) rotate(${p*(dir==='right'?25:-25)}deg)`;
      activeEl.style.opacity=1-p;
      if(exitSpr.done){ activeEl.classList.add('fly-'+dir); setTimeout(()=>{ activeEl.remove(); processSwipeAction(dir); },10); return; }
      animId=requestAnimationFrame(anim);
    }
    animId=requestAnimationFrame(anim);
  }

  function toggleFlip(){
    if(!activeEl||!activeEl.parentNode) return;
    STATE.flipped=!STATE.flipped;
    activeEl.classList.toggle('flipped',STATE.flipped);
    if(deckActions) deckActions.classList.toggle('show',STATE.flipped);
  }

  function promoteCard(){
    const liveStack = document.getElementById('cardStack');
    if(!liveStack) return;
    const cur=liveStack.querySelector('.flashcard[data-stack="0"]');
    const b2=liveStack.querySelector('.flashcard[data-stack="2"]');
    const b1=liveStack.querySelector('.flashcard[data-stack="1"]');
    if(cur) cur.remove();
    if(b1){
      b1.classList.remove('behind-1'); b1.classList.add('active'); b1.dataset.stack='0';
      b1.style.transition='none';
      b1.style.transform=`translateY(${STACK_CFG.y2}px) scale(${STACK_CFG.scale2})`;
      void b1.offsetHeight;
      b1.style.transition='transform .3s cubic-bezier(.34,1.56,.64,1)';
      b1.style.transform='';
      setTimeout(()=>{ b1.style.transition=''; },310);
    }
    if(b2){
      b2.classList.remove('behind-2'); b2.classList.add('behind-1'); b2.dataset.stack='1';
      b2.style.transition='none';
      b2.style.transform=`translateY(${STACK_CFG.y3}px) scale(${STACK_CFG.scale3})`;
      void b2.offsetHeight;
      b2.style.transition='transform .3s cubic-bezier(.34,1.56,.64,1)';
      b2.style.transform=`translateY(${STACK_CFG.y2}px) scale(${STACK_CFG.scale2})`;
      setTimeout(()=>{ b2.style.transition=''; },310);
    }
    const pool=currentDeckPool();
    const nc=pool[STATE.deckIndex+2];
    if(nc){
      const nd=document.createElement('div');
      nd.innerHTML=renderCardHTML(nc);
      const ne=nd.firstElementChild;
      ne.classList.add('behind-2'); ne.dataset.stack='2';
      ne.style.transform=`translateY(${STACK_CFG.y3}px) scale(${STACK_CFG.scale3})`;
      liveStack.appendChild(ne);
    }
    const newActive = liveStack.querySelector('.flashcard.active');
    if(!newActive){
      _swipeActive=false; cleanup();
      const pool3=currentDeckPool();
      if(pool3.length===0) render();
      return;
    }
    activeEl = newActive;
    rebind(activeEl);
  }

  function renderCardHTML(c){
    const isFav=(STATE.progress.favorites||[]).map(String).includes(String(c.id));
    return `<div class="flashcard" data-id="${c.id}">
      <button class="fav-star ${isFav?'active':''}" data-fav="${c.id}">${isFav?ico('star'):ico('starEmpty')}</button>
      <div class="flashcard-inner">
        <div class="face front">
          ${c.image?`<div class="card-image"><img src="${escapeHtml(c.image)}" alt="" loading="lazy"/></div>`:''}
          <div class="word">${escapeHtml(c.word)}</div>
          ${c.pronunciation?`<div class="pronunciation">/${escapeHtml(c.pronunciation)}/</div>`:''}
          <div class="card-actions"><button class="card-act-btn" onclick="event.stopPropagation();speak('${escapeHtml(c.word)}')">🔊</button><button class="card-act-btn" onclick="event.stopPropagation();startPractice('${escapeHtml(c.word)}','${c.id}')">🎤</button></div>
          <div class="hint">${ico('eye')} Tap to reveal meaning</div>
          <div class="practice-result" id="pr${c.id}"></div>
        </div>
        <div class="face back">
          <div class="meaning">${escapeHtml(c.meaning)}</div>
          ${c.pronunciation?`<div class="pronunciation">/${escapeHtml(c.pronunciation)}/</div>`:''}
          ${c.example?`<div class="example">${escapeHtml(c.example)}</div>`:''}
        </div>
      </div>
    </div>`;
  }

  function processSwipeAction(dir){
    _exiting=false;
    STATE.flipped=false;
    if(dir==='right'){ advanceSRS(true); toast(ico('know')+' عرفته'); }
    else if(dir==='left'){ advanceSRS(false); toast(ico('review')+' بيرجع تاني'); }
    else{
      const pool=currentDeckPool(); const c=pool[STATE.deckIndex];
      if(c){ STATE.flashcards=STATE.flashcards.filter(fc=>String(fc.id)!==String(c.id)); safeSetBg('flashcards',STATE.flashcards,true);
        const np=currentDeckPool(); if(np.length===0) STATE.deckIndex=0; else STATE.deckIndex=Math.min(STATE.deckIndex, np.length-1);
        toast(ico('trash')+' اتمسحت البطاقة'); }
    }
    if(deckActions) deckActions.classList.remove('show');
    promoteCard();
    updateDeckCounters();
    const pool2=currentDeckPool(); const c2=pool2[STATE.deckIndex];
    if(c2) setTimeout(()=>speak(c2.word),200);
  }

  activeEl.addEventListener('mousedown', _onMd);
  activeEl.addEventListener('touchstart', _onTs, {passive:true});
  document.addEventListener('mousemove', _onDocMove);
  document.addEventListener('mouseup', _onDocUp);
  document.addEventListener('touchmove', _onDocTouchMove, {passive:true});
  document.addEventListener('touchend', _onDocTouchEnd);
  document.addEventListener('touchcancel', _onDocTouchEnd);

  function handleStarTap(starEl){
    if(!starEl) return;
    const cardId=starEl.dataset.fav; if(!cardId) return;
    toggleFavorite(cardId);
    const isFav=(STATE.progress.favorites||[]).map(String).includes(String(cardId));
    starEl.innerHTML=isFav?ico('star'):ico('starEmpty'); starEl.classList.toggle('active',isFav);
  }

  let _starHandled=false;

  function _onMd(e){ if(_starHandled){_starHandled=false;return;} if(e.target.closest('.fav-star')){handleStarTap(e.target.closest('.fav-star'));return;} e.preventDefault(); onStart(e.clientX, e.clientY); }
  function _onTs(e){ const s=e.target.closest('.fav-star'); if(s){_starHandled=true;handleStarTap(s);return;} _starHandled=false; const t=e.touches[0]; onStart(t.clientX, t.clientY); }
  function _onDocMove(e){ onMove(e.clientX, e.clientY); }
  function _onDocUp(){ onEnd(); }
  function _onDocTouchMove(e){ const t=e.touches[0]; onMove(t.clientX, t.clientY); }
  function _onDocTouchEnd(){ onEnd(); }
  function cleanup(){
    if(activeEl){ activeEl.removeEventListener('mousedown', _onMd); activeEl.removeEventListener('touchstart', _onTs); }
    document.removeEventListener('mousemove', _onDocMove);
    document.removeEventListener('mouseup', _onDocUp);
    document.removeEventListener('touchmove', _onDocTouchMove);
    document.removeEventListener('touchend', _onDocTouchEnd);
    document.removeEventListener('touchcancel', _onDocTouchEnd);
    _swipeActive=false;
  }
  _cleanupSwipe = cleanup;
  function rebind(newEl){
    if(!newEl||!newEl.parentNode) return;
    if(activeEl){ activeEl.removeEventListener('mousedown', _onMd); activeEl.removeEventListener('touchstart', _onTs); }
    activeEl=newEl;
    activeEl.addEventListener('mousedown', _onMd);
    activeEl.addEventListener('touchstart', _onTs, {passive:true});
    _starHandled=false;
  }

  const speakBtn=document.getElementById('speakBtn');
  if(speakBtn) speakBtn.onclick=(e)=>{ e.stopPropagation(); const pool=currentDeckPool(); const c=pool[STATE.deckIndex]; if(c) if(c.audio) new Audio(c.audio).play().catch(()=>speak(c.word)); else speak(c.word); };
  const knowBtn=document.getElementById('knowBtn');
  if(knowBtn) knowBtn.onclick=(e)=>{ e.stopPropagation(); flyOut('right'); };
  const reviewBtn=document.getElementById('reviewBtn');
  if(reviewBtn) reviewBtn.onclick=(e)=>{ e.stopPropagation(); flyOut('left'); };
}

function updateDeckCounters(){
  const pool=currentDeckPool();
  const counterEl=document.querySelector('.deck-counter .cur');
  if(counterEl) counterEl.textContent=STATE.deckIndex+1;
  const bar=document.querySelector('.deck-progress-bar');
  if(bar&&pool.length) bar.style.width=((STATE.deckIndex+1)/pool.length*100)+'%';
  const dueEl=document.querySelector('.deck-quickstats .stat-box:first-child .num');
  if(dueEl) dueEl.textContent=dueCards().length;
}

function attachStudentHandlers(){
  if(STATE.tab==='library'){
    if(STATE.libView==='categories'){
      const searchInput=document.getElementById('libSearchInput');
      if(searchInput){searchInput.oninput=(e)=>{STATE.libSearchQ=e.target.value;render();};}
      document.querySelectorAll('[data-lib-cat]').forEach(el=>{
        el.onclick=()=>{STATE.libCat=el.dataset.libCat;STATE.libView='templates';render();};
      });
    }
    if(STATE.libView==='templates'){
      const backBtn=document.getElementById('libBackCat');
      if(backBtn)backBtn.onclick=()=>{STATE.libView='categories';render();};
      document.querySelectorAll('[data-lib-add]').forEach(el=>{
        el.onclick=()=>{
          try{
          const tplId=el.dataset.libAdd;
          const tpl=getLibTemplate(tplId);
          if(!tpl){toast('⚠️ لم يتم تحميل القالب بعد');return;}
          const released=getLibReleased(tplId);
          const mastered=countLibMastered(tplId);
          const hasAll=released.length>=tpl.words.length;
          const allMastered=hasAll&&mastered>=released.length;
          if(allMastered){
            if(!confirm('إعادة تعلم جميع الكلمات؟ سيتم مسح التقدم الحالي'))return;
            STATE.libProgress[tplId]={released:[],batchSize:10};
            safeSetBg('libProgress',STATE.libProgress,true);
          } else if(released.length&&mastered<released.length){
            toast('📖 راجع البطاقات أولاً في تبويب Review حتى تتقن الكلمات الحالية');
            STATE.tab='deck';render();return;
          }
          const added=addLibBatch(tplId);
          if(added>0){
            toast(ico('check')+' أضيفت '+added+' كلمات إلى بطاقاتك');
            STATE.tab='deck';render();
          }
          }catch(e){console.error('addLib error',e);toast('⚠️ حدث خطأ');}
        };
      });
    }
  }
  if(STATE.tab==='deck'){
    document.querySelectorAll('[data-mode]').forEach(b=>{
      b.onclick = ()=>{ STATE.deckMode = b.dataset.mode; STATE.deckIndex=0; STATE.flipped=false; _cleanupSwipe?.(); const sy=window.scrollY; render(); window.scrollTo(0,sy); };
    });
    const filterCat = document.getElementById('filterCat'), filterLevel = document.getElementById('filterLevel');
    if(filterCat) filterCat.onchange = e=>{ STATE.filterCat=e.target.value; STATE.deckIndex=0; STATE.flipped=false; _cleanupSwipe?.(); const sy=window.scrollY; render(); window.scrollTo(0,sy); };
    if(filterLevel) filterLevel.onchange = e=>{ STATE.filterLevel=e.target.value; STATE.deckIndex=0; STATE.flipped=false; _cleanupSwipe?.(); const sy=window.scrollY; render(); window.scrollTo(0,sy); };
    _swipeActive = false;
    attachSwipeHandlers();
  }
  if(STATE.tab==='quiz'){
    document.querySelectorAll('[data-opt-index]').forEach(el=>{
      el.onclick = ()=>{
        if(STATE.quiz.answered) return;
        const i = Number(el.dataset.optIndex);
        STATE.quiz.answered = true; STATE.quiz.total++; STATE.quiz.picked = i;
        const correct = i===STATE.quiz.question.correctIndex;
        if(correct){ STATE.quiz.score++; el.classList.add('correct'); }
        else el.classList.add('wrong');
        STATE.progress.quiz.attempts++; if(correct) STATE.progress.quiz.correct++;
        markActivityToday();
        render();               // ← Feedback shows instantly
        saveProgressBg();       // ← Background save
      };
    });
    const nextBtn = document.getElementById('nextQuizBtn');
    if(nextBtn) nextBtn.onclick = ()=>{ STATE.quiz.question = buildQuizQuestion(); STATE.quiz.answered=false; STATE.quiz.picked=null; render(); };
    const checkBtn = document.getElementById('typeCheckBtn');
    if(checkBtn) checkBtn.onclick = ()=>{
      const val = normalizeArabic(document.getElementById('typeInput').value);
      const correct = val === normalizeArabic(STATE.typing.question.word);
      STATE.typing.feedback = correct ? 'correct' : 'wrong';
      STATE.progress.quiz.attempts++; if(correct) STATE.progress.quiz.correct++;
      markActivityToday();
      render();
      saveProgressBg();
    };
    const typeNext = document.getElementById('typeNextBtn');
    if(typeNext) typeNext.onclick = ()=>{
      STATE.typing.question = STATE.flashcards[Math.floor(Math.random()*STATE.flashcards.length)];
      STATE.typing.feedback = null; render();
    };
  }
  if(STATE.tab==='exam'){
    document.querySelectorAll('[data-start-exam]').forEach(b=>{
      b.onclick = ()=>{
        const id = Number(b.dataset.startExam);
        STATE.examSession = { examId:id, index:0, score:0, answered:false, picked:null };
        render();
      };
    });
    const sess = STATE.examSession;
    if(sess){
      const ex = STATE.exams.find(e=>e.id===sess.examId);
      if(!ex){ STATE.examSession=null; }
      else if(sess.index < ex.questions.length){
        const q = ex.questions[sess.index];
        if(q.type==='mcq'){
          document.querySelectorAll('[data-exam-opt]').forEach(el=>{
            el.onclick = ()=>{
              if(sess.answered) return;
              const i = Number(el.dataset.examOpt);
              sess.answered = true; sess.picked = i;
              if(i===q.correct) sess.score++;
              render();
            };
          });
        } else {
          const checkBtn = document.getElementById('examCheckBtn');
          if(checkBtn) checkBtn.onclick = ()=>{
            const val = normalizeArabic(document.getElementById('examTypeInput').value);
            const correct = val === normalizeArabic(q.correct);
            if(correct) sess.score++;
            sess.answered = true;
            sess.wasCorrect = correct;
            render();
          };
        }
        const nextBtn = document.getElementById('examNextBtn');
        if(nextBtn) nextBtn.onclick = ()=>{ sess.index++; sess.answered=false; sess.picked=null; render(); };
      } else {
        const backBtn = document.getElementById('examBackBtn');
        if(backBtn) backBtn.onclick = ()=>{
          const result = { score: sess.score, total: ex.questions.length, date: Date.now() };
          STATE.progress.examResults[ex.id] = result;
          markActivityToday();
          saveProgressBg();
          // Background save of exam result for teacher; roster update in bg
          safeSetBg('examresult:'+ex.id+':'+STATE.name, { name:STATE.name, ...result }, true);
          (async ()=>{
            let list = (await safeGet('examtakers:'+ex.id, true)) || [];
            if(!list.includes(STATE.name)){ list.push(STATE.name); safeSetBg('examtakers:'+ex.id, list, true); }
          })();
          STATE.examSession = null;
          toast('Exam result saved');
          render();
        };
      }
    }
  }
  if(STATE.tab==='ask'){
    const inp = document.getElementById('qInput');
    if(inp) inp.oninput = (e)=>{ STATE.qDraft = e.target.value; };
    const sendBtn = document.getElementById('qSendBtn');
    if(sendBtn) sendBtn.onclick = ()=>{
      const body = (document.getElementById('qInput').value || '').trim();
      if(!body){ toast('Please write your question first'); return; }
      STATE.questions.push({
        id: uid(),
        name: STATE.name,
        body,
        createdAt: Date.now(),
        reply: null,
        repliedAt: null
      });
      STATE.qDraft = '';
      safeSetBg('questions', STATE.questions, true);
      toast(ico('know')+' Sent to your teacher'); render();
    };
    document.querySelectorAll('[data-student-del-q]').forEach(b=>{
      b.onclick = ()=>{
        if(!confirm('Delete this question?')) return;
        const id = Number(b.dataset.studentDelQ);
        STATE.questions = STATE.questions.filter(q=>q.id!==id);
        safeSetBg('questions', STATE.questions, true);
        render();
      };
    });
    // Mark newly-received replies as read once the student opens this tab
    const myReplyIds = STATE.questions
      .filter(q => q.name===STATE.name && q.reply)
      .map(q => String(q.id));
    if(myReplyIds.length){
      const already = new Set((STATE.progress.readReplies||[]).map(String));
      const toAdd = myReplyIds.filter(id => !already.has(id));
      if(toAdd.length){
        STATE.progress.readReplies = [...(STATE.progress.readReplies||[]), ...toAdd];
        saveProgress();
      }
    }
  }
  if(STATE.tab==='journey'){
    if(_lesDay>0){
      const backB=document.getElementById('lesBack');if(backB)backB.onclick=()=>{stopLesSync();_lesDay=0;render();};
      const compB=document.getElementById('lesComplete');if(compB)compB.onclick=()=>lesComplete();
      const subT=document.getElementById('lesSubToggle');
      if(subT)subT.onclick=()=>{_lesSubHidden=!_lesSubHidden;document.querySelectorAll('.lesson-sub').forEach(el=>{el.style.display=_lesSubHidden?'none':'';});subT.innerHTML=_lesSubHidden?ico('eyeOff')+' Subtitles':ico('eye')+' Subtitles';};
    } else {
      document.querySelectorAll('[data-jw]').forEach(n=>{
        n.onclick=()=>{const w=Number(n.dataset.jw);if(!isWorldUnlocked(w))return;_jrnyWorld=w;render();};
      });
      const backBtn=document.getElementById('jrnyBack');
      if(backBtn)backBtn.onclick=()=>{_jrnyWorld=-1;render();};
      document.querySelectorAll('[data-jday]').forEach(n=>{
        n.onclick=()=>{const d=Number(n.dataset.jday);if(!isDayUnlocked(d))return;_lesDay=d;render();};
      });
    }
  }
}

function advanceSRS(knew){
  const pool = currentDeckPool();
  const c = pool[STATE.deckIndex];
  if(!c) return;
  const entry = STATE.progress.srs[c.id] || {srsLevel:0, due:0, correctCount:0, wrongCount:0, totalReviews:0, lastReview:0};
  entry.totalReviews = (entry.totalReviews||0) + 1;
  entry.lastReview = Date.now();
  if(knew){
    entry.correctCount = (entry.correctCount||0) + 1;
    entry.srsLevel = Math.min(entry.srsLevel+1, SRS_INTERVALS.length-1);
  } else {
    entry.wrongCount = (entry.wrongCount||0) + 1;
    entry.srsLevel = 1;
  }
  entry.due = Date.now() + SRS_INTERVALS[entry.srsLevel];
  STATE.progress.srs[c.id] = entry;
  markActivityToday();
  STATE.flipped = false;
  const newPool = currentDeckPool();
  if(newPool.length===0) STATE.deckIndex = 0;
  else STATE.deckIndex = (STATE.deckIndex + 1) % newPool.length;
  saveProgressBg();
}
function updateCardDOM(){
  updateDeckCounters();
}

function fmtClock(ms){
  const total = Math.max(0, Math.floor(ms/1000));
  const m = String(Math.floor(total/60)).padStart(2,'0');
  const s = String(total%60).padStart(2,'0');
  return m+':'+s;
}
function startTimer(kind){
  if(STATE.timers[kind]) return;
  STATE.timers[kind+'Start'] = Date.now();
  const clockEl = document.getElementById(kind==='listening' ? 'listenClock' : 'speakClock');
  STATE.timers[kind] = setInterval(()=>{
    const el = document.getElementById(kind==='listening' ? 'listenClock' : 'speakClock');
    if(el) el.textContent = fmtClock(Date.now()-STATE.timers[kind+'Start']);
  }, 1000);
  if(clockEl) clockEl.textContent = '00:00';
  toast(kind==='listening' ? 'Listening timer started' : 'Speaking timer started');
  render();
}
function stopTimer(kind){
  if(!STATE.timers[kind]) return;
  clearInterval(STATE.timers[kind]);
  const elapsed = Math.round((Date.now()-STATE.timers[kind+'Start'])/1000);
  STATE.timers[kind] = null;
  if(kind==='listening') STATE.progress.listeningSec += elapsed; else STATE.progress.speakingSec += elapsed;
  markActivityToday();
  saveProgressBg();
  toast('Logged about '+Math.max(1,Math.round(elapsed/60))+' minute(s)');
}
function stopAllTimers(){
  ['listening','speaking'].forEach(k=>{
    if(STATE.timers[k]){
      clearInterval(STATE.timers[k]);
      const elapsed = Math.round((Date.now()-STATE.timers[k+'Start'])/1000);
      if(elapsed > 0){
        if(k==='listening') STATE.progress.listeningSec += elapsed;
        else STATE.progress.speakingSec += elapsed;
        markActivityToday();
        saveProgressBg();
      }
      STATE.timers[k]=null;
    }
  });
}

document.addEventListener('keydown', (e)=>{
  if(STATE.role!=='student' || STATE.tab!=='deck') return;
  if(e.code==='Space'){
    e.preventDefault();
    STATE.flipped=!STATE.flipped;
    const ac=document.querySelector('.card-stack .flashcard.active');
    if(ac) ac.classList.toggle('flipped',STATE.flipped);
    const da=document.getElementById('deckActions');
    if(da) da.classList.toggle('show',STATE.flipped);
  }
  else if(e.code==='ArrowRight'){ _cleanupSwipe?.(); advanceSRS(true); const sy=window.scrollY; render(); window.scrollTo(0,sy); speak(currentDeckPool()[STATE.deckIndex]?.word||''); }
  else if(e.code==='ArrowLeft'){ _cleanupSwipe?.(); advanceSRS(false); const sy=window.scrollY; render(); window.scrollTo(0,sy); speak(currentDeckPool()[STATE.deckIndex]?.word||''); }
});

let POLL_TIMER = null;
function startPolling(){
  if(POLL_TIMER) return;
  POLL_TIMER = setInterval(async ()=>{
    if(!STATE.role) return;
    const before = JSON.stringify({
      f:STATE.flashcards.length, r:STATE.resources.length, e:STATE.exams.length,
      a:STATE.announcements.length, q:STATE.questions.length,
      replies: STATE.questions.filter(x=>x.reply).length,
      lessons: Object.keys(STATE.lessonsData).length,
    });
    await loadShared();
    const after = JSON.stringify({
      f:STATE.flashcards.length, r:STATE.resources.length, e:STATE.exams.length,
      a:STATE.announcements.length, q:STATE.questions.length,
      replies: STATE.questions.filter(x=>x.reply).length,
      lessons: Object.keys(STATE.lessonsData).length,
    });
    if(before!==after){
      // Notify appropriately based on what changed
      if(STATE.role==='student'){
        const myNewReply = STATE.questions.some(q =>
          q.name===STATE.name && q.reply &&
          !((STATE.progress.readReplies||[]).map(String).includes(String(q.id)))
        );
        if(myNewReply) notifyUser('Your teacher replied', 'Open the "Ask Teacher" tab to read the reply.');
        else toast('New content from your teacher');
      } else if(STATE.role==='teacher'){
        const openQ = unansweredQuestionsCount();
        if(openQ>0) notifyUser('New question from a student', openQ+' question'+(openQ>1?'s':'')+' waiting for you.');
      }
      // Refresh leaderboard if on relevant tab
      const needsLeaderboard = (STATE.tab==='students' || STATE.tab==='leaderboard');
      if(needsLeaderboard){
        loadLeaderboard().then(()=>render()).catch(()=>{});
      }
      // Always refresh student list for teacher (to detect new registrations)
      if(STATE.role==='teacher'){
        const prevCount = (STATE.students||[]).length;
        const prevNames = new Set((STATE.students||[]).map(s=>s.name));
        loadAllStudents().then((students)=>{
          STATE.students=students;
          if(students.length>prevCount && prevCount>0){
            const newest=students.find(s=>(Date.now()-(s.createdAt||0))<86400000);
            const name=newest?newest.name:'A student';
            toast(ico('fire')+' New student: <b>'+escapeHtml(name)+'</b> just registered!');
            notifyUser('New student registered',name+' just created an account!');
          } else {
            for(const s of students){
              if(!prevNames.has(s.name) && prevCount>0){
                toast(ico('fire')+' New student: <b>'+escapeHtml(s.name)+'</b> just registered!');
                notifyUser('New student registered',s.name+' just created an account!');
              }
            }
          }
          if(STATE.tab==='students') render();
        }).catch(()=>{});
      }
      render();
    }
  }, 15000);
}
function stopPolling(){
  if(POLL_TIMER){ clearInterval(POLL_TIMER); POLL_TIMER=null; }
}

/* ================= NOTIFICATIONS ================= */
const NOTIF_CHECK_MS = 60000; // check every minute while app is open
let NOTIF_TIMER = null;

function notificationsSupported(){
  return typeof window!=='undefined' && 'Notification' in window;
}
async function requestNotificationPermission(){
  if(!notificationsSupported()) return 'unsupported';
  if(Notification.permission === 'granted' || Notification.permission === 'denied') return Notification.permission;
  try { return await Notification.requestPermission(); }
  catch(e){ return Notification.permission; }
}
function notifyUser(title, body, tag){
  if(!notificationsSupported() || Notification.permission!=='granted') return;
  const opts = {
    body: body || '',
    tag: tag || 'minbar-'+Date.now(),
    icon: '/icon-192.png',
    badge: '/icon-192.png',
    renotify: true
  };
  // Prefer service worker so notifications persist even after page navigation.
  if(navigator.serviceWorker && navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage({ type:'SHOW_NOTIFICATION', title, ...opts });
    return;
  }
  try { new Notification(title, opts); } catch(_) {}
}

// One check tick: due cards, streak-at-risk, evening reminder
async function notificationTick(){
  if(!STATE.role || !notificationsSupported() || Notification.permission!=='granted') return;
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const hour = today.getHours();
  const shownKey = 'minbar_notif_'+STATE.role+'_'+STATE.name+'_'+todayStr;
  let shown = {};
  try{ shown = JSON.parse(localStorage.getItem(shownKey) || '{}'); }catch(_){}

  if(STATE.role==='student'){
    const dueNow = dueCards().length;
    // 1. Due cards ready (only once per day, after 10am)
    if(hour>=10 && dueNow>0 && !shown.due){
      notifyUser(dueNow+' card'+(dueNow>1?'s':'')+' ready to review',
                 'Keep your Arabic streak alive — a quick session takes just a few minutes.',
                 'minbar-due');
      shown.due = true;
    }
    // 2. Evening reminder (8 PM) if hasn't studied today
    const actDates = new Set(STATE.progress.activityDates||[]);
    if(hour>=20 && !actDates.has(todayStr) && !shown.reminder){
      notifyUser('Study reminder',
                 'A few minutes today builds fluency for life.',
                 'minbar-reminder');
      shown.reminder = true;
    }
  }
  if(STATE.role==='teacher'){
    const openQ = unansweredQuestionsCount();
    if(openQ>0 && !shown.open_q){
      notifyUser(openQ+' student question'+(openQ>1?'s':'')+' awaiting reply',
                 'Tap to answer them now.',
                 'minbar-openq');
      shown.open_q = true;
    }
  }
  try{ localStorage.setItem(shownKey, JSON.stringify(shown)); }catch(_){}
}
function startNotificationLoop(){
  if(NOTIF_TIMER) return;
  notificationTick(); // immediate
  NOTIF_TIMER = setInterval(notificationTick, NOTIF_CHECK_MS);
}
function stopNotificationLoop(){
  if(NOTIF_TIMER){ clearInterval(NOTIF_TIMER); NOTIF_TIMER = null; }
}

/* ================= PWA — service worker + install prompt ================= */
if('serviceWorker' in navigator){
  window.addEventListener('load', async ()=>{
    try{
      const regs = await navigator.serviceWorker.getRegistrations();
      for(const reg of regs){
        await reg.unregister();
      }
      await navigator.serviceWorker.register('/sw.js');
    }catch(err){ console.warn('SW registration failed:', err); }
  });
}
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  STATE.installEvent = e;
  render();
});

(async ()=>{
  if(!storageAvailable()){
    toast(ico('warning')+' Unable to reach the server — check your connection');
  }
  await loadCodes();
  ensureLibTemplates();
  if(window.location.search.indexOf('admin') !== -1){
    window.location.href = 'teacher-login.html';
    return;
  }
  const saved = JSON.parse(localStorage.getItem('minbar_session') || 'null');
  if(!saved || !saved.role){
    if(window.location.search.indexOf('app') === -1){
      if(window.location.pathname === '/' || window.location.pathname.endsWith('index.html')){
        window.location.href = 'landing.html';
        return;
      }
    }
  }
  if(saved && saved.role==='teacher'){
    window.location.href = 'teacher-login.html';
    return;
  }
  if(saved && saved.role && saved.role!=='teacher' && STATE.codes[saved.role]){
    STATE.role = saved.role;
    STATE.name = saved.name || '';
    STATE.email = saved.email || '';
    STATE.teacherEmail = saved.teacherEmail || '';
    const savedTab = localStorage.getItem('minbar_tab');
    const defaultTab = saved.role==='teacher' ? 'addcard' : 'journey';
    STATE.tab = savedTab || defaultTab;
    if(saved.role==='student'){
      const lookupKey = saved.email || saved.name;
      try {
        const doc = await storage.get('user:'+lookupKey, true);
        const rec = doc.value;
        if(rec.blocked){ STATE.role=null; STATE.name=''; STATE.email=''; localStorage.removeItem('minbar_session'); }
        else { rec.lastSeen=Date.now(); STATE.avatar=rec.avatar||null; STATE.name=rec.name||STATE.name; STATE.email=rec.email||STATE.email; STATE.bio=rec.bio||''; STATE.userRecord=rec; await storage.set('user:'+lookupKey, rec, true); startHeartbeat(); }
      } catch(e){ startHeartbeat(); }
    }
    if(!STATE.role){ render(); return; }
    await loadShared();
    await loadProgress();
    if(STATE.role==='student') syncStudentActivity();
    if(saved.role==='teacher') await loadLeaderboard();
    if(saved.role==='teacher') STATE.students = await loadAllStudents();
    if(saved.role==='teacher' && saved.email){
      try {
        const tpRes = await safeGet('teacher:'+saved.email, true);
        if(tpRes) STATE.teacherProfile = tpRes;
      }catch(e){}
    }
    startPolling();
    startNotificationLoop();
  }
  render();
})();

/* ── Onboarding ── */
var onboardStep = 0;
var onboardSteps = [
  { icon: '👋', title: 'Welcome to Minbar!', desc: 'Your Arabic learning journey starts here. Master Arabic with interactive flashcards, live teachers, and daily practice.' },
  { icon: '👨‍🏫', title: 'Find Your Teacher', desc: 'Browse our expert teachers, read reviews, and book a one-on-one session that fits your schedule.' },
  { icon: '🚀', title: 'Start Learning', desc: 'Use flashcards, complete quizzes, track your progress, and join live lessons — all in one place.' }
];

function showOnboarding() {
  onboardStep = 0;
  document.getElementById('onboardOverlay').classList.add('show');
  updateOnboardingStep();
}

function nextOnboardingStep() {
  onboardStep++;
  if (onboardStep >= onboardSteps.length) { dismissOnboarding(); return; }
  updateOnboardingStep();
}

function updateOnboardingStep() {
  var step = onboardSteps[onboardStep];
  document.getElementById('onboardIcon').textContent = step.icon;
  document.getElementById('onboardTitle').textContent = step.title;
  document.getElementById('onboardDesc').textContent = step.desc;
  var btn = document.getElementById('onboardBtn');
  btn.textContent = onboardStep === onboardSteps.length - 1 ? 'Get Started 🚀' : 'Next →';
  var dots = document.querySelectorAll('.onboard-dot');
  dots.forEach(function(d, i) { d.className = 'onboard-dot' + (i === onboardStep ? ' active' : ''); });
}

function dismissOnboarding() {
  document.getElementById('onboardOverlay').classList.remove('show');
  localStorage.setItem('minbar_onboarded', 'true');
}
