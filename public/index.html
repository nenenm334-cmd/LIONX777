let POLL_TIMER = null;
function startPolling(){
  if(POLL_TIMER) return;
  POLL_TIMER = setInterval(async ()=>{
    if(!STATE.role) return;
    const before = JSON.stringify({
      f:STATE.flashcards.length, r:STATE.resources.length, e:STATE.exams.length,
      a:STATE.announcements.length, q:STATE.questions.length,
      // Include reply state so students see when teacher replies
      replies: STATE.questions.filter(x=>x.reply).length,
    });
    await loadShared();
    const after = JSON.stringify({
      f:STATE.flashcards.length, r:STATE.resources.length, e:STATE.exams.length,
      a:STATE.announcements.length, q:STATE.questions.length,
      replies: STATE.questions.filter(x=>x.reply).length,
    });
    if(before!==after){
      // Notify appropriately based on what changed
      if(STATE.role==='student'){
        const myNewReply = STATE.questions.some(q =>
          q.name===STATE.name && q.reply &&
          !((STATE.progress.readReplies||[]).map(String).includes(String(q.id)))
        );
        if(myNewReply) notifyUser('📩 Your teacher replied', 'Open the "Ask Teacher" tab to read the reply.');
        else toast('New content from your teacher');
      } else if(STATE.role==='teacher'){
        const openQ = unansweredQuestionsCount();
        if(openQ>0) notifyUser('📩 New question from a student', openQ+' question'+(openQ>1?'s':'')+' waiting for you.');
      }
      // Refresh leaderboard if on relevant tab
      const needsLeaderboard = (STATE.tab==='students' || STATE.tab==='leaderboard');
      if(needsLeaderboard){
        loadLeaderboard().then(()=>render()).catch(()=>{});
      }
      render();
    }
  }, 15000);
}
function stopPolling(){
  if(POLL_TIMER){ clearInterval(POLL_TIMER); POLL_TIMER=null; }
}

/* ================= NOTIFICATIONS ================= */
const NOTIF_CHECK_MS = 60000; // check every minute while app is open
let NOTIF_TIMER = null;

function notificationsSupported(){
  return typeof window!=='undefined' && 'Notification' in window;
}
async function requestNotificationPermission(){
  if(!notificationsSupported()) return 'unsupported';
  if(Notification.permission === 'granted' || Notification.permission === 'denied') return Notification.permission;
  try { return await Notification.requestPermission(); }
  catch(e){ return Notification.permission; }
}
function notifyUser(title, body, tag){
  if(!notificationsSupported() || Notification.permission!=='granted') return;
  const opts = {
    body: body || '',
    tag: tag || 'minbar-'+Date.now(),
    icon: '/icon-192.png',
    badge: '/icon-192.png',
    renotify: true
  };
  // Prefer service worker so notifications persist even after page navigation.
  if(navigator.serviceWorker && navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage({ type:'SHOW_NOTIFICATION', title, ...opts });
    return;
  }
  try { new Notification(title, opts); } catch(_) {}
}

// One check tick: due cards, streak-at-risk, evening reminder
async function notificationTick(){
  if(!STATE.role || !notificationsSupported() || Notification.permission!=='granted') return;
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const hour = today.getHours();
  const shownKey = 'minbar_notif_'+STATE.role+'_'+STATE.name+'_'+todayStr;
  let shown = {};
  try{ shown = JSON.parse(localStorage.getItem(shownKey) || '{}'); }catch(_){}

  if(STATE.role==='student'){
    const dueNow = dueCards().length;
    // 1. Due cards ready (only once per day, after 10am)
    if(hour>=10 && dueNow>0 && !shown.due){
      notifyUser('🃏 '+dueNow+' card'+(dueNow>1?'s':'')+' ready to review',
                 'Keep your Arabic streak alive — a quick session takes just a few minutes.',
                 'minbar-due');
      shown.due = true;
    }
    // 2. Streak at risk (after 7 PM, if user hasn't studied today and had a streak yesterday)
    const dates = new Set(STATE.progress.activityDates||[]);
    const yesterdayStr = new Date(Date.now()-DAY_MS).toISOString().slice(0,10);
    const hasYesterday = dates.has(yesterdayStr);
    const hasToday = dates.has(todayStr);
    if(hour>=19 && hasYesterday && !hasToday && !shown.streak){
      const streak = computeStreak(STATE.progress);
      if(streak>=1){
        notifyUser('🔥 Your '+streak+'-day streak is about to break',
                   'Study one card today to keep it alive!',
                   'minbar-streak');
        shown.streak = true;
      }
    }
    // 3. Evening reminder (8 PM) even without a streak
    if(hour>=20 && !hasToday && !shown.reminder){
      notifyUser('📚 Study reminder',
                 'A few minutes today builds fluency for life.',
                 'minbar-reminder');
      shown.reminder = true;
    }
  }
  if(STATE.role==='teacher'){
    const openQ = unansweredQuestionsCount();
    if(openQ>0 && !shown.open_q){
      notifyUser('📩 '+openQ+' student question'+(openQ>1?'s':'')+' awaiting reply',
                 'Tap to answer them now.',
                 'minbar-openq');
      shown.open_q = true;
    }
  }
  try{ localStorage.setItem(shownKey, JSON.stringify(shown)); }catch(_){}
}
function startNotificationLoop(){
  if(NOTIF_TIMER) return;
  notificationTick(); // immediate
  NOTIF_TIMER = setInterval(notificationTick, NOTIF_CHECK_MS);
}
function stopNotificationLoop(){
  if(NOTIF_TIMER){ clearInterval(NOTIF_TIMER); NOTIF_TIMER = null; }
}

/* ================= PWA — service worker + install prompt ================= */
if('serviceWorker' in navigator){
  window.addEventListener('load', async ()=>{
    try{
      const regs = await navigator.serviceWorker.getRegistrations();
      for(const reg of regs){
        await reg.unregister();
      }
      await navigator.serviceWorker.register('/sw.js');
    }catch(err){ console.warn('SW registration failed:', err); }
  });
}
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  STATE.installEvent = e;
  render();
});

(async ()=>{
  if(!storageAvailable()){
    toast('⚠️ Unable to reach the server — check your connection');
  }
  await loadCodes();
  const saved = JSON.parse(localStorage.getItem('minbar_session') || 'null');
  if(saved && saved.role && STATE.codes[saved.role]){
    STATE.role = saved.role;
    STATE.name = saved.name || '';
    STATE.tab = saved.role==='teacher' ? 'addcard' : 'deck';
    await loadShared();
    await loadProgress();
    if(saved.role==='teacher') await loadLeaderboard();
    startPolling();
    startNotificationLoop();
  }
  render();
})();
</script>
