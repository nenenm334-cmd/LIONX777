<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — Minbar</title>
<link rel="stylesheet" href="css/common.css">
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdf4,#f8fafc,#ecfdf5);padding:24px;}body.dark{background:linear-gradient(135deg,#08080e,#0a0a12,#080c0a);color:#e2e8f0;}.card{background:rgba(255,255,255,.85);backdrop-filter:blur(24px);border-radius:24px;padding:48px;text-align:center;max-width:440px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.06);}body.dark .card{background:rgba(16,16,24,.85);box-shadow:0 24px 80px rgba(0,0,0,.3);}.icon{width:64px;height:64px;border-radius:50%;background:#0d9488;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px;color:#fff;}h1{font-size:26px;color:#0f172a;margin-bottom:4px;}body.dark h1{color:#e2e8f0;}p{color:#64748b;font-size:14px;line-height:1.6;margin-bottom:8px;}body.dark p{color:#94a3b8;}.plan-badge{display:inline-block;padding:4px 14px;border-radius:20px;background:rgba(13,148,136,.1);color:#0d9488;font-size:12px;font-weight:700;margin-bottom:16px;}.detail{font-size:13px;color:#64748b;margin-bottom:24px;}body.dark .detail{color:#94a3b8;}.detail strong{color:#0f172a;}body.dark .detail strong{color:#e2e8f0;}.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#0d9488,#059669);color:#fff;font-weight:700;font-size:15px;text-decoration:none;transition:all .2s;}.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,148,136,.3);}</style>
</head><body>
<div class="card">
  <div class="icon">✓</div>
  <h1 id="successTitle">Payment Successful!</h1>
  <div class="plan-badge" id="planBadge">Pro Plan</div>
  <p id="successMsg">Your subscription is now active. You have full access to all premium features.</p>
  <div class="detail" id="detailLine"></div>
  <a href="/index.html?app" class="btn">Go to Dashboard →</a>
</div>
<script>
var params = new URLSearchParams(location.search);
var sessionId = params.get('session_id');
if (sessionId) {
  fetch('/api/stripe-session?session_id=' + encodeURIComponent(sessionId))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.planName) {
        document.getElementById('planBadge').textContent = d.planName;
        document.getElementById('successTitle').textContent = 'Welcome to ' + d.planName + '!';
        document.getElementById('detailLine').innerHTML = '<strong>' + d.planPrice + '</strong> &middot; ' + d.email;
      }
    }).catch(function(){});
}
</script>
</body></html>
